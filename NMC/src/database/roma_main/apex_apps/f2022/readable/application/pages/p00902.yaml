- # ====== Process: Availability Check aufrufen ================
  id: 77781116749327323
  identification: 
    name: Availability Check aufrufen
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      :P902_JSON := PCK_POB_REST.fv_availability(
         pin_haus_lfd_nr => :P902_HAUS_LFD_NR 
        ,piv_username    => :APP_USER
      );
      
      
      :P902_LANDLINE_PROMOTIONS_HTML := PCK_GLASCONTAINER_ORDER.fv_landline_promotions_html(
          piv_json => :P902_JSON
         , piv_html_id => 'technologien'
      );
      

  execution: 
    sequence: 10
    point: Processing
    run-process: Once Per Page Visit (default)

  error: 
    display-location: Inline in Notification

  server-side-condition: 
    when-button-pressed: BTN_SEND # 69573040982798816

