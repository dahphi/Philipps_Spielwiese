- # ====== Shortcut: FN_FORMAT_IBAN ============================
  id: 226065854122759769
  identification: 
    name: FN_FORMAT_IBAN

  subscription: 
    version-number: 1

  source: 
    type: HTML Text
    html-code: function formatIBAN(t){for(let e=0;e<t.length;e++)t[e].addEventListener("input",e=>{var t=e.target.value.toUpperCase().replace(/ /g,"");let r="";for(let e=0;e<t.length;e++)r+=t[e],(e+1)%4==0&&0<e&&(r+=" ");e.target.value=r.trim()})}

  comments: 
    comments: |
      /**
       * Fügt allen Elementen im Argument "el" je einen Event-Handler hinzu,
       * der bei der Eingabe die IBAN in Viererblöcke formatiert
       * 
       * @param el Collection von DOM-Elementen
       */
      function formatIBAN(el){
          for (let n = 0; n < el.length; n++) {
          el[n].addEventListener('input', (event) => {
              let v = event.target.value.toUpperCase().replace(/ /g, '');
              let r = '';
              for (let i = 0; i < v.length; i ++) {
                  r += v[i];
                  if ((i + 1) % 4 === 0 && i > 0) r += ' ';
              }
              event.target.value = r.trim();
              })
          }
      }

