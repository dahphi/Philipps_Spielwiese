- # ====== Shortcut: FN_DIFF_GRID ==============================
  id: 246600483802918559
  identification: 
    name: FN_DIFF_GRID

  subscription: 
    version-number: 1

  source: 
    type: HTML Text
    html-code: 'function diffGrid(o,r,t){const a=getInteractiveGridModel(o);if(a){const i=t.split(",");for(var n=0;n<i.length;n++)!function(n){var i,c;n&&(i="",c=0,a.forEach(function(t){c++;t=a.getValue(t,n);1==c?i=t:i!=t&&($("#"+o+" tr:nth-child("+(c-1)+") span."+n).closest("td").addClass(r),i=t)}))}(i[n].trim())}}'

  comments: 
    comments: |
      /**
       * P20 (Auftragshistorie): Markiert die Zellen, die sich zwischen zwei aufeinanderfolgenen 
       * Zeilen unterscheiden (siehe function diffAuftragshistorie)
       */
      function diffGrid(staticId, markerClass, columnList) {
          const IG = getInteractiveGridModel(staticId);
          if(!IG) return;
          const columns = columnList.split(',');
      
          for(var i = 0; i < columns.length; i++) {
            findDifferences(columns[i].trim());
          }
      
          function findDifferences(columnAlias) {
              if(!columnAlias) return; 
              var previousValue = "";
              var rowNumber = 0;
              IG.forEach(function(record) {
                  rowNumber++;
                  var columnValue = IG.getValue(record, columnAlias);  
                  if(rowNumber == 1) previousValue = columnValue;
                  else {
                      if(previousValue != columnValue) {
                          const upperRowSelector = '#' + staticId + ' tr:nth-child(' + (rowNumber - 1) + ')' + ' span.' + columnAlias;
                          $(upperRowSelector).closest('td').addClass(markerClass);
                          previousValue = columnValue;               
                      }
                  }           
              });       
          }    
      }

- # ====== Shortcut: FN_COPY_ELEMENT_TO_CLIPBOARD ==============
  id: 329404003636509296
  identification: 
    name: FN_COPY_ELEMENT_TO_CLIPBOARD

  subscription: 
    version-number: 1

  source: 
    type: HTML Text
    html-code: function copyElementToClipboard(t){var e=$(t).html();function a(t){t.clipboardData.setData("text/html",e),t.clipboardData.setData("text/plain",e),t.preventDefault()}document.addEventListener("copy",a),document.execCommand("copy"),document.removeEventListener("copy",a)}

  comments: 
    comments: |
      /**
      * Ermöglicht das Kopieren des Textes eines Items in die Zwischenablage. Die Funktion erwartet ein
      * beliebiges Element (Selektor, DOM-Element, jQuery-Objekt, ...), dessen Text vollständig
      * ausgelesen wird.
      */
      function copyElementToClipboard(elem) {
      
        var $elem= $(elem);
        var text= $elem.html();
      
        function listener(e) {
          e.clipboardData.setData("text/html", text);
          e.clipboardData.setData("text/plain", text);
          e.preventDefault();
        }
        document.addEventListener("copy", listener);
        document.execCommand("copy");
        document.removeEventListener("copy", listener);
      }
      

- # ====== Shortcut: FN_GET_INTERACTIVE_GRID_MODEL =============
  id: 358040518981854329
  identification: 
    name: FN_GET_INTERACTIVE_GRID_MODEL

  subscription: 
    master: 
      referenced-id: 153807022351726899

  source: 
    type: HTML Text
    html-code: |
      function getInteractiveGridModel(staticId) {
        var region = apex.region(staticId);
            if(!region) return;
        var widget = region.widget();
            if(!region) return;
        var grid = widget.interactiveGrid('getViews','grid');
            if(!grid) return;
        return grid.model;
      }

  comments: 
    comments: |
      Function zum Einsatz in diversen Seiten, wo man sich mit JavaScript auf ein Interaktives Grid beziehen möchte. Man übergibt die Static ID des Grids (wie im Page Designer bei der Region deklariert) und erhält entweder das grid.model-Objekt zurück oder undefined. Vorteil: Code-Kapselung (die IG-Methoden ändern sich oft!). Die Funktion prüft nach jeder Zuweisung, ob diese erfolgreich war, so dass niemals Methoden eines nicht existierenden Objekts aufgerufen werden, was Laufzeitfehler verursachen würde. Beispiel: Man ändert die statische ID des Grids und ermittelt das model auf herkömmliche Art, dann schlägt ggf. das gesamte JavaScript der Seite fehl!
      
      @author  Andreas Wismann  <wismann@when-others.com>
      
      @usage korrekt:
        var model = getInteractiveGridModel('meineStatischeID');
        // diese Prüfung muss erfolgen:
        if(!!model) { /* weitermachen */ }
      
      @usage anstatt wie im Internet häufig zu finden ist:
        var model = apex.region("existiertNicht").widget().interactiveGrid("getViews", "grid").model();
        // dies ergibt einen Laufzeitfehler, noch bevor man den Rückgabewert überhaupt prüfen kann

