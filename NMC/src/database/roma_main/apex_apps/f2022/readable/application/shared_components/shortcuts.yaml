- # ====== Shortcut: FN_IG_COPY_HACK ===========================
  id: 86370539562660621
  identification: 
    name: FN_IG_COPY_HACK

  subscription: 
    version-number: 4103290641894

  source: 
    type: HTML Text
    html-code: function initIgCopyHack(){document.addEventListener("copy",e=>{e.clipboardData.setData("text/plain",$(document.activeElement)[0].innerText||window.getSelection()),e.preventDefault()})}

  comments: 
    comments: |
      Ermöglicht es, den gesamten Textinhalt einer markierte Zelle im Interactive Grid in die Zwischenablage zu kopieren. Die DA ist hier zunächst nur als Zwischenspeicher für spätere Verwendung gedacht, da auf Seite 10 ein Interactive REPORT wohnt und kein GRID und dieses Problem daher in der Auftragsliste gar nicht existiert.
      @url https://www.oneoracledeveloper.com/2022/03/copy-cell-value-from-ig-global-edition.html
      
      function initIgCopyHack() {
      document.addEventListener('copy', (event) => {
          event.clipboardData.setData('text/plain', $(document.activeElement)[0].innerText || window.getSelection());
          event.preventDefault();
      });
      }

