  configuration: 
    build-option: Commented Out # 234883986660092834

  comments: 
    comments: |
      @krakar @ticket FTTH-3948: Ein Prozess hinzugefügt. Dieser setzt in den Suchbereich die Hauslaufende Nummer ein. Dieser Prozess wird nur aufgerufen, wenn diese Seite von Objektinfo aufgerufen wurde.
      @krakar @ticket FTTH-3948 @update: Der Prozess wird auskommentiert, da der Button nicht mehr diese Seite aufruft, sondern die Seite 100 

branches: 
- # ====== Branch: Aufruf aus SIEBEL: Weiter zur Erfassung =====
  id: 200420341235775229
  identification: 
    name: 'Aufruf aus SIEBEL: Weiter zur Erfassung'

  execution: 
    sequence: 10
    point: Before Header

  behavior: 
    type: Page or URL (Redirect)
    target: 
      url: 'f?p=&APP_ID.:100:&SESSION.:SIEBEL:&DEBUG.:100:P100_HAUS_LFD_NR,P100_MANDANT,P100_SIEBEL_KUNDENNUMMER,P100_KUNDENSTATUS:&P14_HAUS_LFD_NR.,&P14_MANDANT.,&P14_KUNDENNUMMER.,B&success_msg=#SUCCESS_MSG#'
      page: 100 # Vorbestellung erfassen
      request: SIEBEL
      clear-cache: 100
      values: 
        p100_haus_lfd_nr: '&P14_HAUS_LFD_NR.'
        p100_mandant: '&P14_MANDANT.'
        p100_siebel_kundennummer: '&P14_KUNDENNUMMER.'
        p100_kundenstatus: B

  server-side-condition: 
    type: Expression
    language: PL/SQL
    pl/sql-expression: |
      UPPER(:REQUEST) = 'SIEBEL' AND
      PCK_GLASCONTAINER_ORDER.SIEBEL_VORBESTELLUNG_BRANCH(
          piv_haus_lfd_nr      => :P14_HAUS_LFD_NR
         ,piv_kundennummer     => :P14_KUNDENNUMMER
         ,piv_mandant          => :P14_MANDANT
         ,pov_ausbaustatus     => :P14_AUSBAUSTATUS
         ,pov_wholebuy_partner => :P14_WHOLEBUY_PARTNER
         ,pov_technologie      => :P14_TECHNOLOGIE
         ,pov_usermessage      => :P14_USERMESSAGE
         ,pov_link_objektinfo  => :P14_LINK
      )

  security: 
    authorization-scheme: '* App - User' # 238128121341675592

  comments: 
    comments: |
      @ticket FTTH-4084. Der Aufruf der Funktion SIEBEL_VORBESTELLUNG_BRANCH hat einen doppelten Zweck:
      1. Falls ein passender Status ermittelt wird, springt der Glascontainer zur Auftragserfassung. 
      2. Zugleich werden die Werte der OUT-Parameter in den Hidden Items hinterlegt. Seite 100 holt sich diese dann ab. 
      
      Der Link aus SIEBEL hat folgendes Format:
      https://romae.netcologne.intern/ords_e/r/roma/glascontainer/vorbestellung?request=siebel&p14_haus_lfd_nr=1219352&p14_kundennummer=13003020&p14_mandant=nc

