  comments: 
    comments: |
      @ticket FTTH-4456
      Im Gegensatz zum früher verwendeten Report spielt der Status des Vermarktungsclusters zunächst keine Rolle, sondern wird farblich markiert. Die Liste mit den geforderten Technologien entfällt ebenfalls, da (After Daily vom 2025-02-19) es überhaupt keine anderen in einem Vermarktungscluster gibt. Wichtig für das dynamische SQL: Es MUSS mit einer WHERE-Klausel enden (hier also: WHERE 1=1), da sonst die Funktion fcl_adress_where_query keine sinnvolle Ergänzung hinzufügt!

