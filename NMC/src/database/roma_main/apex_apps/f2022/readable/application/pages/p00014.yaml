- # ====== Region: Vermarktungsfähige Adressen: ================
  id: 61956175630854131
  identification: 
    name: 'Vermarktungsfähige Adressen:'
    type: Interactive Grid

  source: 
    location: Local Database
    type: Function Body returning SQL Query
    language: PL/SQL
    pl/sql-function-body-returning-sql-query: |
      DECLARE
        cl_sql CLOB := q'[
      SELECT a.haus_lfd_nr haus_lfd_nr_return
           , a.haus_lfd_nr haus_lfd_nr_display
           , a.plz
           , a.ort_kompl AS ORT
           , a.str
           , a.hnr_kompl AS HNR
           , a.gebaeudeteil_name AS GEBAEUDETEIL     
           , vc.vc_lfd_nr
           , vc.status
           , vc.bezeichnung as vermarktungscluster
           , vc.mindestbandbreite
           , vc.zielbandbreite_geplant
           , vc.wholebuy
        FROM v_adressen a
        JOIN vermarktungscluster_objekt vco on (a.haus_lfd_nr = vco.haus_lfd_nr)
        JOIN vermarktungscluster vc ON (vc.vc_lfd_nr = vco.vc_lfd_nr)
       WHERE vc.status in ('PREMARKETING', 'UNDERCONSTRUCTION')
              AND vc.dnsttp_lfd_nr IN (
                   51 -- FTTB
                  ,70 -- FTTH
                  ,71 -- G.fast
                  ,89 -- FTTH BSA L2
                  ,90 -- FTTH BSA L2 DG
             )
       ]';
      
      BEGIN
      
        RETURN cl_sql 
               || pck_strav_query.fcl_adress_where_query
                  (
                       piv_search_all   => :P14_SEARCH_ALL
                     , piv_do_search    => 'Y'
                     , piv_alias        => 'a'
                  )
        ;
      END;
      
    page-items-to-submit: 
    - P14_SEARCH_ALL

