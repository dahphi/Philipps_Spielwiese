processes: 
- # ====== Process: Parse JSON =================================
  id: 301500975145519724
  identification: 
    name: Parse JSON
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      DECLARE -- alle DATE-Felder benötigen eine Extrabehandlung:
        v_created DATE;
        v_last_modified DATE;
        v_process_lock_last_modified DATE;
        v_cancel_date DATE;
      BEGIN
          PCK_GLASCONTAINER.parse_preorder(
                   pic_preorder_json                  => :P901_JSON
                  ,pov_uuid                           => :P901_UUID
                  ,pov_vkz                            => :P901_VKZ
                  ,pov_kundennummer                   => :P901_CUSTOMERNUMBER
                  ,pov_promotion                      => :P901_TEMPLATEID
                  ,pov_router_auswahl                 => :P901_DEVICECATEGORY
                  ,pov_router_eigentum                => :P901_DEVICEOWNERSHIP
                  ,pov_ont_provider                   => :P901_ONT_PROVIDER
                  ,pov_installationsservice           => :P901_INSTALLATIONSERVICE
                  ,pov_haus_anschlusspreis            => :P901_HOUSECONNECTIONPRICE
                  ,pov_mandant                        => :P901_CLIENT
                  ,pov_firmenname                     => :P901_CUSTOMER_BUSINESSNAME
                  ,pov_anrede                         => :P901_CUSTOMER_SALUTATION
                  ,pov_titel                          => :P901_CUSTOMER_TITLE
                  ,pov_vorname                        => :P901_CUSTOMER_NAME_FIRST
                  ,pov_nachname                       => :P901_CUSTOMER_NAME_LAST
                  ,pod_geburtsdatum                   => :P901_CUSTOMER_BIRTHDATE
                  ,pov_email                          => :P901_CUSTOMER_EMAIL
                  ,pov_wohndauer                      => :P901_CUSTOMER_RESIDENTSTATUS
                  ,pov_laendervorwahl                 => :P901_CUSTOMER_PHONE_COUNTRYCODE
                  ,pov_vorwahl                        => :P901_CUSTOMER_PHONE_AREACODE
                  ,pov_telefon                        => :P901_CUSTOMER_PHONE_NUMBER
               -- ,pov_passwort                       => :P901_CUSTOMER_PASSWORD -- entfernt 2025-01-21
              --                                        
                  ,pov_providerwechsel                => :P901_PROVIDERWECHSEL
                  ,pov_providerw_aktueller_anbieter   => :P901_PROVIDERCHG_CURRENT_PROVIDER
                  ,pov_providerw_anschluss_gekuendigt => :P901_PROVIDERCHG_CONTRACT_CANCELLED
                  ,pov_providerw_kuendigungsdatum     => :P901_PROVIDERCHG_CANCELLATION_DATE
                  ,pov_providerw_anmeldung_anrede     => :P901_PROVIDERCHG_OWNER_SALUTATION
                  ,pov_providerw_anmeldung_nachname   => :P901_PROVIDERCHG_OWNER_NAME_LAST
                  ,pov_providerw_anmeldung_vorname    => :P901_PROVIDERCHG_OWNER_NAME_FIRST
                  ,pov_providerw_nummer_behalten      => :P901_PROVIDERCHG_KEEP_PHONE_NUMBER
                  ,pov_providerw_laendervorwahl       => :P901_PROVIDERCHG_PHONE_COUNTRYCODE
                  ,pov_providerw_vorwahl              => :P901_PROVIDERCHG_PHONE_AREACODE
                  ,pov_providerw_telefon              => :P901_PROVIDERCHG_PHONE_NUMBER
              --                                       
                  ,pov_kontoinhaber                   => :P901_ACCOUNT_HOLDER
                  ,pov_sepa                           => :P901_ACCOUNT_SEPAMANDATE
                  ,pov_iban                           => :P901_ACCOUNT_IBAN
              --
                  ,pov_voradresse_strasse             => :P901_CUSTOMER_PREV_ADDR_STREET
                  ,pov_voradresse_hausnr              => :P901_CUSTOMER_PREV_ADDR_HOUSENUMBER
                  ,pov_voradresse_zusatz              => :P901_CUSTOMER_PREV_ADDR_ADDITION
                  ,pov_voradresse_plz                 => :P901_CUSTOMER_PREV_ADDR_ZIPCODE
                  ,pov_voradresse_ort                 => :P901_CUSTOMER_PREV_ADDR_CITY
                  ,pov_voradresse_land                => :P901_CUSTOMER_PREV_ADDR_COUNTRY
              -- 
                  ,pov_haus_lfd_nr                    => :P901_HOUSESERIALNUMBER
                  ,pov_gee_rolle                      => :P901_PROP_OWNER_ROLE
                  ,pov_anzahl_we                      => :P901_PROP_RESIDENTIAL_UNIT
                  ,pov_vermieter_rechtsform           => :P901_LANDLORD_LEGALFORM
                  ,pov_vermieter_firmenname           => :P901_LANDLORD_BUSINESSNAME
                  ,pov_vermieter_anrede               => :P901_LANDLORD_SALUTATION
                  ,pov_vermieter_titel                => :P901_LANDLORD_TITLE
                  ,pov_vermieter_vorname              => :P901_LANDLORD_NAME_FIRST
                  ,pov_vermieter_nachname             => :P901_LANDLORD_NAME_LAST
                  ,pov_vermieter_strasse              => :P901_LANDLORD_ADDR_STREET
                  ,pov_vermieter_hausnr               => :P901_LANDLORD_ADDR_HOUSENUMBER
                  ,pov_vermieter_plz                  => :P901_LANDLORD_ADDR_ZIPCODE
                  ,pov_vermieter_ort                  => :P901_LANDLORD_ADDR_CITY
                  ,pov_vermieter_zusatz               => :P901_LANDLORD_ADDR_ADDITION
                  ,pov_vermieter_land                 => :P901_LANDLORD_ADDR_COUNTRY
                  ,pov_vermieter_email                => :P901_LANDLORD_EMAIL
                  ,pov_vermieter_laendervorwahl       => :P901_LANDLORD_PHONE_COUNTRYCODE
                  ,pov_vermieter_vorwahl              => :P901_LANDLORD_PHONE_AREACODE
                  ,pov_vermieter_telefon              => :P901_LANDLORD_PHONE_NUMBER
                  ,pov_vermieter_einverstaendnis      => :P901_LANDLORD_AGREED
                  ,pov_bestaetigung_vzf               => :P901_SUMM_PRECONTRACTINFORMATION
                  ,pov_zustimmung_agb                 => :P901_SUMM_GENERALTERMSANDCONDITIONS
                  ,pov_zustimmung_widerruf            => :P901_SUMM_WAIVERIGHTOFREVOCATION
                  ,pov_opt_in_email                   => :P901_SUMM_EMAILMARKETING
                  ,pov_opt_in_telefon                 => :P901_SUMM_PHONEMARKETING
                  ,pov_opt_in_sms_mms                 => :P901_SUMM_SMSMMSMARKETING
                  ,pov_opt_in_post                    => :P901_SUMM_MAILMARKETING
                  ,pov_vertragszusammenfassung        => :P901_SUMM_ORDERSUMMARYFILEID
                  ,pov_status                         => :P901_STATE
                  ,pov_customer_upd_email             => :P901_CUSTOMER_UPD_EMAIL
                  ,pov_is_new_customer                => :P901_IS_NEW_CUSTOMER
                  ,pod_created                        => v_created
                  ,pod_last_modified                  => v_last_modified
                  ,pov_version                        => :P901_VERSION
                  ,pov_changed_by                     => :P901_CHANGED_BY
                  ,pov_process_lock                   => :P901_PROCESS_LOCK
                  ,pod_process_lock_last_modified     => v_process_lock_last_modified
                  ,pov_storno_username                => :P901_CANCELLED_BY
                  ,pov_storno_grund                   => :P901_CANCEL_REASON
                  ,pod_storno_datum                   => v_cancel_date
                  ,pov_siebel_order_number            => :P901_SIEBEL_ORDER_NUMBER
                  ,pov_siebel_order_rowid             => :P901_SIEBEL_ORDER_ROWID
                  ,pov_siebel_ready                   => :P901_SIEBEL_READY
                  ,pov_service_plus_email             => :P901_SERVICE_PLUS_EMAIL
                  ,pov_wholebuy_partner               => :P901_WHOLEBUY_PARTNER
                  ,pov_manual_transfer                => :P901_MANUAL_TRANSFER
                  ,pov_technology                     => :P901_TECHNOLOGY
              -- neu 2024-08-21 @ticket FTTH-3727 @SYNC #19
                  ,pov_connectivity_id                => :P901_CONNECTIVITY_ID
                  ,pov_rt_contact_data_ticket_id      => :P901_RT_CONTACT_DATA_TICKET_ID
                  ,pov_landlord_information_required  => :P901_LANDLORD_INFORMATION_REQUIRED
              -- neu 2024-08-23 @ticket FTTH-3711 @krakar
                  ,pov_customer_upd_phone_countrycode => :P901_CUSTOMER_UPD_PHONE_COUNTRYCODE
                  ,pov_customer_upd_phone_areacode    => :P901_CUSTOMER_UPD_PHONE_AREACODE
                  ,pov_customer_upd_phone_number      => :P901_CUSTOMER_UPD_PHONE_NUMBER
                  ,pov_update_customer_in_siebel      => :P901_UPDATE_CUSTOMER_IN_SIEBEL
                  ,pov_home_id                        => :P901_HOME_ID
                  ,pov_account_id                     => :P901_ACCOUNT_ID
                  ,pod_availability_date              => :P901_AVAILABILITY_DATE
          );
          :P901_CREATED                    := TO_CHAR(v_created, '&FM_TIMESTAMP.');
          :P901_LAST_MODIFIED              := TO_CHAR(v_last_modified, '&FM_TIMESTAMP.');
          :P901_PROCESS_LOCK_LAST_MODIFIED := TO_CHAR(v_process_lock_last_modified, '&FM_TIMESTAMP.');
          :P901_CANCEL_DATE                := TO_CHAR(v_cancel_date, '&FM_TIMESTAMP.');
      
          PCK_GLASCONTAINER.p_get_adresse(
              pin_haus_lfd_nr   => :P901_HOUSESERIALNUMBER
            , pov_str           => :P901_ANSCHLUSS_STR
            , pov_hnr_kompl     => :P901_ANSCHLUSS_HNR_KOMPL
            , pov_gebaeudeteil  => :P901_ANSCHLUSS_GEBAEUDETEIL
            , pov_plz           => :P901_ANSCHLUSS_PLZ
            , pov_ort_kompl     => :P901_ANSCHLUSS_ORT_KOMPL
            , pov_adresse_kompl => :P901_ANSCHLUSS_ADRESSE_KOMPL
          );
      END;

  execution: 
    sequence: 10
    point: After Submit
    run-process: Once Per Page Visit (default)

  error: 
    display-location: Inline in Notification

  server-side-condition: 
    when-button-pressed: BTN_PARSE_JSON # 301501295418519727
    type: Item is NOT NULL
    item: P901_JSON

  comments: 
    comments: Parst das JSON-Feld und verteilt die ermittelten Informationen auf die entsprechenden Page Items

