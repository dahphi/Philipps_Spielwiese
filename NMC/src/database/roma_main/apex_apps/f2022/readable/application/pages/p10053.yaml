- # ====== Region: APEX Activity Logs ==========================
  id: 259136142991772335
  identification: 
    name: APEX Activity Logs
    type: Interactive Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      SELECT TIME_STAMP
           , COMPONENT_TYPE
           , COMPONENT_NAME
           , COMPONENT_ATTRIBUTE
           , INFORMATION
           , ELAP
           , NUM_ROWS
           , USERID
           , ORA_HASH(USERID) AS USERID_HASH
           , IP_ADDRESS
           , USER_AGENT
           , STEP_ID
           , SESSION_ID
           , SQLERRM
           , SQLERRM_COMPONENT_TYPE
           , SQLERRM_COMPONENT_NAME
           , PAGE_MODE
           , APPLICATION_INFO
           , WORKSHEET_ID
           , IR_SEARCH
           , IR_REPORT_ID
           , CONTENT_LENGTH
        FROM apex_activity_log
       WHERE FLOW_ID = :APP_ID
         AND STEP_ID <> :APP_PAGE_ID

