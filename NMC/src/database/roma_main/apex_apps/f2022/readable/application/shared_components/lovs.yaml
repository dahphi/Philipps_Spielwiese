- # ====== List of Values: VKZ (GEKÜRZT) =======================
  id: 68501681233936848
  identification: 
    name: VKZ (GEKÜRZT)

  subscription: 
    version-number: 4069294721962

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      SELECT VKZ || '...' AS D, VKZ AS R FROM (
