- # ====== List of Values: WOHNDAUER (OHNE NO_RESIDENT) ========
  id: 232472978582298337
  identification: 
    name: WOHNDAUER (OHNE NO_RESIDENT)

  subscription: 
    version-number: 1

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      SELECT CASE r
               WHEN 'RESIDENT_LESS_THAN_SIX_MONTHS' THEN 'nein'
               WHEN 'RESIDENT_SIX_OR_MORE_MONTHS'   THEN 'ja'
             END AS D
           , r
        FROM TABLE(PCK_GLASCONTAINER.LOV('residentStatus'))
       WHERE r <> 'NO_RESIDENT'
       ORDER BY
             CASE r
               WHEN 'RESIDENT_SIX_OR_MORE_MONTHS' THEN 1     
               WHEN 'RESIDENT_LESS_THAN_SIX_MONTHS'   THEN 2
             END

  column-mapping: 
    return: R
    display: D
    default-sort: Use Order By from Query

