- # ====== List of Values: JAHRE ===============================
  id: 216097681362173616
  identification: 
    name: JAHRE

  subscription: 
    version-number: 1

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      SELECT JAHR AS D, JAHR AS R FROM (
          SELECT TO_CHAR(ADD_MONTHS(TRUNC(SYSDATE, 'YYYY'), -12*LEVEL+24), 'YYYY') AS JAHR
            FROM DUAL
         CONNECT BY LEVEL <= 12
      )

  column-mapping: 
    return: R
    display: D
    default-sort: R
    sort-direction: Descending (Nulls First)

