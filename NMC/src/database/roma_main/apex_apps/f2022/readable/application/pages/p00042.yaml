processes: 
- # ====== Process: Felder vorbelegen ==========================
  id: 296771273302326840
  identification: 
    name: Felder vorbelegen
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      SELECT customer_name_last
           , customer_name_first
           , customer_businessname
           , install_addr_street
           , trim(install_addr_housenumber || ' ' || install_addr_addition)
           , install_addr_zipcode
           , install_addr_city
           , account_iban
        INTO :P42_NACHNAME
           , :P42_VORNAME
           , :P42_FIRMENNAME
           , :P42_STRASSE
           , :P42_HAUSNUMMER
           , :P42_PLZ
           , :P42_ORT
           , :P42_IBAN
        FROM FTTH_WS_SYNC_PREORDERS
       WHERE ID = :P42_UUID
      ;

  execution: 
    sequence: 10
    point: Before Header
    run-process: Once Per Page Visit (default)

  server-side-condition: 
    type: Item is NOT NULL
    item: P42_UUID

branches: 
- # ====== Branch: Berechtigung fehlt ==========================
  id: 248954640589410498
  identification: 
    name: Berechtigung fehlt

  execution: 
    sequence: 30
    point: Before Header

  behavior: 
    type: Page or URL (Redirect)
    target: 
      url: 'f?p=&APP_ID.:10050:&SESSION.::&DEBUG.::P10050_APPLIKATIONSSEITE,P10050_ROLLE_ERFORDERLICH:Fuzzy-Direktabfrage,SUPERUSER&success_msg=#SUCCESS_MSG#'
      page: 10050 # Glascontainer - Über diese Anwendung
      values: 
