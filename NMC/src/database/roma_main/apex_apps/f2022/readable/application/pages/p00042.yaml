- # ====== Region: Fuzzy-Suchergebnisse ========================
  id: 296768738751326814
  identification: 
    name: Fuzzy-Suchergebnisse
    type: Interactive Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      WITH FUZZY AS (
      SELECT  'PHO' AS SUCHTYP
             ,row_id
             ,score
             ,vorname
             ,nachname
             ,geburtsdatum
             ,firmenname
             ,strasse
             ,hausnummer
             ,plz
             ,ort
             ,iban
      FROM TABLE(
          PCK_FUZZYDOUBLE.ft_phonetic_search(
               piv_nachname   => :P42_NACHNAME
              ,piv_vorname    => :P42_VORNAME
              ,piv_firmenname => :P42_FIRMENNAME
              ,piv_strasse    => :P42_STRASSE
              ,piv_hausnummer => :P42_HAUSNUMMER
              ,piv_plz        => :P42_PLZ
              ,piv_ort        => :P42_ORT
              ,pin_ignore_service_errors => :P10100_IGNORE_FUZZY_SERVICE_ERRORS
              )
          )
      UNION ALL
      SELECT 'IBAN' AS SUCHTYP
             ,row_id
             ,score
             ,vorname
             ,nachname
             ,geburtsdatum
             ,firmenname
             ,strasse
             ,hausnummer
             ,plz
             ,ort
             ,iban
         FROM TABLE(PCK_FUZZYDOUBLE.ft_doublet_check_bank(
                       piv_iban => :P42_IBAN
                     , pin_ignore_service_errors => :P10100_IGNORE_FUZZY_SERVICE_ERRORS
                 )
             )
      )
      SELECT  FUZZY.SUCHTYP
             ,FUZZY.row_id
             ,FUZZY.score
             ,TO_CHAR(NULL) AS KUNDENNUMMER
             ,FUZZY.vorname
             ,FUZZY.nachname
             ,FUZZY.geburtsdatum
             ,FUZZY.firmenname
             ,FUZZY.strasse
             ,FUZZY.hausnummer
             ,FUZZY.plz
             ,FUZZY.ort
             ,FUZZY.iban
         FROM FUZZY
      ---   LEFT JOIN v_apx_gc_customerdata@siebp.netcologne.intern@siebel_inf SIEBEL -- 2023-02-23: knallt in der Produktion
      ---     ON (FUZZY.row_id = SIEBEL.GLOBAL_ID)
       WHERE FUZZY.score >= COALESCE(:P10100_FUZZY_MIN_SCORE_PHO, 80) -- sonst ufert das aus!

  layout: 
    sequence: 20
    parent-region: No Parent
    slot: BODY
    start-new-layout: false
