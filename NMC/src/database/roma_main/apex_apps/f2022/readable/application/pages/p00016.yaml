    language: PL/SQL
    pl/sql-code: |
      PCK_GLASCONTAINER.track_page(
          piv_app_id      => :APP_ID
        , piv_app_page_id => :APP_PAGE_ID
        , pin_app_session => :APP_SESSION
        , piv_request     => :REQUEST
        , piv_task        => :P14_TASK
      );
      

  execution: 
    sequence: 10
    point: Before Header
    run-process: Once Per Page Visit (default)

  comments: 
    comments: '@ticket FTTH-4815, FTTH-4456: Erzeugt ein Tracking-Event, wenn das Hinweis-Modal angezeigt wird.'

- # ====== Process: Daten holen ================================
  id: 82045142468968890
  identification: 
    name: Daten holen
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      -- Adresse ermitteln:
      SELECT ADRESSE_KOMPL
        INTO :P16_ADRESSE
        FROM v_adressen
       WHERE haus_lfd_nr = :P16_HAUS_LFD_NR;
      
      :P16_HREF_SIEBEL := PCK_GLASCONTAINER_ORDER.fv_href_siebel;

  execution: 
    sequence: 20
    point: Before Header
    run-process: Once Per Page Visit (default)

  server-side-condition: 
    type: Item is NOT NULL
    item: P16_HAUS_LFD_NR

