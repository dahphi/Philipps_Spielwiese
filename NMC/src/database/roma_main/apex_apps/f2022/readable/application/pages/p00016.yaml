dynamic-actions: 
- # ====== Dynamic Action: Siebel öffnen =======================
  id: 82046376776968903
  identification: 
    name: Siebel öffnen

  execution: 
    sequence: 10
    event-scope: Static
    type: Immediate

  when: 
    event: Click
    selection-type: Button
    button: BTN_SIEBEL # 82046250551968901

  comments: 
    comments: Öffnet Siebel in einem neuen Browser-Tab und schließt den Adresscheck-Dialog, damit dieser nicht mehr zu sehen ist, wenn der Benutzer in den Glascontainer zurückkehrt

  actions: 
  - # ====== Action: Link ermitteln und in neuem Tab öffnen ======
    id: 82046549516968904
    identification: 
      name: Link ermitteln und in neuem Tab öffnen
      action: Execute JavaScript Code

    settings: 
      code: |
        let href = '&P16_HREF_SIEBEL.';
        if(!!href) {
            window.open(href, '_blank').focus();
        }

    execution: 
      sequence: 10
      event: Siebel öffnen # 82046376776968903
      fire-when-event-result-is: True
      fire-on-initialization: false

  - # ====== Action: Dialogfenster Adresscheck schließen =========
    id: 82046778811968907
    identification: 
      name: Dialogfenster Adresscheck schließen
      action: Close Dialog

    execution: 
      sequence: 20
      event: Siebel öffnen # 82046376776968903
      fire-when-event-result-is: True
      fire-on-initialization: false

processes: 
- # ====== Process: Dialog schließen (BTN_CLOSE) ===============
  id: 77931772563578834
