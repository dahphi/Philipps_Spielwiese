  comments: 
    comments: Zentrales Login-Verfahren für alle APEX-Anwendungen im Schema ROMA_MAIN. "SSO" steht für "Single Sign On"; geprüft wird auf das Vorhandensein der Webserver-Headervariablen "SSOUSER". Das Setting "Verify Username" bestimmt, ob diese Abfrage "After Login", also einmalig nach dem Login stattfindet (Standard) oder bei jedem Seitenzugriff ("Each Request").

