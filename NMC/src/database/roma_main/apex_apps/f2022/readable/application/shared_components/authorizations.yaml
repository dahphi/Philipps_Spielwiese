- # ====== Authorization: * App - ReadOnly =====================
  id: 235084824408102045
  identification: 
    name: '* App - ReadOnly'

  subscription: 
    version-number: 1

  authorization-scheme: 
    type: PL/SQL Function Returning Boolean

  settings: 
    pl/sql-function-body: |
      DECLARE
        berechtigt BOOLEAN;
      BEGIN
        berechtigt := PCK_GLASCONTAINER.fb_hat_rolle(
          piv_username     => :APP_USER
         ,piv_rolle        => PCK_GLASCONTAINER.C_ROLLE_READONLY
         ,piv_rollenliste  => NULL --- CASE :G_INIT_FLAG WHEN '1' THEN :G_ROLLENLISTE END
        );
        IF berechtigt THEN
          PCK_GLASCONTAINER.p_rolle_hinzufuegen(
              piv_rolle        => PCK_GLASCONTAINER.C_ROLLE_READONLY
             ,piov_rollenliste => :G_ROLLENLISTE
          );
        END IF;
        RETURN berechtigt;
      END;

  server-cache: 
    evaluation-point: Once per Page View

  error: 
    error-message: Berechtigung fehlt

  comments: 
    comments: |
      @ticket FTTH-2722:
      Entweder gehört der User zur Benutzergruppe "ReadOnly"
      oder (außer in der Produktion NMC, siehe @ticket FTTH-1332) zur Gruppe "ReadOnly (externe Entwickler)".
      Shared Components > Security Attributes > Authorization > "Run on Public Pages" muss eingeschaltet sein.

