- # ====== Process: Daten abrufen ==============================
  id: 241093221661968127
  identification: 
    name: Daten abrufen
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      SELECT LOG_ID, LINE, ERROR_CODE
           , INSERTED, TO_CHAR(INSERTED, 'YYYY-MM-DD HH24:MI:SS') AS DATUM, SCOPE, USER_NAME, MODULE, ACTION, ROUTINE_NAME
           , ERROR_MESSAGE, MESSAGE
        INTO :P10052_LOG_ID_DISPLAY
           , :P10052_LINE
           , :P10052_ERROR_CODE
      	 , :P10052_INSERTED
               , :P10052_DATUM
      	 , :P10052_SCOPE
      	 , :P10052_USER_NAME
      	 , :P10052_MODULE
      	 , :P10052_ACTION
      	 , :P10052_ROUTINE_NAME
      	 , :P10052_ERROR_MESSAGE
      	 , :P10052_MESSAGE
        FROM LOGS
       WHERE LOG_ID = :P10052_LOG_ID;

  execution: 
    sequence: 20
    point: Before Header
    run-process: Once Per Page Visit (default)

