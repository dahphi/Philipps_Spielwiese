processes: 
- # ====== Process: AD_SIMULATION ==============================
  id: 251250883415572593
  identification: 
    name: AD_SIMULATION
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      DECLARE
        v_rollenname_ad VARCHAR2(1000);
      BEGIN
        v_rollenname_ad := PCK_GLASCONTAINER.fv_rollenname_ad(:P1_ROLLE); 
        :G_INIT_FLAG := '1';
        :G_ROLLENLISTE := PCK_GLASCONTAINER.fv_rollenliste(v_rollenname_ad);
      END;

  execution: 
    sequence: 10
    point: After Submit
    run-process: Once Per Page Visit (default)

  success-message: 
    success-message: Rolle wurde geändert zu &P1_ROLLE.

  error: 
    display-location: Inline in Notification

  server-side-condition: 
    when-button-pressed: BTN_REDIRECT # 251251299268572597

  configuration: 
    build-option: DEV oder TEST # 228976553402207959

  comments: 
    comments: '@ticket FTTH-2722: Setzt die neue Rolle im Application Item :G_ROLLENLISTE'

