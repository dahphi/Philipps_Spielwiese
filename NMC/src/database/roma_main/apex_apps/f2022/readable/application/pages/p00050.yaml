- # ====== Region: Stornierung =================================
  id: 304102547492897241
  identification: 
    name: Stornierung
    type: Interactive Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      SELECT WS.ID,
             WS.APP_USER,
             PRE.CUSTOMERNUMBER AS KUNDENNUMMER,
             PRE.CUSTOMER_NAME_LAST AS NACHNAME,
             PRE.CUSTOMER_NAME_FIRST AS VORNAME,
             WS.UHRZEIT,
             WS.PARAMETER_VALUES,
             WS.BODY, -- {"cancellationReason":"ORDER_RESUBMITTED","user":"MARLIL"}
             WS.RESPONSE_STATUSCODE,
             '//// Stornogrund' AS STORNOGRUND
        FROM FTTH_WEBSERVICE_AUFRUFE WS
        LEFT JOIN FTTH_WS_SYNC_PREORDERS PRE ON (PRE.ID = WS.PARAMETER_VALUES)
       WHERE APPLICATION = 'PCK_GLASCONTAINER'
         AND METHOD = 'POST'
         AND REQUEST_URL LIKE '%/cancel'
        ORDER BY ID DESC;
      

