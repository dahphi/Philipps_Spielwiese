processes: 
- # ====== Process: Mindestdatum 2024-09-20 ====================
  id: 56538499442052151
  identification: 
    name: Mindestdatum 2024-09-20
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      :P10056_DATUM_VON := TO_DATE(GREATEST(DATE '2024-10-31', NVL(:P10056_DATUM_VON, TRUNC(SYSDATE))));
      :P10056_DATUM_BIS := TO_DATE(:P10056_DATUM_VON);

  execution: 
    sequence: 30
    point: Processing
    run-process: Once Per Page Visit (default)

  success-message: 
    success-message: Nutzungsdaten werden seit dem 31. Oktober 2024 erhoben.

  error: 
    display-location: Inline in Notification

  server-side-condition: 
    type: Expression
    language: PL/SQL
    pl/sql-expression: "NVL(TO_DATE(:P10056_DATUM_VON), SYSDATE) < DATE '2024-10-31'"

  comments: 
    comments: Das Datum, an dem das Tracking in der Produktion begonnen hat, ist der 20. Septempber 2024, damals allerdings noch mit einem einfacheren Datenmodell. Seit dem 31.10. wird in der Produktion auch dann getrackt, wenn es nicht zu einem Abschluss kommt. Das Startdatum für die Auswertungen darf nicht vor dem 31.01.2024 liegen, weil sonst keine konsistenten Ergebnisse herauskommen.

- # ====== Process: Datumsbereich korrigieren ==================
  id: 56538649646052152
  identification: 
    name: Datumsbereich korrigieren
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      DECLARE
        v_swap DATE;  
      BEGIN
        v_swap := TO_DATE(:P10056_DATUM_BIS);
        :P10056_DATUM_BIS := :P10056_DATUM_VON;
        :P10056_DATUM_VON := v_swap;
      END;

  execution: 
    sequence: 20
    point: Processing
    run-process: Once Per Page Visit (default)

  success-message: 
    success-message: Zeitfenster (von ... bis) wurde korrigiert

  error: 
    display-location: Inline in Notification

  server-side-condition: 
    when-button-pressed: BTN_AKTUALISIEREN # 56537992745052145
    type: Expression
    language: PL/SQL
    pl/sql-expression: 'TO_DATE(:P10056_DATUM_VON) > TO_DATE(:P10056_DATUM_BIS)'

  comments: 
    comments: Wenn VON > BIS, drehen wir die Datumsfelder um

- # ====== Process: Leeres Datum mit SYDATE füllen =============
  id: 56538765106052153
  identification: 
    name: Leeres Datum mit SYDATE füllen
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      IF :P10056_DATUM_VON IS NULL THEN 
         :P10056_DATUM_VON := TRUNC(TO_DATE(GREATEST(COALESCE(TO_DATE(:P10056_DATUM_BIS), SYSDATE), DATE '2024-09-20')));
      END IF;
      
      IF :P10056_DATUM_BIS IS NULL THEN 
         :P10056_DATUM_BIS := TRUNC(TO_DATE(GREATEST(COALESCE(TO_DATE(:P10056_DATUM_VON), SYSDATE), TRUNC(SYSDATE))));
      END IF;

  execution: 
    sequence: 10
    point: Processing
    run-process: Once Per Page Visit (default)

  success-message: 
    success-message: Datumseingabe wurde korrigiert.

  error: 
    display-location: Inline in Notification

  server-side-condition: 
    when-button-pressed: BTN_AKTUALISIEREN # 56537992745052145
    type: Expression
    language: PL/SQL
    pl/sql-expression: |
      :P10056_DATUM_VON IS NULL OR
      :P10056_DATUM_BIS IS NULL

- # ====== Process: Zeitraum 30 Tage ===========================
  id: 74687423348597914
  identification: 
    name: Zeitraum 30 Tage
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      :P10056_DATUM_VON := TRUNC(SYSDATE - 30);
      :P10056_DATUM_BIS := TRUNC(SYSDATE);

  execution: 
    sequence: 40
    point: After Submit
    run-process: Once Per Page Visit (default)

  error: 
    display-location: Inline in Notification

  server-side-condition: 
    when-button-pressed: BTN_ZEITRAUM_30_TAGE # 74687094022597911

  comments: 
    comments: Stellt das Zeitfenster auf die vergangenen 30 Tage ein.

- # ====== Process: Zeitraum Quartal ===========================
  id: 74687560643597915
  identification: 
    name: Zeitraum Quartal
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      :P10056_DATUM_VON := TRUNC(SYSDATE, 'Q');
      -- nicht auf das Quartalsende einstellen, weil dies fast niemals der aktuelle Tag ist:
      -- :P10056_DATUM_BIS := LAST_DAY(ADD_MONTHS(TRUNC(SYSDATE, 'Q'),2));
      -- sondern: heute
      :P10056_DATUM_BIS := TRUNC(SYSDATE);

  execution: 
    sequence: 50
    point: After Submit
    run-process: Once Per Page Visit (default)

  error: 
    display-location: Inline in Notification

  server-side-condition: 
    when-button-pressed: BTN_ZEITRAUM_QUARTAL # 74687361353597913

  comments: 
    comments: Stellt das Startdatum auf den Beginn des aktuellen Quartals ein (Endedatum ist immer "heute")

- # ====== Process: Zeitraum KW davor ==========================
  id: 74687899860597919
  identification: 
    name: Zeitraum KW davor
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      :P10056_DATUM_VON := TRUNC(TO_DATE(:P10056_DATUM_VON) - 7, 'iw');
      :P10056_DATUM_BIS := TO_DATE(:P10056_DATUM_VON) + 7;

  execution: 
    sequence: 20
    point: After Submit
    run-process: Once Per Page Visit (default)

  error: 
    display-location: Inline in Notification

  server-side-condition: 
    when-button-pressed: BTN_ZEITRAUM_KW_DAVOR # 74687716446597917

  comments: 
    comments: Stellt das Zeitfenster auf die Kalenderwoche ein, die vor dem momentan dargestellten Startdatum liegt.

