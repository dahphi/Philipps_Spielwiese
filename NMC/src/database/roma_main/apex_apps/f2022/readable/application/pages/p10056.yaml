- # ====== Region: Bestellungen: Response Statuscodes (Backend S
  id: 82045234387968891
  identification: 
    name: 'Bestellungen: Response Statuscodes (Backend Server)'
    type: Interactive Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      select datum, sum(OK) as OK, sum(nok) as NOK
        from (
          select trunc(uhrzeit) as datum
               , CASE WHEN response_statuscode  = '200' THEN 1 END AS OK
               , CASE WHEN response_statuscode <> '200' THEN 1 END AS NOK
            from ftth_webservice_aufrufe
           where scope = 'p_internal_order_post' 
      )
       group by datum

  layout: 
