- # ====== Process: Gültigkeit Datumseingabe prüfen ============
  id: 74688130114597921
  identification: 
    name: Gültigkeit Datumseingabe prüfen
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      :P10056_DATUM_VON := TO_DATE(:P10056_DATUM_VON DEFAULT NULL ON CONVERSION ERROR);
      :P10056_DATUM_BIS := TO_DATE(:P10056_DATUM_BIS DEFAULT NULL ON CONVERSION ERROR);

  execution: 
    sequence: 10
    point: After Submit
    run-process: Once Per Page Visit (default)

  error: 
    display-location: Inline in Notification

  comments: 
    comments: Stellt sicher, dass die Benutzereingabe nicht zu Fehlermeldungen führt, wenn es sich nicht um ein gültiges Datum handelt. In diesem Fall wird NULL eingesetzt (im Nachfolgeprozess wird NULL mit SYSDATE ersetzt)

