- # ====== Region: Auswertung über alle VKZ im Zeitraum &P10056_
  id: 68201638654631824
  identification: 
    name: Auswertung über alle VKZ im Zeitraum &P10056_DATUM_VON. &ndash; &P10056_DATUM_BIS.
    type: Interactive Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      SELECT VKZ || '...' AS VKZ, COUNT(*) AS ANZAHL_BESTELLUNGEN
        FROM (
           SELECT MAX(TASK_VKZ) AS VKZ
            FROM V_POB_TRACKING
            WHERE TRUNC(DATUM) BETWEEN TO_DATE(:P10056_DATUM_VON) AND TO_DATE(:P10056_DATUM_BIS)
              AND TASK IS NOT NULL
              AND TASK_VKZ IS NOT NULL
              AND SCOPE >= 99
            GROUP BY TASK
      ) GROUP BY VKZ  
      

  layout: 
    sequence: 50
    parent-region: No Parent
    slot: BODY
    start-new-layout: false
    start-new-row: true
