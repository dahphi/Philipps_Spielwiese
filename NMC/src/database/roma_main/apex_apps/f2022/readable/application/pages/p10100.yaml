- # ====== Dynamic Action: Fuzzy-Wöchentlich Zeitplan aktivieren
  id: 290688051562424838
  identification: 
    name: Fuzzy-Wöchentlich Zeitplan aktivieren

  execution: 
    sequence: 10
    event-scope: Dynamic
    static-container-(jquery-selector): '#fuzzyJobsEinstellungen'
    type: Immediate

  when: 
    event: Click
    selection-type: jQuery Selector
    jquery-selector: button.fuzzy-scheduler.woechentlich.job-disabled

  actions: 
  - # ====== Action: Execute Server-side Code ====================
    id: 296766589906326793
    identification: 
      action: Execute Server-side Code

    settings: 
      language: PE.PROPERTY.SOURCE_SNIPPET_LANG.LOV.PLSQL.D
      pl/sql-code: dbms_scheduler.enable('ROMA_MAIN.JOB_FUZZY_WOECHENTLICH');

    execution: 
      sequence: 20
