- # ====== Page Item: P10100_LASTMODIFIEDWITHINDAYS ============
  id: 238355645939775652
  identification: 
    name: P10100_LASTMODIFIEDWITHINDAYS
    type: Number Field

  label: 
    label: Änderungs-Zeitfenster
    alignment: Left

  settings: 
    minimum-value: 0
    number-alignment: End
    virtual-keyboard: Text

  layout: 
    sequence: 10
    region: Konfiguration der Sync-Anforderung # 248936859915564670
    slot: BODY
    alignment: Left
    start-new-layout: false
    start-new-row: true
    column: Automatic
    new-column: true
    column-span: Automatic
    label-column-span: 7

  appearance: 
    template: Optional
    template-options: 
    - '#DEFAULT#'
    width: 1

  validation: 
    value-required: false

  advanced: 
    post-text-: '&nbsp; Tage'
    warn-on-unsaved-changes: Page Default

  source: 
    type: Null
    used: Only when current value in session state is null

  session-state: 
    storage: Per Session (Persistent)

  quick-picks: 
    show-quick-picks: false

  security: 
    session-state-protection: Unrestricted
    store-value-encrypted-in-session-state: true
    restricted-characters: All characters can be saved.

  help: 
    help-text: |
      <p>Gibt an, welchen Wert der Parameter lastModifiedWithinDays haben soll, wenn die Synchronisation des Webservices "preorders" manuell oder nächtlich aufgerufen wird. Dieser Parameter bestimmt, welches Zeitfenster für die Änderungen berücksichtigt werden soll, um die zu übertragenden Datenmengen und die dafür benötigte Zeit zu begrenzen (anstatt stets alle Sätze zu synchronisieren, selbst wenn keine Änderungen stattgefunden haben).</p>
      <p>Beispielsweise werden bei einem Wert von 7 nur diejenigen Änderungen synchronisiert, die innerhalb der letzten 7 Tage stattgefunden haben. Ein Wert von 0 bedeutet: "Nur Änderungen von heute".</p>
      <p>Wird der Wert leer gelassen, dann werden sämtliche Datensätze im PreOrder-Buffer synchronisiert.</p>

