validations: 
- # ====== Validation: Zahlenbereich: Fuzzy!Score ==============
  id: 259423641454197936
  identification: 
    name: 'Zahlenbereich: Fuzzy!Score'

  execution: 
    sequence: 10

  validation: 
    type: Expression
    language: SQL
    sql-expression: |
      NVL(:P10100_FUZZY_MIN_SCORE_PHO, 100) BETWEEN 50 AND 100 AND
      NVL(:P10100_FUZZY_MIN_SCORE_BNK, 100) BETWEEN 50 AND 100
    always-execute: false

  error: 
    error-message: Der Werte für den Minimum-Score (Dublettensuche Fuzzy!Double) muss zwischen 50 und 100 liegen oder leer sein
    display-location: Inline with Field and in Notification

  server-side-condition: 
    when-button-pressed: BTN_FUZZY_SPEICHERN # 259423456713197935

  comments: 
    comments: Prüft, ob der Benutzer eine Zahl im gültigen Wertebereich für die Fuzzy!Double-Suche eingegeben hat

