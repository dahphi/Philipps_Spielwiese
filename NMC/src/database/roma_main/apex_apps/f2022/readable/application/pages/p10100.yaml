- # ====== Process: Fuzzy Score-Intervall vorbelegen ===========
  id: 276381338362886095
  identification: 
    name: Fuzzy Score-Intervall vorbelegen
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      SELECT TRUNC(DATUM_VON), TRUNC(LEAST(DATUM_VON + 7, SYSDATE))
        INTO :P10100_SCORE_DATUM_VON, :P10100_SCORE_DATUM_BIS
        FROM (
          SELECT MIN(P.CREATED) AS DATUM_VON
            FROM FTTH_WS_SYNC_PREORDERS P
            LEFT JOIN FTTH_PREORDERS_FUZZYDOUBLE F
              ON (F.FTTH_ID = P.ID)
           WHERE P.state <> 'CANCELLED' AND F.ID IS NULL -- es gibt noch keinen Score
      );

  execution: 
    sequence: 40
    point: Before Header
    run-process: Once Per Page Visit (default)

