  help: 
    help-text: |
      <p>Die manuelle Synchronisierung (nur für Administratoren unterhalb der Auftragsliste als Link verfügbar) sollte nicht beliebig oft ausgeführt werden können, da ansonsten ungewollte Überlagerungseffekte entstehen und die Webservice-Schnittstellen übermäßig belastet werden könnten.</p>
      <p>Dieser Parameter gibt an, wie viele Minuten mindestens seit der letzten Synchronisierung vergangen sein müssen, bevor die Möglichkeit zur erneuten manuellen Synchronisierung wieder eingeblendet wird.</p>

