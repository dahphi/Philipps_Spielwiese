- # ====== Region: Einstellung für nächtliche Fuzzy-Aktualisieru
  id: 290686279197424820
  identification: 
    name: Einstellung für nächtliche Fuzzy-Aktualisierung
    type: Interactive Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      SELECT job_name
           , enabled
           , state
           , CASE state WHEN 'SCHEDULED' THEN 'aktiviert' WHEN 'DISABLED' THEN 'ruht' END AS ZEITPLAN
           , last_start_date
           , next_run_date
           , CASE WHEN next_run_date > SYSDATE AND state = 'SCHEDULED' THEN next_run_date END as naechster_start
           , comments
           , '<button type="button" class="fuzzy-scheduler '
           || CASE job_name WHEN 'JOB_FUZZY_TAEGLICH' THEN 'taeglich '
                            WHEN 'JOB_FUZZY_WOECHENTLICH' THEN 'woechentlich '
              END
           || CASE state WHEN 'SCHEDULED' THEN 'job-enabled' WHEN 'DISABLED' THEN 'job-disabled' END
           || '">' 
           || CASE state WHEN 'SCHEDULED' THEN 'ruhen&nbsp;lassen' WHEN 'DISABLED' THEN 'aktivieren' END || '</button>' as aktion
        FROM user_scheduler_Jobs
       WHERE program_name LIKE ('PROGRAM_FUZZY%')

  layout: 
    sequence: 50
    parent-region: Fuzzy-Dublettensuche # 259423185875197932
    slot: SUB_REGIONS
    start-new-layout: false
    start-new-row: true
    column: Automatic
    new-column: true
    column-span: Automatic

  appearance: 
    template: Standard
    template-options: 
    - '#DEFAULT#'
    - t-Region--scrollBody
    render-components: Above Content

  accessibility: 
    use-landmark: true
    landmark-type: Template Default

  advanced: 
    static-id: fuzzyJobsEinstellungen
    region-display-selector: false
    exclude-title-from-translation: false

  header-and-footer: 
    header-text: |
      <p>Die folgenden Einstellungen für die Zeitplan-gesteuerte Ausführung der Fuzzy-Abfrage gelten jeweils pro Datenbank-Umgebung.<br/>
      In Entwicklungsumgebungen sollten die Jobs ruhen, um die Produktions-Abfragen nicht zu beeinträchtigen.</p>

  server-cache: 
    caching: Disabled

  customization: 
    customizable: Not Customizable By End Users

