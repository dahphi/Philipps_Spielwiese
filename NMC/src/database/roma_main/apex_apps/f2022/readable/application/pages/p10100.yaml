- # ====== Process: Synchronisierung starten ===================
  id: 74686817356597908
  identification: 
    name: Synchronisierung starten
    type: Execute Code
    execution-chain: Preorderbuffer synchronsieren (asynchron) # 74686698854597907

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      PCK_GLASCONTAINER.p_webservice_synchronisieren(
          piv_rest_source_static_id => PCK_GLASCONTAINER.C_WS_STATIC_ID_PREORDERS
        , pib_sync_erzwingen        => true
      );

  execution: 
    sequence: 10

  success-message: 
    success-message: Die Synchronsierung wurde gestartet.

  error: 
    error-message: 'Die Synchronisierung konnte nicht gestartet werden: #SQLERRM#'

- # ====== Process: Sync-Status laden ==========================
  id: 236885791627374210
  identification: 
    name: Sync-Status laden
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      SELECT sync_is_active,
             sync_interval,
             '( ' || sync_interval || ' ) -- bis auf Weiteres nicht aktiv!'
        INTO :P10100_SYNC_IS_ACTIVE
           , :P10100_SYNC_INTERVAL
           , :P10100_SYNC_INTERVAL_DEAKTIVIERT
        FROM apex_appl_web_src_modules
       WHERE application_id = :APP_ID
         AND data_profile_name = 'preorders (Auftragsliste)' -- ///@todo: => CORE.PARAMS
      ;
      
      :P10100_BASE_URL := PCK_GLASCONTAINER.base_url;

  execution: 
    sequence: 10
    point: Before Header
    run-process: Once Per Page Visit (default)

  security: 
    authorization-scheme: '* App - Administrator' # 238128469706691677

- # ====== Process: Sync-Parameter laden =======================
  id: 236885910945374211
  identification: 
    name: Sync-Parameter laden
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      :P10100_LASTMODIFIEDWITHINDAYS := PCK_GLASCONTAINER.fv_konfiguration_lesen(
          PCK_GLASCONTAINER.C_SATZART_WEBSERVICE, 'LASTMODIFIEDWITHINDAYS');
      
      :P10100_MIN_SYNC_INTERVAL_PREORDERS := PCK_GLASCONTAINER.fv_konfiguration_lesen(
          PCK_GLASCONTAINER.C_SATZART_WEBSERVICE, 'MIN_SYNC_INTERVAL_PREORDERS');

  execution: 
    sequence: 20
    point: Before Header
    run-process: Once Per Page Visit (default)

  security: 
    authorization-scheme: '* App - Administrator' # 238128469706691677

