- # ====== Region: Backend-Synchronisierung ====================
  id: 248932900429564631
  identification: 
    name: Backend-Synchronisierung
    type: Static Content

  layout: 
    sequence: 20
    parent-region: No Parent
    slot: BODY
    start-new-layout: false
    start-new-row: true
    column: Automatic
    new-column: true
    column-span: 6

  appearance: 
    template: Collapsible
    template-options: 
    - '#DEFAULT#'
    - js-useLocalStorage
    - is-collapsed
    - t-Region--scrollBody
    render-components: Above Content

  accessibility: 
    use-landmark: true
    landmark-type: Template Default

  advanced: 
    region-display-selector: true
    exclude-title-from-translation: false

  security: 
    authorization-scheme: '* App - Administrator' # 238128469706691677

  customization: 
    customizable: Not Customizable By End Users

  comments: 
    comments: |
      Administratoren haben hier die Möglichkeit, die nächtliche Snychronisierung mit dem AOE-Webservice zu suspendieren oder wieder zu aktivieren.
      Der nächtliche Synchronsisierungsprozess kann hier deaktiviert oder aktiviert werden. Eine hier vorgenommene Deaktivierung dauert solange an, bis jemand sie wieder zurücknimmt.
      Eine weitere Option besteht darin, die Synchronisierungstabelle zu leeren. Dies führt dazu, dass die gepufferte Auftragsliste im Glascontainer (welche nur Administratoren zugänglich ist) gelöscht wird und erst nach der nächsten (manuellen oder nächtlichen) Synchronisierung wieder vollständige Daten enthält. Die Leerung dieser Tabelle sollte in der Produktion voraussichtlich niemals nötig sein.

  attributes: 
    settings: 
      output-as: HTML
      expand-shortcuts: false

