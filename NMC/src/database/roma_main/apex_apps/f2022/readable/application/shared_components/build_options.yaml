- # ====== Build Option: Dubletten-Vorprüfung ==================
  id: 254911487918372194
  identification: 
    name: Dubletten-Vorprüfung

  status: 
    status: Include
    default-on-export: Same as Current Status
    on-upgrade-keep-status: false

  comments: 
    comments: 'Markiert alle Objekte, die im Zusammenhang mit der Fuzzydouble-Dublettenprüfung stehen: Diese muss vor dem Anzeigen der Seite im Verborgenen ausgeführt werden, um zu entscheiden, ob die Dubletten-Auswahl (4/7) überhaupt angeigt werden soll. Dort muss sie dann prinzipbedingt erneut ausgeführt werden. Da die Fuzzy-Suche über die Siebel-Kundendaten aber dermaßen schlechte Performance liefert, wurde beschlossen, die Vorab-Abfrage zu umgehen und die Ergebnis-Seite gegebenenfalls leer anzuzeigen.'

  subscription: 
    version-number: 4095823085945

