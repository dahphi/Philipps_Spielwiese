  status: 
    status: Exclude
    default-on-export: Exclude
    on-upgrade-keep-status: false

  comments: 
    comments: Alle Objekte, die vorübergehend oder endgültig nicht in Masken oder Reports dargestellt werden sollen, denen nichtsdestotrotz ein Wert zugewiesen werden kann, da sie eine Rolle in Prozessen spielen. Hintergrund ist, dass so "mal eben" das Item wieder angezeigt werden kann, mit korrekter Formatierung, und dabei nicht - wenn es ein Hidden Item wäre - die Beschriftung "New" erhält-

