- # ====== Region: Konzepte, Anwendungs-Architektur und Dokument
  id: 335125770169263707
  identification: 
    name: Konzepte, Anwendungs-Architektur und Dokumentation ...
    type: Static Content

  source: 
    html-code: |
      <p>Die APEX-Applikation "Glascontainer" erlaubt den Mitarbeiter*innen, die Aufträge im FTTH-PreOrder-Buffer einzusehen und, berechtigungsgesteuert, bestimmte Daten zu ändern.</p>
      
      <p>Die Bewegungsdaten befinden sich in den Tabellen FTTH_WS_SYNC_PREORDERS und FTTH_WS_SYNC_STORNOGRUENDE (beide sind in den Shared Components mit der entsprechenden REST Data Source verknüpft und werden automatisch nächtlich synchronisiert).
      Außerdem erfolgt die Klassifizierung von möglichen Dubletten in der Zieltabelle FTTH_DUBLETTEN_BEWERTUNG.</p>
      <ul>Weitere verwendete Tabellen und Views:
      <li>APEX_REST_SOURCE_SYNC_LOG</li>    
      <li>FTTH_DUBLETTEN_BEWERTUNG</li>
      <li>FTTH_GLASCONTAINER_AKTIONEN</li>
      <li>FTTH_GLASCONTAINER_PRODUKTE</li>
      <li>FTTH_LOG_SIEBEL_READY_VCO</li>
      <li>FTTH_WEBSERVICE_AUFRUFE</li>
      <li>POB_ADRESSEN</li>
      <li>POB_TRACKING, POB_TRACKING_EXTRA</li>
      <li>V_ADRESSEN</li>
      
      </ul>
      
      <p><strong>Tickets in JIRA werden im PL/SQL-Quellcode der Packages, in Table- und View-Comments sowie in APEX-Objektkommentaren gemäß der @Tag-Schreibweise erwähnt und verknüpft:</strong></p>
      <p>Beispielsweise bezieht sich die Quellcode-Fundstelle <tt>@ticket FTTH-1874</tt> auf das JIRA-Ticket <a href="https://jira.netcologne.intern/browse/FTTH-1874">https://jira.netcologne.intern/browse/FTTH-1874</a>, so dass man bei der Suche nach Ticket-Lösungen dieses Suchmuster verwenden sollte (APEX-Volltextsuche, USER_SOURCE, USER_VIEWS, USER_TAB_COMMENTS, USER_COL_COMMENTS usw.) Zur strukturierten Suche in den APEX-Objektkommentaren wird in den Entwicklungs- und Testumgebungen der Link zur Seite "Entwicklerdokumentation" eingeblendet (siehe Navigationsleiste, rechts oben). Dort erscheinen sämtliche Entwicklerkommentare, kontextsensitiv für die jeweils aktuelle APEX-Seite, in einem Interactive Report.</p>
      <p>Die Unit-Test-Suite wird in den Entwicklungsumgebungen (NMCE bzw. NMCE3) hierdurch gestartet:<br/>
      <tt>SELECT * FROM ROMA_MAIN.UT.RUN('UT_GLASCONTAINER');</tt>
      </p>

  layout: 
    sequence: 10
    parent-region: No Parent
    slot: BODY
    start-new-layout: false
    start-new-row: true
    column: Automatic
    new-column: true
    column-span: 9

  appearance: 
