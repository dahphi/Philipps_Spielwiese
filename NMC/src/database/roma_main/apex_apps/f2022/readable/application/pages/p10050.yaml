      <ul>
      <li>Ticket <a href="https://jira.netcologne.intern/browse/FTTH-4884" target="_blank">FTTH-4884</a>: Die Auftragsliste führt nun inital keine Suchanfrage durch. Erst wenn Suchkriterien eingegeben sind, werden im Report die Ergebnisse dargestellt. Die Seite lädt beim Aufruf entsprechend schneller. Es wird vermieden, dass man zunächst 15 Sekunden warten muss, um überhaupt Suchkriterien eingeben zu können. Es ist trotzdem weiterhin möglich, mit der Schaltfläche [Suche ausführen] auch ohne ein explizites Suchkriterium die ungefilterten Ergebnisse anzuzeigen.</li>
