- # ====== Region: ToDo-LIste für die App "Glascontainer" ======
  id: 233137882602500612
  identification: 
    name: ToDo-LIste für die App "Glascontainer"
    type: PL/SQL Dynamic Content [Legacy]

  source: 
    pl/sql-code: |
      BEGIN
      htp.p('<ol>');
      FOR todo IN (SELECT D AS TEXT, R AS PRIO FROM TABLE(PCK_GLASCONTAINER.TODOLIST)) LOOP
        IF todo.TEXT IS NULL THEN
          htp.p('<hr style="margin-top: 1em;" />');
        ELSE
          htp.p('<li>' || todo.TEXT || '</li>');
        END IF;
      END LOOP;
      htp.p('</ol>');
      EXCEPTION
        WHEN OTHERS THEN
          htp.p('Liste kann nicht angezeigt werden: ' || SQLERRM);
      END;

  layout: 
    sequence: 120
    parent-region: No Parent
    slot: BODY
    start-new-layout: false
    start-new-row: true
    column: Automatic
    new-column: true
    column-span: Automatic

