- # ====== Process: CREATE_COLLECTION (FEHLERSTATISTIK) ========
  id: 72458005519963907
  identification: 
    name: CREATE_COLLECTION (FEHLERSTATISTIK)
    type: Execute Code
    execution-chain: Fehler-Logs im Hintergrund erstellen # 72457913090963906

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      PCK_GLASCONTAINER.CREATE_COLLECTION(
            piv_collection_name => 'FEHLERSTATISTIK'
          , piv_app_id          => '&APP_ID.'
          , piv_app_page_id     => '&APP_PAGE_ID.'
          , piv_app_session     => '&P10050_APP_SESSION.'
          , piv_app_user        => '&APP_USER.'
      );

  execution: 
