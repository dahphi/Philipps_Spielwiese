  attributes: 
    id: 34451775415752693
    chart: 
      type: Status Meter Gauge

    layout: 
      maximum-width: 90
      height: 100

    gauge: 
      orientation: Circular
      show-plot-area: true
      indicator-size: 0.5
      inner-radius: 0.8
      start-angle: 180
      angle-extent: 180

    value: 
      show: true
      value-type: Number
      format: Decimal
      decimal-places: 0
      format-scaling: None

    animation: 
      on-display: Automatic
      on-data-change: Automatic

    tooltip: 
      show: true

    series: 
    - # ====== Series: Commission ==================================
      id: 34451823246752694
      identification: 
        name: Commission

      execution: 
        sequence: 10

      source: 
        location: Local Database
        type: SQL Query
        sql-query: |
          select value, 
                 max_value,
                 my_label,
                 'Value: '|| value || '<br/>' ||'Thresholds: Low: 4, Medium: 8, High: 14' my_tooltip
          from ( select sum(case when COMM is null 
                                 then 0 
                                 when COMM = 0 
                                 then 0 
                                 else 1 
                            end) value, 
                        count(*) max_value,
                       'Sales' as my_label 
                   from eba_demo_chart_emp )

      order-by: 
        type: None

      column-mapping: 
        value: VALUE
        maximum-value: MAX_VALUE
        custom-tooltip: MY_TOOLTIP

      appearance: 
        color: BLACK

      thresholds: 
        values: 4,8,14
        colors: red,yellow,green
        display: All

      label: 
        show: true
        position: Automatic

