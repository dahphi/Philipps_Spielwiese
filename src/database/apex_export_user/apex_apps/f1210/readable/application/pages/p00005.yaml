processes: 
- # ====== Process: Vermarktungscluster Details - IG - Save Inte
  id: 214874292659954367
  identification: 
    name: Vermarktungscluster Details - IG - Save Interactive Grid Data
    type: Interactive Grid - Automatic Row Processing (DML)
    execution-chain: None
    editable-region: Vermarktungscluster Objekt - IG # 222553679251249090

  settings: 
    target-type: PL/SQL Code
    pl/sql-code-to-insert/update/delete: |
      begin
          case :APEX$ROW_STATUS
          when 'C' then
      NULL;
          when 'U' then
      NULL;
          when 'D' then
              pck_vermarktungsclstr_obj_dml.p_delete(pin_vco_lfd_nr => :VCO_LFD_NR);
         end case;
      end;        
    prevent-lost-updates: false
    lock-row: Yes

  execution: 
    sequence: 10
    point: Processing
    run-process: Once Per Page Visit (default)

  error: 
    display-location: Inline in Notification

  server-side-condition: 
    execution-scope: For Created and Modified Rows

- # ====== Process: Vermarktungscluster-Daten laden ============
  id: 259196686936630905
  identification: 
    name: Vermarktungscluster-Daten laden
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      SELECT bezeichnung
           , status
           , PCK_VERMARKTUNGSCLUSTER.fv_vc_status_display(status)
           , REPLACE(PCK_VERMARKTUNGSCLUSTER.fv_vc_folgestatus(piv_aktueller_status => status), status) -- der aktuelle Status soll hier nicht enhalten sein
           , WHOLEBUY
        INTO :P5_VC_NAME, :P5_VC_STATUS, :P5_VC_STATUS_DISP, :P5_VC_FOLGESTATUS, :P5_WHOLEBUY
        FROM VERMARKTUNGSCLUSTER
       WHERE vc_lfd_nr = :P5_VC_ID;
      
      -- @ticket FTTH-2901:
      IF :P5_WHOLEBUY IS NOT NULL THEN
          SELECT singular
            INTO :P5_WHOLEBUY_DISPLAY
            FROM enum
           WHERE domain = 'WHOLEBUY_PARTNER'
             AND kontext = 'FTTH'
             AND sprache = '*'
             AND key = :P5_WHOLEBUY;
      END IF;

  execution: 
    sequence: 10
    point: Before Header
    run-process: Once Per Page Visit (default)

  server-side-condition: 
    type: Item is NOT NULL
    item: P5_VC_ID

  comments: 
    comments: '@ticket FTTH-1787, @ticket FTTH-2901'

- # ====== Process: BTN_STATUS_UNDERCONSTRUCT ==================
  id: 259198047169630919
  identification: 
    name: BTN_STATUS_UNDERCONSTRUCT
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      PCK_VERMARKTUNGSCLUSTER.p_update_status(
