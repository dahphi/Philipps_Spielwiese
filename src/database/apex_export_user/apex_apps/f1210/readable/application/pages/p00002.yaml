- # ====== Region: Historie ====================================
  id: 213068244037145171
  identification: 
    name: Historie
    type: Interactive Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      SELECT   versions_startscn
             , versions_starttime
             , versions_endscn
             , versions_endtime
             , versions_xid
             , versions_operation
             , vc_lfd_nr
             , bezeichnung
             , dnsttp_lfd_nr
             , url
             , status
             , ausbau_plan_termin
             , aktiv
             , inserted
             , updated
             , inserted_by
             , updated_by
      FROM vermarktungscluster VERSIONS BETWEEN SCN MINVALUE AND MAXVALUE
      WHERE vc_lfd_nr = :P2_VC_LFD_NR
      ORDER BY versions_starttime desc
    page-items-to-submit: 
    - P2_VC_LFD_NR

