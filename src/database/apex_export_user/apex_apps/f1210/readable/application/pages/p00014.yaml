dynamic-actions: 
- # ====== Dynamic Action: BTN_CONFIRM =========================
  id: 49707661112809192
  identification: 
    name: BTN_CONFIRM

  execution: 
    sequence: 10
    event-scope: Static
    type: Immediate

  when: 
    event: Click
    selection-type: Button
    button: BTN_CONFIRM # 49707629229809192

  actions: 
  - # ====== Action: Hinweis Verknüpfungen =======================
    id: 49952491893534185
    identification: 
      name: Hinweis Verknüpfungen
      action: Confirm

    settings: 
      title: ' &P14_BEZEICHNUNG.'
      message: |
        <p>Dem Cluster sind Objekte zugeordnet (&P14_ANZAHL_OBJEKTE.).</p>
        <p>Bitte fahren Sie nur dann mit dem Löschen des Clusters fort, wenn auch diese Zuordnungen gelöscht werden dürfen.</p>
      style: Default

    execution: 
      sequence: 10
      event: BTN_CONFIRM # 49707661112809192
      fire-when-event-result-is: True
      fire-on-initialization: false

    client-side-condition: 
      type: Item > Value
      item: P14_ANZAHL_OBJEKTE
      value: 0

    comments: 
      comments: Dieser Hinweis erfolgt nur, falls dem Cluster Objekte zugeordnet sind.

  - # ====== Action: Sicherheitsabfrage ==========================
    id: 50855415527570845
    identification: 
      name: Sicherheitsabfrage
      action: Confirm

    settings: 
      title: ' &P14_BEZEICHNUNG.'
      message: <p>Sind Sie sicher, dass dieser Vermarktungscluster tatsächlich gelöscht werden soll?</p>
      style: Default

    execution: 
      sequence: 20
      event: BTN_CONFIRM # 49707661112809192
      fire-when-event-result-is: True
      fire-on-initialization: false

    comments: 
      comments: Abschließende Sicherheitsabfrage, ob der Cluster jetzt gelöscht werden soll.

  - # ====== Action: Submit Page =================================
    id: 50855529831570846
    identification: 
      name: Submit Page
      action: Submit Page

    settings: 
      request-/-button-name: BTN_CONFIRM
      show-processing: true

    execution: 
      sequence: 30
      event: BTN_CONFIRM # 49707661112809192
      fire-when-event-result-is: True
      fire-on-initialization: false

    comments: 
      comments: Zum Löschen absenden

