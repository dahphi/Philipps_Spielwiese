- # ====== Process: UPDATE_VC ==================================
  id: 50855570694570847
  identification: 
    name: UPDATE_VC
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      UPDATE VERMARKTUNGSCLUSTER
          SET loeschgrund = :P14_LOESCHGRUND
          WHERE vc_lfd_nr = :P14_VC_LFD_NR;
      

  execution: 
    sequence: 20
    point: Processing
    run-process: Once Per Page Visit (default)

  success-message: 
    success-message: Vermarktungscluster "&P14_BEZEICHNUNG." wurde gelöscht

  error: 
    error-message: 'Vermarktungscluster "&P14_BEZEICHNUNG." konnte nicht gelöscht werden: #SQLERRM#'
    display-location: Inline in Notification

  server-side-condition: 
    when-button-pressed: BTN_CONFIRM # 49707629229809192

- # ====== Process: DELETE_CLUSTER =============================
  id: 50858285515570874
  identification: 
    name: DELETE_CLUSTER
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      PCK_VERMARKTUNGSCLUSTER_DML.p_delete(pin_vc_lfd_nr => :P14_VC_LFD_NR);
      

  execution: 
    sequence: 30
    point: Processing
    run-process: Once Per Page Visit (default)

  success-message: 
    success-message: Vermarktungscluster "&P14_BEZEICHNUNG." wurde gelöscht

  error: 
    error-message: 'Vermarktungscluster "&P14_BEZEICHNUNG." konnte nicht gelöscht werden: #SQLERRM#'
    display-location: Inline in Notification

  server-side-condition: 
    when-button-pressed: BTN_CONFIRM # 49707629229809192

- # ====== Process: Anzahl Objekte ermitteln ===================
  id: 50867434758005013
  identification: 
    name: Anzahl Objekte ermitteln
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      SELECT COUNT(*) 
        INTO :P14_ANZAHL_OBJEKTE
        FROM VERMARKTUNGSCLUSTER_OBJEKT
       WHERE vc_lfd_nr = :P14_VC_LFD_NR;

  execution: 
    sequence: 10
    point: Before Header
    run-process: Once Per Page Visit (default)

  server-side-condition: 
    type: Item is NOT NULL
    item: P14_VC_LFD_NR

