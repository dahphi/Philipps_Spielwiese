    	function GetSelection(layer){
                var pts ;
                pts = objkLayerGeoJson.toGeoJSON(16)
    
             var ptsWithin2= new L.geoJSON();
                         
                         
                         
                         ptsWithin2 = turf.within(pts, layer.toGeoJSON(16));
    
    
    
    
    
    				alert('Found ' + ptsWithin2.features.length + ' features');	
