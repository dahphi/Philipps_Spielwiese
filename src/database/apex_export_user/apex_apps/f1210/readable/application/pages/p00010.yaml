  actions: 
  - # ====== Action: Refresh =====================================
    id: 213530374382561945
    identification: 
      action: Refresh

    settings: 
      maintain-pagination: false

    affected-elements: 
      selection-type: Region
      region: Collection - SMW_OBJEKTE # 218911813227826532

    execution: 
      sequence: 30
      event: Change P10_SMW_FTTB_OBJEKTE # 213529951766561944
      fire-when-event-result-is: True
      fire-on-initialization: false

  - # ====== Action: Execute Server-side Code ====================
    id: 213530950725561945
    identification: 
      action: Execute Server-side Code

    settings: 
      language: PE.PROPERTY.SOURCE_SNIPPET_LANG.LOV.PLSQL.D
      pl/sql-code: |
        declare
            l_array wwv_flow_t_varchar2;
        
        
            l_seq   APEX_APPLICATION_GLOBAL.VC_ARR2;
            l_n001  APEX_APPLICATION_GLOBAL.VC_ARR2;
        
        begin
        
            APEX_COLLECTION.TRUNCATE_COLLECTION(
                p_collection_name => 'SMW_OBJEKTE');
        
        
            l_array := apex_string.split( :P10_SMW_OBJEKTE, ',' );
            for i in 1 .. l_array.count loop
                --dbms_output.put_line( apex_string.format( 'element at index %s: %s', i, l_array(i) ) );
                /*
                APEX_COLLECTION.ADD_MEMBER(
                p_collection_name => 'SMW_OBJEKTE',
                p_n001            => l_array(i) );
                */
                l_seq(i) := i;
        
                l_n001(i) := l_array(i) ;
        
            end loop;
        
        
                APEX_COLLECTION.MERGE_MEMBERS(
                p_collection_name => 'SMW_OBJEKTE',
                p_seq => l_seq,
                p_c001 => l_n001,
                p_init_query => NULL
             );
        
        
        end;
      items-to-submit: 
      - P10_SMW_OBJEKTE

    execution: 
      sequence: 20
      event: Change P10_SMW_FTTB_OBJEKTE # 213529951766561944
      fire-when-event-result-is: True
      fire-on-initialization: false
      stop-execution-on-error: true
      wait-for-result: true

