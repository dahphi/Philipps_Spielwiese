- # ====== Validation: Landingpage PK ==========================
  id: 170651284458231800
  identification: 
    name: Landingpage PK

  execution: 
    sequence: 110

  validation: 
    type: Expression
    language: PL/SQL
    pl/sql-expression: |
      :P3_URL IS NOT NULL AND
      PCK_ADRESSE.fb_is_valid_url(
          piv_string   => :P3_URL
        , piv_protocol => 'https'
        , piv_like     => '%/privatkunden%,%/geschaeftskunden%' -- 2023-09-27 neu
        , piv_domains  => 'www.netcologne.de,www.netaachen.de'
      )
    always-execute: false

  error: 
    error-message: Die URL der Landingpage für Privatkunden muss eine gültige NetCologne-/NetAachen-Adresse sein
    display-location: Inline with Field and in Notification
    associated-item: P3_URL # 174238786378388505

  comments: 
