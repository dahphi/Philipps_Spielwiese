validations: 
- # ====== Validation: Kosten Hausanschluss ====================
  id: 170650370559231791
  identification: 
    name: Kosten Hausanschluss

  execution: 
    sequence: 90

  validation: 
    type: Expression
    language: SQL
    sql-expression: 'NvL(:P3_KOSTEN_HAUSANSCHLUSS, -1) >= 0'
    always-execute: false

  error: 
    error-message: Bitte geben Sie gültige Hausanschlusskosten an
    display-location: Inline with Field and in Notification

- # ====== Validation: Bezeichnung =============================
  id: 170650499335231792
  identification: 
    name: Bezeichnung

  execution: 
    sequence: 10

  validation: 
    type: Expression
    language: PL/SQL
    pl/sql-expression: "REGEXP_LIKE(NVL(:P3_BEZEICHNUNG, '-'), '^[A-Za-z0-9_-]*$')"
    always-execute: false

  error: 
    error-message: Die Bezeichnung des Vermarktungsclusters enthält ungültige Zeichen
    display-location: Inline with Field and in Notification
    associated-item: P3_BEZEICHNUNG # 174238560599388503

