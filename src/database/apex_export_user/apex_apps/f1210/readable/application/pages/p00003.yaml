dynamic-actions: 
- # ====== Dynamic Action: Auswahl Wholebuy-Technologie ========
  id: 53194197234488640
  identification: 
    name: Auswahl Wholebuy-Technologie

  execution: 
    sequence: 50
    event-scope: Static
    type: Immediate

  when: 
    event: Change
    selection-type: Item(s)
    item(s): 
    - P3_DNSTTP_LFD_NR

  client-side-condition: 
    type: Item is in list
    item: P3_DNSTTP_LFD_NR
    list: 
    - 89
    - ' 90'

  comments: 
    comments: '@krakar @FTTH-4474: Erstellen einer Dynamic Action, bei der geschaut wird, ob es sich bei der Technologie um eine Wholebuy-Technologie handelt. Falls es sich um eine Wholebuy-Technologie handelt sollen die Hausanschluss-Kosten automatisch auf 0 gesetzt werden und nicht mehr veränderbar sein'

  actions: 
  - # ====== Action: Änderung "Kosten Hausanschluss" verhindern ==
    id: 50859642836570888
    identification: 
      name: Änderung "Kosten Hausanschluss" verhindern
      action: Execute JavaScript Code

    settings: 
      code: $('#P3_KOSTEN_HAUSANSCHLUSS').css('pointer-events', 'none');

    affected-elements: 
      selection-type: Item(s)
      item(s): 
      - P3_KOSTEN_HAUSANSCHLUSS

    execution: 
      sequence: 20
      event: Auswahl Wholebuy-Technologie # 53194197234488640
      fire-when-event-result-is: True
      fire-on-initialization: true

    comments: 
      comments: '@krakar @ticket FTTH-4474: Kostenfeld für Hausanschluss wird auf nicht veränderbar eingestellt, wenn es sich bei Technologie um einen Wholebuy-Partner handelt'

  - # ====== Action: Änderung "Kosten Hausanschluss" ermöglichen =
    id: 50859789222570889
    identification: 
      name: Änderung "Kosten Hausanschluss" ermöglichen
      action: Execute JavaScript Code

    settings: 
      code: $('#P3_KOSTEN_HAUSANSCHLUSS').css('pointer-events', 'auto');

    affected-elements: 
      selection-type: Item(s)
      item(s): 
      - P3_KOSTEN_HAUSANSCHLUSS

    execution: 
      sequence: 10
      event: Auswahl Wholebuy-Technologie # 53194197234488640
      fire-when-event-result-is: False
      fire-on-initialization: true

    comments: 
      comments: '@krakar @ticket FTTH-4474: Falls sich bei der Technologie nicht um einen Wholebuy-Partner handelt, soll das Kostenfeld für Hausanschluss wieder veränderbar sein '

  - # ====== Action: Set Value ===================================
    id: 53194275625488641
    identification: 
      action: Set Value

    settings: 
      set-type: Static Assignment
      value: 0,00
      suppress-change-event: false

    affected-elements: 
      selection-type: Item(s)
      item(s): 
      - P3_KOSTEN_HAUSANSCHLUSS

    execution: 
      sequence: 10
      event: Auswahl Wholebuy-Technologie # 53194197234488640
      fire-when-event-result-is: True
      fire-on-initialization: true
      stop-execution-on-error: true
      wait-for-result: true

    comments: 
      comments: '@krakar @ticket FTTH-4474: Falls sich bei der Technologie um einen Wholebuy-Partner handelt, soll das Kostenfeld für Hausanschluss auf 0 gesetzt sein'

- # ====== Dynamic Action: Auswahl "Wholebuy-Partner" ==========
  id: 155699042885761514
  identification: 
    name: Auswahl "Wholebuy-Partner"

  execution: 
    sequence: 40
    event-scope: Static
    type: Immediate

  when: 
    event: Change
    selection-type: Item(s)
    item(s): 
    - P3_WHOLEBUY

  client-side-condition: 
    type: Item is not null
    item: P3_WHOLEBUY

  comments: 
    comments: '@ticket FTTH-3747: Wenn ein Wholebuy-Partner für diesen Vermarktungscluster ausgewählt wird, dann soll der Diensttyp einen bestimmten festen Wert bekommen, der nicht mehr durch den Benutzer änderbar ist.'

  actions: 
  - # ====== Action: TCOM ========================================
    id: 155699142869761515
    identification: 
      name: TCOM
      action: Set Value

    settings: 
      set-type: Static Assignment
      value: 89
      suppress-change-event: false

    affected-elements: 
      selection-type: Item(s)
      item(s): 
      - P3_DNSTTP_LFD_NR

    execution: 
      sequence: 20
      event: Auswahl "Wholebuy-Partner" # 155699042885761514
      fire-when-event-result-is: True
      fire-on-initialization: true
      stop-execution-on-error: true
      wait-for-result: true

    client-side-condition: 
      type: Item = Value
      item: P3_WHOLEBUY
      value: TCOM

    comments: 
      comments: 'Der Wholebuy-Partner lautet "Telekom": Dann ist der Diensttyp = 89 ("FTTH_BSA_L2" bzw. "FTTH BSA L2")'

  - # ====== Action: DG ==========================================
    id: 155699234073761516
    identification: 
      name: DG
      action: Set Value

    settings: 
      set-type: Static Assignment
      value: 90
      suppress-change-event: false

    affected-elements: 
      selection-type: Item(s)
      item(s): 
      - P3_DNSTTP_LFD_NR

    execution: 
      sequence: 40
      event: Auswahl "Wholebuy-Partner" # 155699042885761514
      fire-when-event-result-is: True
      fire-on-initialization: true
      stop-execution-on-error: true
      wait-for-result: true

    client-side-condition: 
      type: Item = Value
      item: P3_WHOLEBUY
      value: DG

    comments: 
      comments: 'Der Wholebuy-Partner lautet "Deutsche Glasfaser": Dann ist der Diensttyp = 90 ("FTTH_BSA_L2_DG" bzw. "FTTH BSA L2 DG")'

  - # ====== Action: nein (kein Wholebuy-Partner) ================
    id: 155699386107761517
    identification: 
      name: nein (kein Wholebuy-Partner)
      action: Set Value

    settings: 
      set-type: Static Assignment
      suppress-change-event: false

    affected-elements: 
      selection-type: Item(s)
      item(s): 
      - P3_DNSTTP_LFD_NR

    execution: 
      sequence: 10
      event: Auswahl "Wholebuy-Partner" # 155699042885761514
      fire-when-event-result-is: False
      fire-on-initialization: true
      stop-execution-on-error: true
      wait-for-result: true

    client-side-condition: 
      type: Item is null
      item: P3_WHOLEBUY

    comments: 
      comments: '@ticket FTTH-3747'

  - # ====== Action: Änderung "Diensttyp" verhindern =============
    id: 155700023787761523
