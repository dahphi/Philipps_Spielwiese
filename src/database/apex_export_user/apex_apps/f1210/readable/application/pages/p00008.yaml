- # ====== Region: Presale-/Realizable: Automatisch gelöschte "S
  id: 188857494321145815
  identification: 
    name: 'Presale-/Realizable: Automatisch gelöschte "Siebel-ready"-Objekte'
    type: Interactive Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      SELECT LOG.ID
           , LOG.DATUM
           , LOG.HAUS_LFD_NR
           , LOG.VC_LFD_NR
           , CASE LOG.MODUS WHEN -1 THEN 'aus VC entfernt' ELSE '-' END AS MODUS
           , CASE WHEN LOG.FEHLER > 0 THEN 'Fehler' END AS FEHLER
           , nvl(VC.BEZEICHNUNG, '(unbekannt)') AS VERMARKTUNGSCLUSTER
        FROM FTTH_LOG_SIEBEL_READY_VCO LOG
        LEFT JOIN VERMARKTUNGSCLUSTER VC -- VMC können gelöscht werden!
          ON (VC.VC_LFD_NR = LOG.VC_LFD_NR)

