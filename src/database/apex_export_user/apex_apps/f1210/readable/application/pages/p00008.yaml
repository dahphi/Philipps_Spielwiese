    comments: |
      @ticket FTTH-2698: Report zeigt sämtliche Objekte an, die vom Datenbank-Job "JOB_SIEBELREADY_VCO_DEL" gelöscht wurden.
      
      -- Zusammenfassungen aus der Tabelle LOGS anzeigen (Achtung, sehr unperformant, nur für Recherchezwecke verwenden):
      select to_char(inserted, 'DD.MM.YYYY HH24:MI') as datum, routine_name, message
        from logs where 
        inserted > trunc(sysdate) - 14
        and action = 'JOB_SIEBELREADY_VCO_DEL' and module = 'DBMS_SCHEDULER'
       order by log_id desc;
      

