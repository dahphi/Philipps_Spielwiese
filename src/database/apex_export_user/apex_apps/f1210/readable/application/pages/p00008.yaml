- # ====== Region: Vermarktungscluster - IG ====================
  id: 213564081182016746
  identification: 
    name: Vermarktungscluster - IG
    type: Interactive Grid

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      select '-' Typ
             , vc_lfd_nr 
             , bezeichnung 
             , dnsttp_lfD_nr
             , url
             , url_gk -- 2023-08-15 neu @WISAND
             , ausbau_plan_termin
             , aktiv
             , status
             , anz_objekte
             , gee_offen
             , gee_erteilt
             , gee_verweigert
             , case when gee_erteilt > 0 then  to_char(round(  (gee_erteilt*100) / anz_objekte ,0)) else '0' end || '%' quote    
             --, () as quote
              -- 2022-05-06 neu @WISAND:
             , mindestbandbreite
             , zielbandbreite_geplant
             , kosten_hausanschluss
             , kundenauftrag_erforderlich
             , netwissen_seite  
             , mandant
      from (
      select  vc.vc_lfd_nr 
             , vc.bezeichnung 
             , vc.dnsttp_lfD_nr
             , vc.url
             , vc.url_gk
             , vc.ausbau_plan_termin
             , nvl(vc.aktiv,0) aktiv
             , vc.status
             , (select count(1) from vermarktungscluster_objekt vco where  vco.vc_lfd_nr = vc.vc_lfd_nr ) anz_objekte
             , (select count(1) 
                  from vermarktungscluster_objekt vco 
                 where  vco.vc_lfd_nr = vc.vc_lfd_nr
                   and strav.pck_ems_query.fv_gee_status(pin_haus_lfd_nr=> vco.haus_lfd_nr) = 'offen' 
                   ) gee_offen
             , (select count(1) 
                  from vermarktungscluster_objekt vco 
                 where  vco.vc_lfd_nr = vc.vc_lfd_nr
                   and strav.pck_ems_query.fv_gee_status(pin_haus_lfd_nr=> vco.haus_lfd_nr) = 'erteilt' 
                   ) gee_erteilt
             , (select count(1) 
                  from vermarktungscluster_objekt vco 
                 where  vco.vc_lfd_nr = vc.vc_lfd_nr
                   and strav.pck_ems_query.fv_gee_status(pin_haus_lfd_nr=> vco.haus_lfd_nr) = 'verweigert' 
                   )  gee_verweigert
                  
             --, () as quote
              -- 2022-05-06 neu @WISAND:
             , mindestbandbreite
             , zielbandbreite_geplant
             , kosten_hausanschluss
             , kundenauftrag_erforderlich
             , netwissen_seite  
             , mandant
         From vermarktungscluster vc
      )
      union all
      (
      select 'gelöscht' Typ
             , vc_lfd_nr 
             , bezeichnung 
             , dnsttp_lfD_nr
             , url
             , url_gk
             , ausbau_plan_termin
             , aktiv
             , status
             , NULL anz_objekte
             , NULL gee_offen
             , NULL gee_erteilt
             , NULL gee_verweigert
             , NULL quote
              -- 2022-05-06 neu @WISAND:
             , mindestbandbreite
             , zielbandbreite_geplant
             , kosten_hausanschluss
             , kundenauftrag_erforderlich
             , netwissen_seite
             , mandant        
      from (
          SELECT   versions_starttime
             , versions_operation
             , vc_lfd_nr
             , bezeichnung
             , dnsttp_lfd_nr
             , url
             , url_gk
             , status
             , ausbau_plan_termin
             , aktiv
             , inserted
             , updated
             , inserted_by
             , updated_by
              -- 2022-05-06 neu @WISAND:
             , mindestbandbreite
             , zielbandbreite_geplant
             , kosten_hausanschluss
             , kundenauftrag_erforderlich
             , netwissen_seite   
             , mandant  
      FROM vermarktungscluster 
      --VERSIONS BETWEEN SCN MINVALUE AND MAXVALUE
      VERSIONS BETWEEN     timestamp minvalue and maxvalue
      WHERE vc_lfd_nr NOT IN (SELECT 1 FROM vermarktungscluster vc2 WHERE vc2.vc_lfd_nr = vc_lfd_nr)
      AND versions_operation = 'D'
      ORDER BY versions_starttime desc
      )
      )
               

