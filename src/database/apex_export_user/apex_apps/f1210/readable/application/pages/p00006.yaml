dynamic-actions: 
- # ====== Dynamic Action: Vermarktungscluster auswählen =======
  id: 180461785783071209
  identification: 
    name: Vermarktungscluster auswählen

  execution: 
    sequence: 10
    event-scope: Dynamic
    static-container-(jquery-selector): '#regionVMC'
    type: Immediate

  when: 
    event: Click
    selection-type: jQuery Selector
    jquery-selector: '#reportVMC td.u-tC, #reportVMC td.u-tL, #reportVMC td.u-tR'

  comments: 
    comments: Führt die Markierung und die Speicherung des Vermarktungsclusters durch, das der Benutzer im Report auswählt

  actions: 
  - # ====== Action: Execute JavaScript Code =====================
    id: 180461879140071210
    identification: 
      action: Execute JavaScript Code

    settings: 
      code: |
        $tr = $(this.triggeringElement).parent('tr');
        $tr.closest('tbody').find('tr').removeClass('selected');
        $tr.addClass('selected');
        let vcLfdNr = $tr.find('td[headers="vcLfdNr"]').text();
        let vcBezeichnung = $tr.find('td[headers="vcBezeichnung"]').text();
        $('#auswahlVMC').text(vcBezeichnung);
        let $button = $('#btnVermarktungsclusterZuordnen');
        $button.addClass('t-Button--hot');
        $button.find('span.fa').addClass('fa-map-marker-check fa-anim-flash'); // chi chi
        
        apex.item('P6_VC_LFD_NR').setValue(vcLfdNr);

    execution: 
      sequence: 10
      event: Vermarktungscluster auswählen # 180461785783071209
      fire-when-event-result-is: True
      fire-on-initialization: false

    comments: 
      comments: 'Markiert die ausgewählte Zeile im Report, schaltet den Button auf Hot, füllt das Item P6_VC_LFD_NR mit dem ausgewählten VMC #FX'

