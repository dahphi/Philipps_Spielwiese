- # ====== Region: Ausgewähltes Objekt: ========================
  id: 180461052780071202
  identification: 
    name: 'Ausgewähltes Objekt:'
    type: PL/SQL Dynamic Content [Legacy]

  source: 
    pl/sql-code: |
      htp.p(
        '<dl>'
        || '<dt>HAUS_LFD_NR</dt><dd>' || :P6_HAUS_LFD_NR || '</dd>'
        || '<dt>Adresse</dt><dd>' || REPLACE(:P6_ADRESSE, ',', '<br/>') || '</dd>'
        || CASE WHEN :P6_VMC_BEZEICHNUNG_ALT IS NULL THEN 
           '<dt>- kein Vermarktungscluster -</dt><dd></dd>'
           ELSE '<dt>bisheriger Vermarktungscluster</dt><dd>' || REPLACE(:P6_VMC_BEZEICHNUNG_ALT, ',', '<br/>') || '</dd>'
           END
        || '</dl>'
      );

  layout: 
    sequence: 10
    parent-region: No Parent
    slot: BODY
    start-new-layout: false
    start-new-row: true
    column: Automatic
    new-column: true
    column-span: 3

  appearance: 
    template: Standard
    template-options: 
    - '#DEFAULT#'
    - t-Region--scrollBody
    render-components: Below Content

  advanced: 
    static-id: ausgewaehltesObjekt
    region-display-selector: true
    exclude-title-from-translation: false

