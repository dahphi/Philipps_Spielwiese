processes: 
- # ====== Process: VERMARKTUNGSCLUSTER_ZUORDNEN ===============
  id: 185903483637908005
  identification: 
    name: VERMARKTUNGSCLUSTER_ZUORDNEN
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      PCK_VERMARKTUNGSCLUSTER.p_objekt_zuordnen(
         pin_haus_lfd_nr => :P6_HAUS_LFD_NR
        ,pin_vc_lfd_nr   => :P6_VC_LFD_NR
        ,pin_modus       => pck_vermarktungscluster.c_modus_alternativ
      );
      

  execution: 
    sequence: 20
    point: Processing
    run-process: Once Per Page Visit (default)

  success-message: 
    success-message: Objekt wurde dem Vermarktungscluster zugeordnet.

  error: 
    display-location: Inline in Notification

  server-side-condition: 
    when-button-pressed: BTN_VERMARKTUNGSCLUSTER_ZUORDNEN # 180461183705071203

  comments: 
    comments: Führt die Zuordnung des Vermarktungsclusters durch.

- # ====== Process: Bisherigen Vermarktungscluster ermitteln ===
  id: 185903786274908008
  identification: 
    name: Bisherigen Vermarktungscluster ermitteln
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      SELECT MAX(VCO.VC_LFD_NR), MAX(VMC.BEZEICHNUNG)
        INTO :P6_VMC_ALT, :P6_VMC_BEZEICHNUNG_ALT
        FROM VERMARKTUNGSCLUSTER_OBJEKT VCO
        JOIN VERMARKTUNGSCLUSTER VMC ON (VMC.vc_LFD_NR = VCO.VC_LFD_NR)
       WHERE VCO.HAUS_LFD_NR = :P6_HAUS_LFD_NR;

  execution: 
    sequence: 10
    point: Before Header
    run-process: Once Per Page Visit (default)

  server-side-condition: 
    type: Request = Value
    value: OBJEKTINFO_VMCLUSTER_ZUORDNUNG

  comments: 
    comments: Prozess wird einmalig ausgeführt, wenn diese Seite aus der Objektinfo-App aufgerufen wurde.

- # ====== Process: Hausadresse ermitteln ======================
  id: 185903841622908009
  identification: 
    name: Hausadresse ermitteln
