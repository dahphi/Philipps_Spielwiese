- # ====== Region: Vermarktungscluster =========================
  id: 174492550464947434
  identification: 
    name: Vermarktungscluster
    type: Interactive Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      select VC_LFD_NR,
             BEZEICHNUNG,
             DNSTTP_LFD_NR,
             URL,
             STATUS,
             AUSBAU_PLAN_TERMIN,
             AKTIV,
             MINDESTBANDBREITE,
             ZIELBANDBREITE_GEPLANT,
             KOSTEN_HAUSANSCHLUSS,
             KUNDENAUFTRAG_ERFORDERLICH,
             NETWISSEN_SEITE,
             INSERTED,
             UPDATED,
             INSERTED_BY,
             UPDATED_BY
        from VERMARKTUNGSCLUSTER
          -- der aktuelle Cluster soll nicht zum "Neu Zuordnen" erscheinen:
       WHERE :P6_VMC_ALT IS NULL OR VC_LFD_NR <> :P6_VMC_ALT
