- # ====== Dynamic Action: Checkbox Header =====================
  id: 188437504359283392
  identification: 
    name: Checkbox Header

  execution: 
    sequence: 130
    event-scope: Dynamic
    static-container-(jquery-selector): '#adressenIR'
    type: Immediate

  when: 
    event: Click
    selection-type: jQuery Selector
    jquery-selector: '#header_checkbox'

  comments: 
    comments: 'Reagiert auf den Klick des Benutzers auf die Checkbox in der Report-Headerzeile: Setzt oder entfernt alle sichtbaren Häkchen. Wenn durch Pagination beispielsweise nur 1000 Zeilen im Report angezeigt werden, dann werden auch nur Häkchen für maximal 1000 neue Zuordnungskandidaten generiert.'

  actions: 
  - # ====== Action: Execute JavaScript Code =====================
    id: 188437586622283393
    identification: 
      action: Execute JavaScript Code

    settings: 
      code: |
        spinner = apex.util.showSpinner();
        
        let checkboxHeader = this.triggeringElement;
        let headerIsCheckedByUser = checkboxHeader.checked;
        checkboxHeader.checked = !headerIsCheckedByUser;
        
        let $affectedCheckboxes = $('#adressenIR input.checkbox--ir:' + (headerIsCheckedByUser ? 'not(checked)' : 'checked') );
        
        
        let maxParameterLength = 32767; // Grenze in PL/SQL
        var currentParameterLength = 0;
        var checklist = [undefined,[],[],[],[],[],[],[],[],[],[]]; // Möglichst viele (10) große Listen an PL/SQL übergeben können (checklist[0] wird nicht verwendet)
        var numberOfCheckboxes = 0;
        var tooManyCheckboxes = false;
        var currentArray = 1;
        
        $affectedCheckboxes.each(function(){
          currentParameterLength = (checklist[currentArray].toString() + this.value).length;
          if(currentParameterLength > maxParameterLength - 1) {
            if(currentArray < checklist.length - 1) {
              currentArray++;
            } else {
              tooManyCheckboxes = true;
            }
          }
          if(!tooManyCheckboxes) checklist[currentArray].push(this.value);
          numberOfCheckboxes++;
        });
        
        if(!tooManyCheckboxes) {
          apex.server.process(
            (headerIsCheckedByUser ? 'asp_header_checked' : 'asp_header_not_checked'),
             {x01: checklist[1].toString(),
              x02: checklist[2].toString(),
              x03: checklist[3].toString(),
              x04: checklist[4].toString(),
              x05: checklist[5].toString(),
              x06: checklist[6].toString(),
              x07: checklist[7].toString(),
              x08: checklist[8].toString(),
              x09: checklist[9].toString(),
              x10: checklist[10].toString()
              },
              {
                success: function (pData) {
                  checkboxHeader.checked = !!headerIsCheckedByUser;
                  $affectedCheckboxes.prop('checked', headerIsCheckedByUser);
                  displayNumChecked(pData);
                  spinner.remove();
              },
                dataType: "text"
              }
          );
        } else { // tooManyEntries
          spinner.remove();
          alert('Die Anzahl der Checkboxen (' + numberOfCheckboxes + ') ist zu groß für die gemeinsame Ausführung: \nBitte verringern Sie die Anzahl der Zeilen pro Reportseite \n("Aktionen > Format > Zeilen pro Seite") \noder ordnen Sie das gesamte Ausbaugebiet per Schaltfläche zu.');
        }
        

    execution: 
      sequence: 10
      event: Checkbox Header # 188437504359283392
      fire-when-event-result-is: True
      fire-on-initialization: false

    comments: 
      comments: |
        1. Alle dargestellten(!) Checkboxen, die entsprechend der Header-Checkbox umgestellt werden müssen, in die nächste freie "checklist"-Liste eintragen (aber nicht anhaken!). Die Arrays werden beginnend mit index 1 aufgefüllt (bis max. index = 10).
        2. "checklist"-Listen an den Server schicken. 
        3. Server trägt die Checkboxen in die Collection ein.
        4. Beim success-Callback: Alle Checkboxen aus den checklist-Listen im Report setzen (ohne den Click-Event zu triggern, sonst Feedback-Schleife)
           Prinzipiell könnte man direkt danach die Seite sogar neu laden, da die Checkboxen zu diesem Zeitpunkt ja bereits persistiert sind

  - # ====== Action: Refresh =====================================
    id: 191457814667714040
    identification: 
      action: Refresh

    settings: 
      maintain-pagination: false

    affected-elements: 
      selection-type: Region
      region: P4_CHECKBOX # 188439918899283416

    execution: 
      sequence: 10
      event: Checkbox Header # 188437504359283392
      fire-when-event-result-is: True
      fire-on-initialization: false

    configuration: 
      build-option: Monitoring # 182846889201020994

    comments: 
      comments: Das Monitoring der Checkboxen aktualisieren

- # ====== Dynamic Action: Checkbox Adresszeile ================
  id: 188437644100283394
  identification: 
    name: Checkbox Adresszeile

  execution: 
    sequence: 140
    event-scope: Dynamic
    static-container-(jquery-selector): '#adressenIR'
    type: Immediate

  when: 
    event: Click
    selection-type: jQuery Selector
    jquery-selector: input.checkbox--ir

  comments: 
    comments: Setzt oder entfernt das Auswahl-Häkchen in jeder Adressen-Reportzeile, wenn der Benutzer deren Checkbox anklickt.

  actions: 
  - # ====== Action: Execute JavaScript Code =====================
    id: 188437768984283395
    identification: 
      action: Execute JavaScript Code

    settings: 
      code: |
        let checkbox = this.triggeringElement;
        let hausLfdNr = checkbox.value;
        let checkboxIsCheckedByUser = !!checkbox.checked;
        checkbox.checked = !checkboxIsCheckedByUser;
        
        apex.server.process(
           'asp_set_checkbox',
            {x01: checkboxIsCheckedByUser ? 1:0,
             x02: hausLfdNr
            },
            {
              success: function (pData) {
                $('#adressenIR input.checkbox--ir[value=' + hausLfdNr + ']').prop('checked', !!checkboxIsCheckedByUser);
                displayNumChecked(pData);
            },
            dataType: "text"
            }
        );
        

    execution: 
      sequence: 20
      event: Checkbox Adresszeile # 188437644100283394
      fire-when-event-result-is: True
      fire-on-initialization: false

    comments: 
      comments: |
        Die Änderung der Checkbox-Auswahl wird zunächst verhindert: Der tatsächliche Wert wird erst vom AJAX-Callbvakc bestätigt und visualisiert. In der success-function wird zudem der WErt jeder checkbox aktualisiert, deren Zeile dieselbe HAUS_LFD_NR besitzt (denn die HAUS_LFD_NR im Report ist nicht eindeutig. Daher muss jede weitere Zeile, die dasselbe Haus repräsentiert, ebenfalls umgestellt werden.
        

  - # ====== Action: Refresh =====================================
    id: 191457644275714039
    identification: 
      action: Refresh

    settings: 
      maintain-pagination: false

    affected-elements: 
      selection-type: Region
      region: P4_CHECKBOX # 188439918899283416

    execution: 
      sequence: 30
      event: Checkbox Adresszeile # 188437644100283394
      fire-when-event-result-is: True
      fire-on-initialization: false

    configuration: 
      build-option: Monitoring # 182846889201020994

    comments: 
      comments: Den Monitoring-Report der Checkboxen aktualisieren

