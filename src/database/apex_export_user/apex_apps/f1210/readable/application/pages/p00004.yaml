- # ====== Page Item: P4_SEARCH_GEBIET =========================
  id: 188311316860879828
  identification: 
    name: P4_SEARCH_GEBIET
    type: Select List

  label: 
    label: Ausbaugebiet
    alignment: Left

  settings: 
    page-action-on-selection: None

  multiple-values: 
    type: No

  layout: 
    sequence: 10
