- # ====== Process: Filter setzen ==============================
  id: 192916574111262037
  identification: 
    name: Filter setzen
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      :P4_FILTER := CASE :REQUEST 
                         WHEN 'P4_SEARCH_GEBIET' THEN 1
                         WHEN 'P4_SEARCH_TYP'    THEN 2
                         WHEN 'P4_SEARCH_ALL'    THEN 4                   
                         WHEN 'BTN_SEARCH'       THEN 4
                         ELSE :P4_FILTER
                    END;
      CASE :P4_FILTER
          WHEN 0 THEN
              :P4_SEARCH_GEBIET := NULL;
              :P4_SEARCH_TYP    := NULL;
              :P4_SEARCH_ALL    := NULL;
          WHEN 1 THEN
              :P4_SEARCH_TYP    := NULL;
              :P4_SEARCH_ALL    := NULL;
          WHEN 2 THEN
              :P4_SEARCH_GEBIET := NULL;
              :P4_SEARCH_ALL    := NULL;
          WHEN 4 THEN
              :P4_SEARCH_GEBIET := NULL;
              :P4_SEARCH_TYP    := NULL;
          ELSE
              NULL;
      END CASE;
      
      :P4_FILTER_NAME := CASE :P4_FILTER
                           WHEN 0 THEN ''
                           WHEN 1 THEN 'Dieses Ausbaugebiet'
                           WHEN 2 THEN 'Diesen Ausbaugebiet-Typ'
                           WHEN 4 THEN 'Diesen Adressbereich' -- nett, kommt aber derzeit nicht zum Einsatz
                           ELSE NULL
                         END;

  execution: 
    sequence: 10
    point: Processing
    run-process: Once Per Page Visit (default)

  error: 
    display-location: Inline in Notification

  comments: 
    comments: Setzt die Werte für die Items P4_FILTER und P4_FILTER_NAME und löscht diejenigen Eingabefelder, die nichts mit der aktuellen Suche zu tun haben, damit nicht (wie früher) völlig irrelevante Werte oberhalb des Reports zu sehen sind

