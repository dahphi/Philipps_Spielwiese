comments: 
  comments: |
    Ersetzt die bisherige Seite 7, @ticket FTTH-561.
    Durch Einschalten der Build Option "Monitoring" werden viele zusätzliche Hilfsregionen für den Entwickler eingeblendet.
    Durch Einschalten der Build Option "Entwicklerdokumentation" wird ein Report mit allen Seiten-Elementen sowie den zugehörigen Entwicklerkommentaren eingeblendet.
    @optimieren: Such-Collection nur dann anlegen, wenn Ergebnisse vorliegen (betrifft: erfolglose Adressensuche)

regions: 
- # ====== Region: Adressen IR =================================
  id: 185904441131908015
  identification: 
    name: Adressen IR
    type: Interactive Report

  source: 
    location: Local Database
    type: Function Body returning SQL Query
    language: PL/SQL
    pl/sql-function-body-returning-sql-query: |
      :P4_QUERY_STRING :=
      -- APEX ADVISOR SCHLÄGT HIER FEHLALARM --------------
      PCK_VERMARKTUNGSCLUSTER.fv_query_p4_collection(
              pin_ausbaugebiet       => :P4_SEARCH_GEBIET,
              piv_ausbaugebiet_typ   => :P4_SEARCH_TYP,
              piv_adresse            => :P4_SEARCH_ALL,
              pin_vc_lfd_nr          => :P4_VC_ID,
              pib_auswahl_bearbeiten => CASE WHEN :P4_AUSWAHL_BEARBEITEN = 1 THEN TRUE END
      );
      RETURN :P4_QUERY_STRING;
      
    page-items-to-submit: 
    - P4_QUERY_STRING
    - P4_SEARCH_GEBIET
    - P4_SEARCH_TYP
    - P4_SEARCH_ALL
    - P4_VC_ID
    - P4_AUSWAHL_BEARBEITEN

  layout: 
    sequence: 10
    parent-region: 'Adressen (ausgewählt: <span id="num_checked">&P4_NUM_CHECKED.</span>)' # 261201643148849180
