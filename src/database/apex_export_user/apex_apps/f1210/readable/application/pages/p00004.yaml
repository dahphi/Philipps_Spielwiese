- # ====== Page Item: P4_FILTER ================================
  id: 192916490651262036
  identification: 
    name: P4_FILTER
    type: Hidden

  settings: 
    value-protected: true

  layout: 
    sequence: 40
    region: P4_PAGE_ITEMS # 261201934744849183
    slot: BODY

  advanced: 
    warn-on-unsaved-changes: Page Default

  source: 
    type: Null
    used: Only when current value in session state is null

  session-state: 
    data-type: VARCHAR2
    storage: Per Session (Persistent)

  security: 
    session-state-protection: Unrestricted
    store-value-encrypted-in-session-state: true
    restricted-characters: All characters can be saved.

  comments: 
    comments: |
      Gibt an, mit welchem Filterkriterium gesucht wird.
      Zur Zeit gilt "entweder oder": Nur eines dieser Kriterien wird berücksichtigt:
      0 = keine Sucheingabe getätigt
      1 = Suche über Ausbaugebiet
      2 = Suche über Ausbaugebiet Typ
      4 = Suche über Adresse, "Adresssuche"
      Die Werte sind Zweiterpotenzen, damit zukünftig auch eine kombinierte Suche möglich wäre
      (z.B. 3 = Ausbaugebiet OR Typ, -3 = Ausbaugebiet AND Typ, 7 = alle Treffer kombinieren) ohne dafür bestehenden Code umschreiben zu müssen.

