  comments: 
    comments: |
      Report mit den Kandidaten für die Cluster-Zuordnung. Das SQL wird dynamisch vom PCK_VERMARKTUNGSCLUSTER generiert und an den Report zurückgegeben. P4_DO_SEARCH wird nicht mehr als Parameter benötigt, da der Report sowieso nur abgerufen wird, wenn das Page Item P4_DO_SEARCH auf 1 steht.
      Der Report ruft seine Daten aus diversen APEX_COLLECTIONS ab: Zu jeder Kombination aus Ausbaugebiet (P4_SEARCH_GEBIET) und Ausbaugebiet-Typ (P4_SEARCH_TYP) wird eine eigene APEX-Collection angelegt, deren Name durch einen Parameter-Hash generiert wird (siehe PCK_VERMARKTUNGSCLUSTER.fv_query_p4_collection, #HASHED_COLLECTION_NAME, Beispiel: 'P4_FD9B22ABE1021DE18D0B833FC49A7369'). Dadurch werden sowohl das erneute Aufrufen des Reports, aber vor allem das Umblättern in den Ergebnissen erheblich beschleunigt. Nach dem Zuordnen der ausgewählten Zeilen werden diese Collections sofort gelöscht.

