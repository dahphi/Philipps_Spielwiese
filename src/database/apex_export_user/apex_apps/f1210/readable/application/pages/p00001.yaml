        Ergibt den String "prozent", wenn die Prozentberechnung der Gesamtquote gültig ist (also keine Division durch 0 durchführt).
        Nur mit einer HTML Expression und dieser CSS-Ergänzung bekommt man das Prozentzeichen hinter die Zahl, ohne dass gleichzeitig die gesamte Spalte zum String wird und sich dann nicht mehr nummerisch sortieren ließe.

