processes: 
- # ====== Process: Prototyp - Collections erzeugen ============
  id: 214674964648644978
  identification: 
    name: Prototyp - Collections erzeugen
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      -- +-------------+
      -- | Collections |
      -- +-------------+
      
      -- ----------------
      -- Vertriebslcuster
      -- 
      -- N001 : ID
      -- C001 : Name
      -- C002 : Technologie
      -- C003 : Ausbaustatus
      -- D001 : Plantermin
      -- D002 : VVM_von
      -- D003 : VVM_bis 
      -- ----------------
      APEX_COLLECTION.CREATE_OR_TRUNCATE_COLLECTION(
          p_collection_name => 'VERTRIEBSCLUSTER');
      
      -- Testdaten
      APEX_COLLECTION.ADD_MEMBER(
              p_collection_name => 'VERTRIEBSCLUSTER',
              p_c001            => 'VC 1',
              p_c002            => 'FTTH',
              p_c003            => 'NotPlanned',
              p_n001            => 1,
              p_d001            => NULL, 
              p_d002            => NULL, 
              p_d003            => NULL 
              );
      APEX_COLLECTION.ADD_MEMBER(
              p_collection_name => 'VERTRIEBSCLUSTER',
              p_c001            => 'VC 2',
              p_c002            => 'FTTH',
              p_c003            => 'AreaPlanned',
              p_n001            => 2,
              p_d001            => NULL, 
              p_d002            => NULL, 
              p_d003            => NULL 
              );
      APEX_COLLECTION.ADD_MEMBER(
              p_collection_name => 'VERTRIEBSCLUSTER',
              p_c001            => 'VC 3',
              p_c002            => 'FTTH',
              p_c003            => 'PreMarketing',
              p_n001            => 3,
              p_d001            => sysdate, 
              p_d002            => sysdate + 30, 
              p_d003            => sysdate + 60 
              );
      APEX_COLLECTION.ADD_MEMBER(
              p_collection_name => 'VERTRIEBSCLUSTER',
              p_c001            => 'VC 4',
              p_c002            => 'FTTH',
              p_c003            => 'underConstruction',
              p_n001            => 4,
              p_d001            => NULL, 
              p_d002            => NULL, 
              p_d003            => NULL 
              );
      -- ------------------------
      -- Vertriebslcuster Details
      --
      -- N001 : VC_ID
      -- N002 : HAUS_LFD_NR
      -- ------------------------
      APEX_COLLECTION.CREATE_OR_TRUNCATE_COLLECTION(
          p_collection_name => 'VERTRIEBSCLUSTER_DETAILS');

  execution: 
    sequence: 10
    point: Before Header
    run-process: Once Per Page Visit (default)

  configuration: 
    build-option: DISABLED # 214649311448422564

