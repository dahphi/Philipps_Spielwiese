dynamic-actions: 
- # ====== Dynamic Action: IG: Kopieren in Zwischenablage ermögl
  id: 148883272527180195
  identification: 
    name: 'IG: Kopieren in Zwischenablage ermöglichen'

  execution: 
    sequence: 40
    event-scope: Static

  when: 
    event: Page Load

  configuration: 
    build-option: 'DA: IG Copy Hack' # 148917586850645905

  comments: 
    comments: |
      Ermöglicht es, den gesamten Inhalt einer markierte Zelle im Interactive Grid in die Zwischenablage zu kopieren.
      @copy

  actions: 
  - # ====== Action: copy-Event abfangen =========================
    id: 148883396309180196
    identification: 
      name: copy-Event abfangen
      action: Execute JavaScript Code

    settings: 
      code: |
        document.addEventListener('copy', (event) => {
            event.clipboardData.setData('text/plain', $(document.activeElement)[0].innerText || window.getSelection());
            event.preventDefault();
        });

    execution: 
      sequence: 10
      event: 'IG: Kopieren in Zwischenablage ermöglichen' # 148883272527180195
      fire-when-event-result-is: True
      fire-on-initialization: false

    comments: 
      comments: '@url https://www.oneoracledeveloper.com/2022/03/copy-cell-value-from-ig-global-edition.html'

