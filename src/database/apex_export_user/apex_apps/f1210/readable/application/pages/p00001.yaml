      data-type: VARCHAR2
      query-only: false
      primary-key: false

    default: 
      duplicate-copies-existing-value: true

    column-filter: 
      enabled: true
      performance-impacting-operators: 
      - Contains
      - Starts With
      - Case Insensitive
      - Regular Expression
      text-case: Mixed
      lov-type: Use List of Values
      exact-match: true

    export-/-printing: 
      include-in-export-/-print: true

    enable-users-to: 
      sort: true
      control-break/aggregate: true
      hide: true

    read-only: 
      type: Always
      execute: Once

    comments: 
      comments: |
        @date 2024-01-31: Endültige Umstellung der Spalte STATUS auf Read Only = Always, daher nur noch Anzeige des aktuellen Status per List of Values und nicht mehr die komplizierte Mimik zuvor. Grund: Man konnte auf der Spalte STATUS im IG nicht filtern. Inzwischen kann man im IG ja sowieso keine Änderungen mehr vornehmen, sondern nur noch über das Dialogfenster Page 3.
        
        -- alter Kommentar vor dieser Umstellung:
        @ticket FTTH-1787: Die LOV zeigt prinzipiell nur noch den aktuellen Status plus diejenigen Status an, die sich aus der Spalte :FOLGESTATUS ergeben. Nachteil dieser Dynamik: Es wird ein Ajax-Request durchgeführt, wobei sich der Mauszeiger für ca. eine Sekunde in einen Spinner verwandelt, wenn man die LOV aufklappt. Für den seltenen Fall einer neu hinzugefügten Zeile muss per COALESCE die komplette Statusfolge für NULL erneut abgerufen werden (dafür nicht NVL verwenden oder den Folgestatus hart kodieren!), weil :FOLGESTATUS nicht vorbelegt ist. Das Cascading-LOV-Attribut "Parent required" muss auf No stehen. @date 2023-04-05: Akzeptanzkriterien besagen, dass hier der Status nicht mehr änderbar sein soll, daher wird diese Spalte ab Implementierung von @FTTH-1787 disabled (=auf "Read Only" umgestellt). Sollte dies zukünftig nicht mehr erwünscht sein, kann durch Wegnahme dieses Attributs der alte LOV-Zustand sofort wiederhergestellt werden (da das SQL dies weiterhin ermöglicht).
        
        LOV-Definition in diesem Fall:
        SELECT disp_val, ret_val FROM core.v_lov_ausbaustatus WHERE ret_val IN (
          SELECT COLUMN_VALUE FROM TABLE(APEX_STRING.SPLIT(COALESCE(:FOLGESTATUS, PCK_VERMARKTUNGSCLUSTER.fv_vc_folgestatus(NULL)), ',')))

