- # ====== Region: IR_GEPLANTE_AKTIONEN ========================
  id: 182416611797952830
  identification: 
    name: IR_GEPLANTE_AKTIONEN
    type: Interactive Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      SELECT SEQ_ID,
             N001 AS ZEILENNUMMER_CSV,
             N002 AS GEPLANTE_AKTION,
             N005 AS PROBLEMKATEGORIE,
             SIGN (N005) AS SCHWERWIEGEND, -- negativ: schwerwiegend, positiv: nur auffällig, NULL: OK
             C001 AS HAUS_LFD_NR,
             C002 AS VMC_ALT,
             C003 AS VMC_NEU,
             C005 AS VALIDIERUNG,
             APEX_ITEM.SWITCH(
                   p_idx        => SEQ_ID,
                   p_value      => N003,
                   p_on_value   => '1',
                   p_on_label   => 'ja',
                   p_off_value  => '0',
                   p_off_label  => 'nein',
                   p_item_id    => 'seq-' || seq_id,
                   p_item_label => NULL
             ) AS STATUS,
             N003 AS STATUS_AUSFUEHREN,
             NVL(C006, '-') AS ADRESSE,
             NVL(C007, '-') AS VMC_ALT_BEZEICHNUNG,
             NVL(C008, '-') AS VMC_NEU_BEZEICHNUNG,
             C011 AS STR,
             C012 AS NR,
             C013 AS ZUS,
             C014 AS PLZ,
             C015 AS ORT       
        FROM APEX_COLLECTIONS C
       WHERE COLLECTION_NAME = PCK_VERMARKTUNGSCLUSTER.COLLECTION_NAME_AKTIONSLISTE

