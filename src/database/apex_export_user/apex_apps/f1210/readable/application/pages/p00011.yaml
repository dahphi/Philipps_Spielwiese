processes: 
- # ====== Process: BTN_WEITER_1 ===============================
  id: 182132019096387804
  identification: 
    name: BTN_WEITER_1
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      :P11_ZEILENAUSWAHL := NULL;
      :P11_SPALTENAUSWAHL := NULL;
      :P11_AKTION := NULL;
      :P11_CLUSTERAUSWAHL := NULL;
      :P11_FILE_NAME := SUBSTR(:P11_FILE, 1 + INSTR(:P11_FILE, '/'));
      :P11_FILE_ID := SUBSTR(:P11_FILE, 1, INSTR(:P11_FILE, '/') -1);
      DELETE APEX_APPLICATION_TEMP_FILES WHERE ID <> :P11_FILE_ID;
      

  execution: 
    sequence: 10
    point: Processing
    run-process: Once Per Page Visit (default)

  error: 
    display-location: Inline in Notification

  server-side-condition: 
    when-button-pressed: BTN_WEITER_1 # 182131609116387800

  comments: 
    comments: |
      P11_FILE ist eine Kombination aus ID und Dateiname, getrennt durch einen Schrägstrich (Beispiel: 123456789/dummy.txt).
      In diesem Prozess wird der ID-Part in das Page Item :P11_FILE_ID kopiert und alle hochgeladenen Dateien, die nicht diese ID besitzen, gelöscht.

- # ====== Process: Step-2: Spalte HAUS_LFD_NR vorauswählen ====
  id: 182135409241387838
  identification: 
    name: 'Step-2: Spalte HAUS_LFD_NR vorauswählen'
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      IF :P11_FILE_ID IS NOT NULL THEN
          PCK_VERMARKTUNGSCLUSTER.p_finde_spalte_in_csv_header (
              pib_blob_content      => PCK_VERMARKTUNGSCLUSTER.f_blob_content_temp_files(:P11_FILE_ID),
              piv_dateiname         => :P11_FILE_NAME,
              piv_suchmuster        => '%HAUS%LFD%NR%',
              pin_zeilennummer      => :P11_ZEILENAUSWAHL,
              pin_scan_zeilen       => 3,
              pon_zeilennummer      => :P11_HEADER_ZEILENNUMMER,
              pon_spaltennummer     => :P11_HEADER_SPALTENNUMMER,
              pov_spaltenname       => :P11_HEADER_SPALTENNAME
          );
          :P11_SPALTENAUSWAHL := :P11_HEADER_SPALTENNUMMER;
          IF :P11_HEADER_ZEILENNUMMER IS NOT NULL THEN
              :P11_ZEILENAUSWAHL  := :P11_HEADER_ZEILENNUMMER;
          END IF;
          :P11_ANZAHL_AKTIONEN := NULL;
      END IF;

  execution: 
    sequence: 10
    point: After Header
    run-process: Once Per Page Visit (default)

  server-side-condition: 
    type: Item = Value
    item: P11_STEP
    value: 2

  comments: 
    comments: Anhand des Inhalts der Importliste wird versucht, die Zeilen- und Spaltennummer der HAUS_LFD_NR zunächst automatisch zu bestimmen

- # ====== Process: Step-3: Aktionsliste erzeugen ==============
  id: 182416725530952831
  identification: 
    name: 'Step-3: Aktionsliste erzeugen'
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      PCK_VERMARKTUNGSCLUSTER.p_create_aktionsliste(
          pib_blob_content       => PCK_VERMARKTUNGSCLUSTER.f_blob_content_temp_files(:P11_FILE_ID)
         ,piv_dateiname          => :P11_FILE_NAME
         ,pin_start_zeilennummer => :P11_ZEILENAUSWAHL + 1
         ,pin_spaltennummer_haus => :P11_SPALTENAUSWAHL
         ,pin_aktion             => :P11_AKTION
         ,piv_vmc_neu            => :P11_CLUSTERAUSWAHL 
      
      );

  execution: 
    sequence: 20
    point: After Submit
    run-process: Once Per Page Visit (default)

  error: 
    display-location: Inline in Notification

  server-side-condition: 
    when-button-pressed: BTN_WEITER_2 # 182132481228387809

  comments: 
    comments: Die Importliste wird erneut geparst und mit den Daten aus STEP-2 angereichert. Daraus entsteht in Step 3 die APEX_COLLECTION namens AKTIONSLISTE. Der Benutzer kann die Aktionsliste zeilenweise editieren, bevor sie an STEP-4 zur Ausführung weitergegeben wird.

- # ====== Process: ASP_AKTION_UMSCHALTEN ======================
  id: 182986476573083593
  identification: 
    name: ASP_AKTION_UMSCHALTEN
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      PCK_VERMARKTUNGSCLUSTER.p_aktion_umschalten(
        pin_seq_id           => apex_application.g_x01
       ,pin_schalterstellung => apex_application.g_x02
      );
      -- Erfolgsmeldung rechts oben:
      ---htp.p('g_x01=' || apex_application.g_x01 || ', G-x02=' || apex_application.g_x02);
      htp.p(CASE apex_application.g_x02 WHEN 1 THEN 'Ausführung bestätigt' WHEN 0 THEN 'Ausführung ausgeschlossen' END);
      
      

  execution: 
    sequence: 10
    point: Ajax Callback
    run-process: Once Per Page Visit (default)

  comments: 
    comments: |
      x01: SEQ_ID der Zeile in der Collection, deren Switch umgestellt wurde (NICHT die CSV-Zeilennummer!)
      x02: Neuer Wert des Switches (0=nein|1=ja)

