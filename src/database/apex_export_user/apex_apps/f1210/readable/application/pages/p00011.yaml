- # ====== Dynamic Action: IR: AKTION_UMSCHALTEN ===============
  id: 182792688392490614
  identification: 
    name: 'IR: AKTION_UMSCHALTEN'

  execution: 
    sequence: 40
    event-scope: Dynamic
    static-container-(jquery-selector): '#IR_GEPLANTE_AKTIONEN'
    type: Immediate

  when: 
    event: Change
    selection-type: jQuery Selector
    jquery-selector: input[name^="seq-"]

  comments: 
    comments: 'Reaktion auf das Umschalten des Switches "Ausführen?": Per AJAX den Datensatz in der Collection aktualisieren und im Callback die Farbe der Zeile entsprechend ändern'

  actions: 
  - # ====== Action: Execute JavaScript Code =====================
    id: 182792757502490615
    identification: 
      action: Execute JavaScript Code

    settings: 
      code: |
        let $schalter = $(this.triggeringElement);
        let schalterstellung = $schalter.attr('value'); // e.g. 1
        let schalterId = $schalter.attr('id'); // e.g. seq-308_Y, der Underscore gefolgt von Y|N kommt aus APEX
        let underscore = schalterId.indexOf("_");
        let seqId = schalterId.substr(4, underscore -4); // e.g. 308
        
        apex.server.process ("ASP_AKTION_UMSCHALTEN", 
        	{x01 : seqId,
        	 x02 : schalterstellung
        	},
            {type    : 'GET', dataType: 'text',
             success : function(text) {
        	             apex.message.showPageSuccess(text);
                       }
        	}
        );

    execution: 
      sequence: 10
      event: 'IR: AKTION_UMSCHALTEN' # 182792688392490614
      fire-when-event-result-is: True
      fire-on-initialization: false

- # ====== Dynamic Action: Auswahl VMC zunächst ausblenden =====
  id: 182991071776083639
  identification: 
    name: Auswahl VMC zunächst ausblenden

  execution: 
    sequence: 50
    event-scope: Static

