- # ====== Application Process: Collection P4 löschen ==========
  id: 191509221128356093
  identification: 
    name: Collection P4 löschen
    type: NATIVE_PLSQL

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      IF APEX_COLLECTION.COLLECTION_EXISTS('P4_CHECKBOX') THEN
        APEX_COLLECTION.DELETE_COLLECTION ('P4_CHECKBOX');
      END IF;

  execution: 
    sequence: 10
    point: Before Header

  server-side-condition: 
    type: Current Page != Page
    page: 4

  comments: 
    comments: Wenn irgendeine andere Seite als P4 aufgerufen wird, muss die Collection mit den gespeicherten Checkboxen gelöscht werden. So erspart man sich das Löschen durch Überwachung sämtlicher Zugangswege (Buttons, Link-URLs etc.)

  subscription: 
    version-number: 1

