- # ====== List of Values: WHOLEBUY-PARTNER (NUR TELEKOM!) =====
  id: 195631910311811111
  identification: 
    name: WHOLEBUY-PARTNER (NUR TELEKOM!)

  subscription: 
    version-number: 1

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      SELECT singular AS D,
             key      AS R
        FROM enum
       WHERE domain = 'WHOLEBUY_PARTNER'
         AND sprache = '*'
         AND key IN ('TCOM') -- 'DGF' noch nicht, Stand 2023-11
       ORDER BY pos

  column-mapping: 
    return: R
    display: D
    default-sort: Use Order By from Query

