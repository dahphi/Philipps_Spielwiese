- # ====== List of Values: BANDBREITE (MINDESTBANDBREITE) ======
  id: 176498480866082925
  identification: 
    name: BANDBREITE (MINDESTBANDBREITE)

  subscription: 
    version-number: 1

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      SELECT BANDBREITE || ' Mbit/s' AS D, BANDBREITE AS R
      FROM
      (SELECT 50 AS BANDBREITE FROM DUAL UNION ALL
      SELECT 100 FROM DUAL UNION ALL
      SELECT 250 FROM DUAL UNION ALL
      SELECT 500 FROM DUAL UNION ALL
      SELECT 1000 FROM DUAL
      )
      ORDER BY BANDBREITE

  column-mapping: 
    return: R
    display: D
    default-sort: Use Order By from Query

