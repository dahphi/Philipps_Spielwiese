- # ====== REST Data Source: preorders (Auftragsliste) =========
  id: 226004386971065012
  identification: 
    name: preorders (Auftragsliste)

  subscription: 
    version-number: 4105889336148

  source: 
    type: HTTP
    remote-server: glascontainer-webservice # 20703242720874146
    url-path-prefix: ftth-order/preorders

  settings: 
    pagination-type: Page Number
    page-number-url-parameter: page
    index-of-first-page: 0
    fixed-page-size: 50
    total-rows-selector: totalCount

  authentication: 
    credentials: 'AOE-Webservice: PreOrder-Buffer' # 149575738423418637

  rest-synchronization: 
    job-is-active: true
    local-table-owner: ROMA_MAIN
    local-table-name: FTTH_WS_SYNC_PREORDERS
    type: Merge
    schedule: FREQ=DAILY;INTERVAL=1;BYHOUR=4;BYMINUTE=0;BYSECOND=0
    commit-interval: 500
    http-request-limit: 1000

  advanced: 
    static-id: preorders_
    pass-ecid: Y
    http-transfer-timeout: 30

  comments: 
    comments: |
      Nächtlich durchgeführte Synchronisierung mit dem PreOrder-Buffer im Backend (Richtung: AOE-Server => Glascontainer). Die Tabelle FTTH_WS_SYNC_PREORDERS ist die Datengrundlage für P10 "Auftragsliste". 
      Die Synchronsierung kann "außer der Reihe" jederzeit manuell in APEX gestartet werden (was im Normalfall unnötig ist), oder mit der Prozedur PCK_GLASCONTAINER.p_webservice_synchronisieren. Letzteres geschieht, wenn man als App-Administrator den Link "Erneut synchronisieren" unterhalb der Auftragsliste anklickt.
      Neue Spalten hinzufügen: siehe Button "Edit Data Profile" auf dieser Seite -- ... @SYNC

