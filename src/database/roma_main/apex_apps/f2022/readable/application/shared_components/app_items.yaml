  comments: 
    comments: Nimmt die Auftrags-ID entegegen, wenn beispielsweise aus SIEBEL oder der AUFTRAGSLISTE ein Link den Auftragsdaten angeklickt wird. Der Sinn dahinter ist, dass der Aufrufer nicht die konkrete Seiten-ID kennen sollte, da diese sich unter Umständen später ändern könnte. Derzeit wird auf Seite 20 in einem Pre-Rendering-Prozess die UUID an P20_UUID übergeben.

