- # ====== Application Item: G_ROLLENLISTE =====================
  id: 248950410167262460
  identification: 
    name: G_ROLLENLISTE
    scope: Application

  security: 
    session-state-protection: Restricted - May not be set from browser
    escape-special-characters: false

  comments: 
    comments: |
      @ticket FTTH-2722: Kommaseparierte Liste mit den Namen der Glascontainer-Rollen, die der APEX APP_USER tatsächlich oder deklarativ besitzt. Da der User üblicherweise nur die mächtigste Rolle im AD benötigt, umfasst G_ROLLENLISTE auch deren untergeordneten Rollen.
      Dies ermöglicht es auch, in der Testumgebung bestimmte Berechtigungen "am AD vorbei" deklarativ anzunehmen, um das Berechtigungskonzept zu prüfen.

  subscription: 
    version-number: 1

