- # ====== Application Process: Track Page =====================
  id: 59473098564930421
  identification: 
    name: Track Page
    type: NATIVE_PLSQL

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      PCK_GLASCONTAINER.track_page(
          piv_app_id        => :APP_ID
          , piv_app_page_id => :APP_PAGE_ID
          , pin_app_session => :APP_SESSION
          , piv_request     => :REQUEST
      );

  execution: 
    sequence: 100
    point: Before Header

  server-side-condition: 
    type: Current Page is NOT in comma delimited list
    pages: 
    - 14
    - ' 16'
    - ' 100'
    - ' 110'

  configuration: 
    build-option: Tracking # 59477255672398458

  comments: 
    comments: '@ticket FTTH-4003: Speichert jeden relevanten Seitenaufruf in der Tabelle POB_TRACKING. Wird hier stellvertretend für alle Tracking-relevanten Seiten ausgeführt, die NICHT über eine eigene speziellere Trackl-Page-Prozedur verfügen ("Current Page is NOT in Expression1"). Um nicht doppelt zu loggen, wurde die Applikations-Eigenschaft "Logging" deaktiviert.'

  subscription: 
    version-number: 4100877090497

- # ====== Application Process: AP_NEUE_EXTERNE_AUFTRAGSNUMMER =
  id: 70562793764224514
  identification: 
    name: AP_NEUE_EXTERNE_AUFTRAGSNUMMER
    type: NATIVE_PLSQL

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      DECLARE
          v_neue_auftragsnummer VARCHAR2(100);
      BEGIN
          v_neue_auftragsnummer := PCK_GLASCONTAINER_ORDER.fv_neue_externe_auftragsnummer(
            piv_uuid            => apex_application.g_x01
           ,piv_connectivity_id => apex_application.g_x02
           ,piv_app_user        => :APP_USER
          );
          COMMIT;
          htp.p(v_neue_auftragsnummer);
      EXCEPTION
        WHEN OTHERS THEN
          ROLLBACK;
          htp.p(SQLERRM);
      END;

  execution: 
    sequence: 100
    point: Ajax Callback

  security: 
    authorization-scheme: MODEL.LOV.MUST_NOT_BE_PUBLIC_USER

  comments: 
    comments: "@ticket FTTH-3815: Gibt die neu erzeugte Externe Auftragsnummer an die aufrufende JavaScript-Funktion zurück. Im Fehlerfall beginnt der zurückgegebene String jedoch mit 'ORA-', was von der aufrufenden Funktion im success-Zweig vor der Zuweisung geprüft werden muss"

  subscription: 
    version-number: 4070383712921

- # ====== Application Process: AP_UPDATE_PRODUCT ==============
  id: 233022887590131521
  identification: 
    name: AP_UPDATE_PRODUCT
    type: NATIVE_PLSQL

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      BEGIN
      PCK_GLASCONTAINER.ap_update_product (
              piv_uuid                 => apex_application.g_x01,
              piv_promotion            => apex_application.g_x02,
              piv_router_auswahl       => apex_application.g_x03,
              piv_router_eigentum      => apex_application.g_x04,
              piv_installationsservice => apex_application.g_x05
      );
      htp.p(TO_CHAR(NULL));
      EXCEPTION
        WHEN OTHERS THEN
          htp.p(pck_str.fv_remove_ora(SQLERRM));
      END;

  execution: 
    sequence: 100
    point: Ajax Callback

  security: 
    authorization-scheme: MODEL.LOV.MUST_NOT_BE_PUBLIC_USER

  comments: 
    comments: /// @deprecated (in der ersten Version des Glascontainers bis 2022-07 wurde noch per AJAX gespeichert, dies erschwert jedoch die Validierung und wurde daher ersetzt durch den synchronen Prozess P20 "PRODUKTAENDERUNG_SPEICHERN"

  subscription: 
    version-number: 1

