- # ====== Application Process: INIT_APPLICATION ===============
  id: 238315661211397756
  identification: 
    name: INIT_APPLICATION
    type: NATIVE_PLSQL

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: ':P10100_WS_MODUS := PCK_GLASCONTAINER.C_WS_MODUS_ONLINE_AND_OFFLINE;'

  execution: 
    sequence: 1
    point: New Session

  comments: 
    comments: |
      Prozess läuft einmalig beim Start der Anwendung mit einer neuen Session-ID.
      Der Webservice-Modus wird auf den Defaultwert "Online und Offline" eingestellt. P10100_WS_MODUS kann auf der Seite "Einstellungen" für die Dauer der APEX-Session geändert werden.

  subscription: 
    version-number: 1

- # ====== Application Process: G_NEUE_AKTION ==================
  id: 246603072514241952
  identification: 
    name: G_NEUE_AKTION
    type: NATIVE_PLSQL

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      SELECT d, r
        INTO :G_NEUE_AKTION_DISPLAY
           , :G_NEUE_AKTION
        FROM TABLE(PCK_GLASCONTAINER.LOV(
          piv_name       => 'TARIF', 
          piv_parameter1 => '2024-09'
        )
      );

  execution: 
    sequence: 1
    point: New Session

  comments: 
    comments: |
      @ticket FTTH-2411: Holt die beiden LOV-Werte für die neue Aktion. Wird auf Seite P20 verwendet. Sollte in den Jahren nach 2023 wieder eine neue Aktion einzubinden sein, muss der Abfrageparameter ("2023-09") entsprechend geändert werden.
      @ticket FTTH-4064: Umstellung auf "2024-09"

  subscription: 
    version-number: 4056660057119

