      event: Suche aktivieren # 69573448030798820
      fire-when-event-result-is: True
      fire-on-initialization: false
      stop-execution-on-error: true
      wait-for-result: true

    comments: 
      comments: '@ticket FTTH-4884: Bitte beachten: Das Item darf hier nicht serverseitig persisitert werden, sonst läuft der Report schon beim Aufruf der Seite! Die Persistierung erfolgt durch die Angabe von "Items to Subnmit" im Report.'

- # ====== Dynamic Action: Kundennummer öffnet Siebel ==========
  id: 81403014183397447
  identification: 
    name: Kundennummer öffnet Siebel

  execution: 
    sequence: 30
    event-scope: Dynamic
    static-container-(jquery-selector): '#auftragslisteIR'
    type: Immediate

  when: 
    event: Click
    selection-type: jQuery Selector
    jquery-selector: td[headers='tdKnr'] > a

  comments: 
    comments: '@ticket FTTH-4470: Reagiert auf das Anklicken einer Kundennummer, indem ein neues Browserfenster mit der Siebel-Kundenmaske geöffnet wird'

  actions: 
  - # ====== Action: Kundennummer persistieren ===================
    id: 81403255628397449
    identification: 
      name: Kundennummer persistieren
      action: Execute JavaScript Code

    settings: 
      code: |
        let $link = $(this.triggeringElement);
        let knr = $link.text();
        if(!knr) apex.da.cancel(); // abbrechen, wenn es keine Kundennummer gibt
        
        let accountId = $link.data('account_id');
        if(!accountId) apex.da.cancel(); // abbrechen, wenn es keine account_id gibt
        
        apex.item('P10_TEMP_KNR').setValue(knr);
        apex.item('P10_TEMP_ACCOUNT_ID').setValue(accountId);
        

    execution: 
      sequence: 20
      event: Kundennummer öffnet Siebel # 81403014183397447
      fire-when-event-result-is: True
      fire-on-initialization: false

    comments: 
      comments: '@ticket FTTH-4470: Zur Ermittlung des Links im nächsten Schritt werden die Werte der Kundennummer und der Account-ID in Hidden Items geschrieben.'

  - # ====== Action: AccountId ermitteln =========================
    id: 81403380205397450
    identification: 
      name: AccountId ermitteln
      action: Execute Server-side Code

    settings: 
      language: PE.PROPERTY.SOURCE_SNIPPET_LANG.LOV.PLSQL.D
      pl/sql-code: |
        :P10_TEMP_HREF := PCK_GLASCONTAINER.fv_href_siebel_kundenmaske(
            piv_account_id    => :P10_TEMP_ACCOUNT_ID
          , piv_kundennummer  => :P10_TEMP_KNR
        );
      items-to-submit: 
      - P10_TEMP_KNR
      - ' P10_TEMP_ACCOUNT_ID'
      items-to-return: 
      - P10_TEMP_HREF
      suppress-change-event: false

    execution: 
      sequence: 30
      event: Kundennummer öffnet Siebel # 81403014183397447
      fire-when-event-result-is: True
      fire-on-initialization: false
      stop-execution-on-error: true
      wait-for-result: true

    comments: 
      comments: '@ticket FTTH-4470: Der Link zur Siebel-Kundenmaskte wird in dieser Action serverseitig generiert, da er umgebungsabhängig ist. Es wäre für die Report-Performance schädlich, im Voraus für jeden Auftrag diese zusätzliche Berechnung durchzuführen.'

  - # ====== Action: Siebel in neuem Tab öffnen ==================
    id: 81403682144397453
    identification: 
      name: Siebel in neuem Tab öffnen
      action: Execute JavaScript Code

    settings: 
      code: |
        let href = apex.item('P10_TEMP_HREF').getValue();
        let knr = apex.item('P10_TEMP_KNR').getValue();
        let accountId = apex.item('P10_TEMP_ACCOUNT_ID').getValue();
        if(!!href) {
            window.open(href, '_blank').focus();
        } else {
            apex.message.alert('Zur Kundennummer ' + knr + ' und Account-ID ' + accountId + ' existiert in Siebel keine passende GLOBAL_ID.\nDie Kundenmaske kann nicht geöffnet werden.');
        }

    execution: 
      sequence: 40
      event: Kundennummer öffnet Siebel # 81403014183397447
      fire-when-event-result-is: True
      fire-on-initialization: false

    comments: 
      comments: '@ticket FTTH-4470: Nur wenn ein gültiger Link ermittelt werden konnte, wird die siebel-Kundenmaske geöffnet, ansonsten wird eine Fehlermeldung angezeigt.'

- # ====== Dynamic Action: IG Copy Hack ========================
