- # ====== Dynamic Action: Suche aktivieren ====================
  id: 69573448030798820
  identification: 
    name: Suche aktivieren

  execution: 
    sequence: 40
    event-scope: Static
    type: Immediate

  when: 
    event: Before Refresh
    selection-type: Region
    region: Glascontainer Auftragsliste # 224924544000269794

  comments: 
    comments: '@ticket FTTH-4884: Setzt das Suchflag unmittelbar vor der Ausführung des IR.'

