- # ====== Region: Synchronisierungsvorgänge ===================
  id: 262867687021823713
  identification: 
    name: Synchronisierungsvorgänge
    type: Interactive Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      SELECT rest_source_name,
             status,
             status_code,
             start_timestamp,
             end_timestamp,
             runtime,
             substr(to_char(runtime), 15, 5) AS dauer,
             EXTRACT(HOUR FROM runtime)   AS runtime_hours,
             EXTRACT(MINUTE FROM runtime) AS runtime_minutes,
             EXTRACT(SECOND FROM runtime) AS runtime_seconds,
             rows_processed,
             sync_messages,
             is_job
        FROM (
          SELECT rest_source_name,
                 status,
                 status_code,
                 start_timestamp,
                 end_timestamp,
                 end_timestamp - start_timestamp AS runtime,
                 rows_processed,
                 sync_messages,
                 is_job
            FROM apex_rest_source_sync_log
           WHERE application_id = :APP_ID
           -- AND rest_source_name IN ('preorders (Auftragsliste)'
      )

