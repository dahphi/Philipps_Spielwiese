processes: 
- # ====== Process: Track Page (vor Bestellung) ================
  id: 56535611187052122
  identification: 
    name: Track Page (vor Bestellung)
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      :P110_SCOPE := 99; -- "vorletzter Schritt: Bestellung absenden"
      
      PCK_GLASCONTAINER.track_page(
          piv_app_id      => :APP_ID
        , piv_app_page_id => :APP_PAGE_ID
        , pin_app_session => :APP_SESSION
        , piv_task        => :P100_TASK
        , piv_scope       => :P110_SCOPE
        , piv_extra       => 'KUNDENSTATUS='    || :P110_KUNDENSTATUS
                          || ',DUBLETTEN_SIE='  || :P100_ANZAHL_DUBLETTEN_SIE
                          || ',DUBLETTEN_POB='  || :P100_ANZAHL_DUBLETTEN_POB
                          || ',KUNDENDATEN='    || COALESCE(:P100_DUPLICATE_SRC, 'INP')
      );
      
      

  execution: 
    sequence: 10
    point: Processing
    run-process: Once Per Page Visit (default)

  error: 
    display-location: Inline in Notification

  server-side-condition: 
    when-button-pressed: BTN_VORBESTELLUNG_ERFASSEN # 227587573628059077

  configuration: 
    build-option: Tracking # 59477255672398458

  comments: 
    comments: '@ticket FTTH-4003: Neben dem üblichen "Track Page"-Aufruf werden hier weitere Informationen zum Bestellvorgang geloggt (Tabelle POB_TRACKING_EXTRA). Die Items werden zum Teil aus P100 ausgelesen, denn es lohnt sich nicht - für reine Logging-Zwecke - sie auf diesee Seite zu kopieren.'

- # ====== Process: Vorbestellung erfassen =====================
  id: 61954866697854117
  identification: 
    name: Vorbestellung erfassen
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      :P110_UUID := 
      PCK_GLASCONTAINER_ORDER.fn_vorbestellung_erfassen(
           piv_app_user                       => :APP_USER
          ,piv_vkz                            => :P110_VKZ
          ,piv_kundenstatus                   => :P110_KUNDENSTATUS  -- 'N' | 'B'
          ,piv_abw                            => :P110_ABW
          ,piv_abw_anrede                     => :P110_ABW_ANREDE
          ,piv_abw_anschlussinhaber           => :P110_ABW_ANSCHLUSSINHABER
          ,piv_abw_nachname                   => :P110_ABW_NACHNAME
          ,piv_abw_rufnummer                  => :P110_ABW_RUFNUMMER
          ,piv_abw_vorname                    => :P110_ABW_VORNAME
          ,piv_abw_vorwahl                    => :P110_ABW_VORWAHL
          ,piv_aktion                         => :P110_AKTION
          ,piv_bisheriger_anbieter            => :P110_ABW_BISHERIGER_ANBIETER
          ,piv_gee_eigentuemer_einverstanden  => :P110_GEE_EIGENTUEMER_EINVERSTANDEN
          ,piv_gee_firma                      => :P110_GEE_FIRMA
          ,piv_gee_kontaktdaten_bekannt       => :P110_GEE_KONTAKTDATEN_BEKANNT
          ,piv_gee_titel                      => :P110_GEE_TITEL
          ,piv_haus_lfd_nr                    => :P110_HAUS_LFD_NR
          ,piv_kosten_hausanschluss           => :P110_KOSTEN_HAUSANSCHLUSS
          ,piv_kunde_anrede                   => :P110_KUNDE_ANREDE
          ,piv_kunde_email                    => :P110_KUNDE_EMAIL
          ,piv_kunde_firmenname               => :P110_KUNDE_FIRMENNAME
