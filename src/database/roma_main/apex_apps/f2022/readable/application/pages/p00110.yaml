      :P110_EINRICHTUNGSSERVICE := :P100_EINRICHTUNGSSERVICE;
      :P110_GEE_ANREDE := :P100_GEE_ANREDE;
      :P110_GEE_EIGENTUEMER_EINVERSTANDEN := :P100_GEE_EIGENTUEMER_EINVERSTANDEN;
      :P110_GEE_EMAIL := :P100_GEE_EMAIL;
      :P110_GEE_FIRMA := :P100_GEE_FIRMA;
      :P110_GEE_HAUSNR := :P100_GEE_HAUSNR;
      :P110_GEE_HAUSNR_ZUSATZ := :P100_GEE_HAUSNR_ZUSATZ;
      :P110_GEE_INFORMATIONSPFLICHT := :P100_GEE_INFORMATIONSPFLICHT;
      :P110_GEE_KONTAKTDATEN_BEKANNT := :P100_GEE_KONTAKTDATEN_BEKANNT;
      :P110_GEE_LAND := :P100_GEE_LAND;
      :P110_GEE_NACHNAME := :P100_GEE_NACHNAME;
      :P110_GEE_ORT := :P100_GEE_ORT;
      :P110_GEE_PLZ := :P100_GEE_PLZ;
      :P110_GEE_RECHTSFORM := :P100_GEE_RECHTSFORM;
      :P110_GEE_RUFNUMMER := :P100_GEE_RUFNUMMER;
      :P110_GEE_STRASSE := :P100_GEE_STRASSE;
      :P110_GEE_TITEL := :P100_GEE_TITEL;
      :P110_GEE_VORNAME := :P100_GEE_VORNAME;
      :P110_GEE_VORWAHL := :P100_GEE_VORWAHL;
      
      :P110_HAUS_LFD_NR := :P100_HAUS_LFD_NR;
      :P110_KOSTEN_HAUSANSCHLUSS := :P100_KOSTEN_HAUSANSCHLUSS;
      
      
      
      :P110_KUNDENSTATUS := :P100_KUNDENSTATUS;
      
      :P110_VC_STATUS := :P100_VC_STATUS;
      :P110_VC_AUSBAU_PLAN_TERMIN := :P100_AUSBAU_PLAN_TERMIN; -- ////// konsolidieren @ticket FTTH-4221
      :P110_VC_BEZEICHNUNG := :P100_VC_BEZEICHNUNG;
      :P110_VC_KUNDENAUFTRAG_ERFORDERLICH := :P100_VC_KUNDENAUFTRAG_ERFORDERLICH;
      :P110_TECHNOLOGIE := :P100_TECHNOLOGIE;
      :P110_WHOLEBUY := :P100_WHOLEBUY;
      
      :P110_VKZ := :P100_VKZ;
      :P110_VORADRESSE_HAUSNR := :P100_VORADRESSE_HAUSNR;
      :P110_VORADRESSE_ORT := :P100_VORADRESSE_ORT;
      :P110_VORADRESSE_PLZ := :P100_VORADRESSE_PLZ;
      :P110_VORADRESSE_STRASSE := :P100_VORADRESSE_STRASSE;
      :P110_WOHNDAUER := :P100_WOHNDAUER;
      :P110_WOHNT_DORT := :P100_WOHNT_DORT;
      
      :P110_ONT_PROVIDER := NVL(:P100_ONT_PROVIDER, 'NONE');
      :P110_PRODUKT := :P100_PRODUKT;
      :P110_GEE_ROLLE := :P100_ROLLE;
      :P110_ROUTER_AUSWAHL := :P100_ROUTER_AUSWAHL;
      :P110_ROUTER_EIGENTUM := :P100_ROUTER_EIGENTUM;
      :P110_ABW_RUFNUMMERNMITNAHME := :P100_RUFNUMMERNMITNAHME;
      
      -- @ticket FTTH-4158: Zusatz-Buchstabe nun im Hausnummern-Feld konkatenieren:
      :P110_INSTALLATIONSADRESSE_HAUSNR := TRIM(:P100_STRAV_HAUSNR || ' ' || :P100_STRAV_HAUSNR_ZUSATZ); 
      -- Somit ist dieses Feld nun obsolet und kann nach ausreichender Bewährungszeit
      -- komplett entfernt werden:
      -- :P110_INSTALLATIONSADRESSE_HAUSNR_ZUSATZ := :P100_STRAV_HAUSNR_ZUSATZ;
      
      :P110_INSTALLATIONSADRESSE_ORT := :P100_STRAV_ORT;
      :P110_INSTALLATIONSADRESSE_PLZ := :P100_STRAV_PLZ;                                                   
      :P110_INSTALLATIONSADRESSE_STRASSE := :P100_STRAV_STRASSE; 
      :P110_INSTALLATIONSADRESSE_KOMPLETT := :P100_STRAV_ADRESSE_KOMPLETT;
      
      -- Neukunde oder Bestandskunde:
      CASE :P110_KUNDENSTATUS
          WHEN 'N' THEN -- Neukunde
              :P110_KUNDENNUMMER := NULL;
              :P110_KUNDE_ANREDE := :P100_NEUKUNDE_ANREDE;
              :P110_KUNDE_EMAIL := :P100_NEUKUNDE_EMAIL;
              :P110_KUNDE_FIRMENNAME := :P100_NEUKUNDE_FIRMENNAME;
              :P110_KUNDE_GEBURTSDATUM := :P100_NEUKUNDE_GEBURTSDATUM;
              :P110_KUNDE_IBAN := :P100_NEUKUNDE_IBAN;
              :P110_KUNDE_KONTOINHABER := :P100_NEUKUNDE_KONTOINHABER;
              :P110_KUNDE_NACHNAME := :P100_NEUKUNDE_NACHNAME;
              :P110_KUNDE_RUFNUMMER := :P100_NEUKUNDE_RUFNUMMER;
              :P110_KUNDE_SEPAMANDAT := :P100_NEUKUNDE_SEPAMANDAT;
              :P110_KUNDE_SOHO := :P100_NEUKUNDE_SOHO;
              :P110_KUNDE_TITEL := :P100_NEUKUNDE_TITEL;
              :P110_KUNDE_VORNAME := :P100_NEUKUNDE_VORNAME;
              :P110_KUNDE_VORWAHL := :P100_NEUKUNDE_VORWAHL;
      
          WHEN 'B' THEN -- Bestandskunde
              :P110_KUNDENNUMMER := :P100_SIEBEL_KUNDENNUMMER;
              --////@klären: wozu dient ggf. die P100_SIEBEL_GLOBAL_ID, die hier übernommen wird
              :P110_KUNDE_ANREDE := :P100_SIEBEL_ANREDE;
              :P110_KUNDE_EMAIL := :P100_SIEBEL_AP_EMAIL;
              :P110_KUNDE_RUFNUMMER := :P100_SIEBEL_AP_MOBIL_RUFNUMMER;
              :P110_KUNDE_VORWAHL := :P100_SIEBEL_AP_MOBIL_VORWAHL;
              :P110_KUNDE_FIRMENNAME := :P100_SIEBEL_FIRMENNAME;
              :P110_KUNDE_GEBURTSDATUM := :P100_SIEBEL_GEBURTSDATUM;
              :P110_KUNDE_IBAN := NULL; -- ////@klären: tatsächlich keine alternative IBAN für Bestandskunden möglich/nötig?
              :P110_KUNDE_KONTOINHABER := NULL; -- ////@klären: tatsächlich keine alternative IBAN für Bestandskunden möglich/nötig?
              :P110_KUNDENNUMMER := :P100_SIEBEL_KUNDENNUMMER;
              :P110_KUNDE_NACHNAME := :P100_SIEBEL_NACHNAME;
              :P110_KUNDE_TITEL := :P100_SIEBEL_TITEL;
              :P110_KUNDE_VORNAME := :P100_SIEBEL_VORNAME;
          ELSE 
              RAISE_APPLICATION_ERROR(-20999, 'Kundenstatus ' || :P100_KUNDENSTATUS || ' nicht zulässig');
      END CASE;
      
      CASE :P110_KUNDE_ANREDE
           WHEN 'MISS' THEN
               :P110_KUNDENREFERENZ_VON := 'von der Kundin';
               :P110_KUNDENREFERENZ_NOM := 'die Kundin';
               :P110_KUNDENREFERENZ_AKK := 'die Kundin';
           WHEN 'MISTER' THEN
               :P110_KUNDENREFERENZ_VON := 'vom Kunden';
               :P110_KUNDENREFERENZ_NOM := 'der Kunde';
               :P110_KUNDENREFERENZ_AKK := 'den Kunden';
           ELSE
              NULL;
      END CASE;

