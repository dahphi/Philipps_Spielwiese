    type: Item is NOT NULL
    item: P110_STEP

  comments: 
    comments: Der Prozess holt sich alle relevanten Einträge aus den Seiten 1 bis 6 des Wizards, damit hier eine entkoppelte Bestell-Übersicht angezeigt werden kann. Damit beim direkten Aufruf aus der Entwicklungsumgebung kein ORA-Fehler geworfen wird, fragt der Prozess die Befüllung des Items P100_KUNDENSTATUS der aufrufenden Wizard-Seite 100 ab. Zusätzlich werden hier bestehende Namensungleichheiten aufgelöst, die mit der Zeit zwischen den Seite 100 und 110 aufgelöst werden sollen (damit man die Zusammenhänge leichter nachvollziehen kann, Beispiel P100_RUFNUMMERMITNAHME heißt P110_ABW_RUFNUMMERNMITNAHME)

