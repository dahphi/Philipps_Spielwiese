- # ====== Dynamic Action: Auswahl "Bewertung" geändert ========
  id: 290683845050424795
  identification: 
    name: Auswahl "Bewertung" geändert

  execution: 
    sequence: 60
    event-scope: Static
    type: Immediate

  when: 
    event: Change
    selection-type: jQuery Selector
    jquery-selector: table.fuzzy select.score

  server-side-condition: 
    type: Item is NOT NULL
    item: P40_UUID

  comments: 
    comments: Nach Klick auf die dynamisch generierte Selectliste "Score / Bewertung". Im UNterschied zur DA namens 'Auswahl "Bewertung" Click' dient diese hier zudem dazu, die Direkteingabe abzuspeichern (wenn also kein Kommentar eingegeben werden soll).

  actions: 
  - # ====== Action: Execute JavaScript Code =====================
    id: 290683936468424796
    identification: 
      action: Execute JavaScript Code

    settings: 
      code: |
        const $liste = $(this.triggeringElement);
        const knr0 = apex.item('P40_KUNDENNUMMER').getValue();
        const knr1 = $liste.data('kundennummer');
        const beschreibung = $liste.data('beschreibung');
          var beschreibungTabelle = beschreibung.replace(/\[/g, "<");
              beschreibungTabelle = beschreibungTabelle.replace(/\]/g, ">");
        ///const score = $liste.data('score');
        const $auswahl = $('option:selected', $liste);
        const neueBewertung = $auswahl.attr('value'); // zB. 'K'
        const alteBewertung = $liste.data('bewertung');
        const text = $auswahl.text();
        const kommentar = '';
        apex.item('P40_KNR1').setValue(knr1);
        $('#knr0Info').html(apex.item('P40_KOPFDATEN').getValue());
        $('#knr1Info').html(beschreibungTabelle);
        // Hier nur reagieren, wenn NICHT auf Kommentar... geklickt wurde
        if(neueBewertung !== 'K') {
          if(!!neueBewertung) {
            submit_dubletten_bewertung(
                knr0
                ,knr1
                ,neueBewertung
                ,kommentar
            );
            $liste.data('bewertung', neueBewertung);
            $liste.data('kommentar', kommentar);
          }
        }

    affected-elements: 
      selection-type: Region
      region: Kommentar und Bewertung für mögliche Dublette # 279584679000878922

    execution: 
      sequence: 10
      event: Auswahl "Bewertung" geändert # 290683845050424795
      fire-when-event-result-is: True
      fire-on-initialization: false

    comments: 
      comments: Auslesen der vom Benutzer getätigten Auswahl in der Selectliste "Bewertung", Vorbelegen der Items im Dialog und Öffnen des Dialogs

