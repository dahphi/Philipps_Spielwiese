javascript: 
  function-and-global-variable-declaration: |
    function submit_dubletten_bewertung(knr0, knr1, bewertung, kommentar) {
       apex.server.process(
          'AP_SUBMIT_DUBLETTEN_BEWERTUNG', 
          {
           x01: knr0
    	  ,x02: knr1
    	  ,x03: bewertung
    	  ,x04: kommentar
    	  }
          ,
          {success:
             function (pData) {
               if(pData.length <= 1) {
                 /*
                 var region = apex.region('///');
                 region.refresh();
                 */
               } else { // Fehlerfall:
                    apex.message.clearErrors();
                    apex.message.showErrors([
                        {
                            type:       "error",
                            location:   "page",
                            message:    pData,
                            unsafe:     false
                        }
                    ]);               
               }
             }
          ,dataType: 'text'
          }
        );
    }

