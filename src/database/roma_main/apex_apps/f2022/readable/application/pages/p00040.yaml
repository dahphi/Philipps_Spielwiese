- # ====== Process: Fetch Items ================================
  id: 270078374261732436
  identification: 
    name: Fetch Items
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      SELECT CUSTOMERNUMBER
        INTO :P40_KUNDENNUMMER
        FROM FTTH_WS_SYNC_PREORDERS
       WHERE ID = :P40_UUID;
      
      :P40_KOPFDATEN := PCK_GLASCONTAINER_DUBLETTEN.FV_KARTEIKARTE(:P40_UUID);
      
      -- Dialog darf keinesfalls vorbelegt sein, wenn der Benutzer F5/Refresh drückt:
      :P40_BEWERTUNG := NULL;
      :P40_KOMMENTAR := NULL;
      :P40_FUZZY_ZEILE_ID := NULL;

  execution: 
    sequence: 10
    point: Before Header
    run-process: Once Per Page Visit (default)

  server-side-condition: 
    type: Item is NOT NULL
    item: P40_UUID

