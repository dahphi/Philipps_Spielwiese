    id: 279586513635878940
    identification: 
      action: Close Region

    affected-elements: 
      selection-type: Region
      region: Kommentar und Bewertung für mögliche Dublette # 279584679000878922

    execution: 
      sequence: 10
      event: Dialog "Bewertung" abbrechen # 279586383257878939
