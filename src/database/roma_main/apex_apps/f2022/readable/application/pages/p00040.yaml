dynamic-actions: 
- # ====== Dynamic Action: Auswahl Selectlist "Bewertung" Click 
  id: 279585801347878933
  identification: 
    name: Auswahl Selectlist "Bewertung" Click

  execution: 
    sequence: 20
    event-scope: Static
    type: Immediate

  when: 
    event: Click
    selection-type: jQuery Selector
    jquery-selector: table.fuzzy select.score

  server-side-condition: 
    type: Item is NOT NULL
    item: P40_UUID

  comments: 
    comments: Nach Klick auf die dynamisch generierte Selectliste "Score / Bewertung". Im UNterschied zur DA namens Auswahl "Bewertung" geändert dient diese hier dazu, den Kommentardialog erneut aufzurufen, auch wenn er bereits angezeigt wird (sich also der Wert der Option beim Klicken nicht verändert).

  actions: 
  - # ====== Action: Execute JavaScript Code =====================
    id: 279585941833878934
    identification: 
      action: Execute JavaScript Code

    settings: 
      code: |
        const $liste = $(this.triggeringElement);
        const knr0 = apex.item('P40_KUNDENNUMMER').getValue();
        const knr1 = $liste.data('kundennummer');
        const beschreibung = $liste.data('beschreibung');
          var beschreibungTabelle = beschreibung.replace(/\[/g, "<");
              beschreibungTabelle = beschreibungTabelle.replace(/\]/g, ">");
        /// const score = $liste.data('score');
        const $auswahl = $('option:selected', $liste);
        const neueBewertung = $auswahl.attr('value'); // zB. 'K'
        const alteBewertung = $liste.data('bewertung');
        const text = $auswahl.text();
          var kommentar = '';
        apex.item('P40_KNR1').setValue(knr1);
        $('#knr0Info').html(apex.item('P40_KOPFDATEN').getValue());
        $('#knr1Info').html(beschreibungTabelle);
        // Hier nur reagieren, wenn auf Kommentar... geklickt wurde
        if(neueBewertung === 'K') {
          apex.item('P40_FUZZY_ZEILE_ID').setValue($liste.attr('id')); 
          apex.item('P40_BEWERTUNG').setValue(alteBewertung);
          kommentar = $liste.data('kommentar');
          apex.item('P40_KOMMENTAR').setValue(kommentar);    
          $(this.affectedElements).dialog('open')
        }

    affected-elements: 
      selection-type: Region
      region: Kommentar und Bewertung für mögliche Dublette # 279584679000878922

    execution: 
      sequence: 10
      event: Auswahl Selectlist "Bewertung" Click # 279585801347878933
      fire-when-event-result-is: True
      fire-on-initialization: false

    comments: 
      comments: Auslesen der vom Benutzer getätigten Auswahl in der Selectliste "Bewertung", Vorbelegen der Items im Dialog und Öffnen des Dialogs

- # ====== Dynamic Action: Dialog "Bewertung" abbrechen ========
  id: 279586383257878939
  identification: 
    name: Dialog "Bewertung" abbrechen

  execution: 
    sequence: 40
    event-scope: Static
    type: Immediate

  when: 
    event: Click
