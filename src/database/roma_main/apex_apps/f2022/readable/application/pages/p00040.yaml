      fire-on-initialization: false

    comments: 
      comments: Modales Fenster schließen

  - # ====== Action: Execute JavaScript Code =====================
    id: 290685711398424814
    identification: 
      action: Execute JavaScript Code

    settings: 
      code: |
        const zeile_ID = apex.item('P40_FUZZY_ZEILE_ID').getValue();
        if(!zeile_ID) return;
        var $liste = $('#'+zeile_ID, '#siebelRegion');
        if(!$liste) return;
        const bewertung = $liste.data('bewertung');
        $liste.val(bewertung); 
        

    execution: 
      sequence: 20
      event: Dialog "Bewertung" abbrechen # 279586383257878939
      fire-when-event-result-is: True
      fire-on-initialization: false

    comments: 
      comments: Den ursprünglichen Wert der Bewertung (vor dem Öffnen des Kommentar-Dialogs) wieder in die Selectliste schreiben, damit diese nicht "K" für Kommentar anzeigt, sondern die tatsächliche Bewertung

