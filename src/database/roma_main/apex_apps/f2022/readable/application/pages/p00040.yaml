- # ====== Dynamic Action: Auftrag in neuem Fenster öffnen =====
  id: 296768063020326808
  identification: 
    name: Auftrag in neuem Fenster öffnen

  execution: 
    sequence: 80
    event-scope: Dynamic
    static-container-(jquery-selector): '#dublettenReport'
    type: Immediate

  when: 
    event: Click
    selection-type: jQuery Selector
    jquery-selector: 'tr.has-link td:not([headers=bewertung]):not([headers=kundennummer])'

  comments: 
    comments: Klick auf jede Zelle einer Tabellenzeile, welche die Klasse has-link besitzt (außer wenn es sich um die Zelle mit der Bewertungs-Auswahlliste handelt, denn dann könnte man diese nicht mehr bedienen), öffnet den Auftrag in einem neuen Fenster

  actions: 
  - # ====== Action: Execute JavaScript Code =====================
    id: 296768183488326809
    identification: 
      action: Execute JavaScript Code

    settings: 
      code: |
        const $tr = $(this.triggeringElement).closest('tr');
        const url = $tr.data('url');
        if(!!url) window.open(url, '_blank');

    execution: 
      sequence: 10
      event: Auftrag in neuem Fenster öffnen # 296768063020326808
      fire-when-event-result-is: True
      fire-on-initialization: false

    comments: 
      comments: Öffnet den im Attribut data-url der Tabellenzeile hinterlegten Link in einer neuen Seite

