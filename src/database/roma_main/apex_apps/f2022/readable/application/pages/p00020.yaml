    item: P20_CAN_EDIT_PRODUCT

  security: 
    authorization-scheme: '* App - User' # 238128121341675592

  comments: 
    comments: '@ticket FTTH-2411: Sobald irgendwelche Änderungen vorgenommen werden, wechselt die Anzeige der Tarifgeneration'

  actions: 
  - # ====== Action: Neues Produkt in Selectliste vorbelegen =====
    id: 241094498854968140
    identification: 
      name: Neues Produkt in Selectliste vorbelegen
      action: Execute JavaScript Code

    settings: 
      code: |
        if($('#P20_TARIF_DISPLAY') != '&G_NEUE_AKTION_DISPLAY.') {
          apex.item('P20_PRODUKT').setValue(apex.item('P20_FOLGEPRODUKT_TEMPLATE_ID').getValue());
        }

    execution: 
      sequence: 30
      event: 'Bei Produktänderungen: Folgeprodukt vorbelegen' # 241094339371968138
      fire-when-event-result-is: True
      fire-on-initialization: false

    comments: 
      comments: '@ticket FTTH-2411: bei einer Änderung wird das Produkt auf das aktuelle Äquivalent umgestellt, jedoch nur dann, wenn auch der Tarifwechsel erstmals angekündigt wird - sonst würde man immer wieder im selben neuen Produkt landen'

  - # ====== Action: Tarifwechsel markieren ======================
    id: 246324110315951391
    identification: 
