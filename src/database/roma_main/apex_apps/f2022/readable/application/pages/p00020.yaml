    sequence: 130
    event-scope: Static
    type: Immediate

  when: 
    event: Change
    selection-type: Item(s)
    item(s): 
    - P20_ROUTER_AUSWAHL
    - P20_ROUTER_EIGENTUM
    - P20_INSTALLATIONSSERVICE
    - P20_SERVICE_PLUS_EMAIL
    - P20_ONT_PROVIDER

  client-side-condition: 
