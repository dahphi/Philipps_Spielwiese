    comments: 
      comments: Der ABBRECHEN-Button muss bei Erfolg ausgeblendet werden, weil sonst der Eindruck entsteht, dass die neue Auftragsnummer noch zurückgenommen werden könnte. Im Fehlerfall bleibt er sichtbar. Hier darf nicht die "einfache" Client-Side Condition "Item is not null" verwendet werden, da diese bereits beim Starten der Dynamic Action ausgewertet wird

  - # ====== Action: Button NEU ausblenden =======================
    id: 63858715426739151
    identification: 
      name: Button NEU ausblenden
      action: Hide

    affected-elements: 
      selection-type: Button
      button: BTN_EXTERNE_AUFTRAGSNUMMER_DIALOG # 56538945251052155

    execution: 
      sequence: 50
      event: Dialog "Externe Auftragsnummer" OK # 63854941811739113
      fire-when-event-result-is: True
      fire-on-initialization: false

    comments: 
      comments: Der neu...-Button muss bei Erfolg ausgeblendet werden, weil es nicht sinnvoll ist, aus der frisch generierten neuen Autragsnummer sofort wieder eine weitere zu generieren.

  - # ====== Action: Neue Auftragsnummer generieren (JS) =========
    id: 68202393536631832
    identification: 
      name: Neue Auftragsnummer generieren (JS)
      action: Execute JavaScript Code

    settings: 
      code: |
        apex.server.process(
            'AP_NEUE_EXTERNE_AUFTRAGSNUMMER', 
            {x01: apex.item('P20_UUID').getValue()
            ,x02: apex.item('P20_EXT_AUFTRAGSNUMMER').getValue()
            }
            ,
            {success:
                function (pData) {
                if(pData.startsWith("ORA-")) {
                    // Fehlerfall:
                    apex.message.clearErrors();
                    apex.message.showErrors([
                        {
                            type:       "error",
                            location:   "page",
                            message:    pData,
                            unsafe:     false
                        }
                    ]);
                    $('#BTN_EXTERNE_AUFTRAGSNUMMER_CLOSE').removeClass('u-success').find('span.t-Icon').remove();
                } else {
                    // Erfolgsfall:
                    apex.item('P20_EXT_AUFTRAGSNUMMER_TEMP_WS').setValue(pData);
                    apex.item('P20_EXT_AUFTRAGSNUMMER').setValue(pData);
                    apex.message.showPageSuccess('Externe Auftragsnummer ' + 
                    apex.item('P20_EXT_AUFTRAGSNUMMER_TEMP_WS').getValue() +
                ' wurde generiert.');
                }
                }
            ,dataType: 'text'
            }
        );
        

    execution: 
      sequence: 20
      event: Dialog "Externe Auftragsnummer" OK # 63854941811739113
      fire-when-event-result-is: True
      fire-on-initialization: false

    security: 
      authorization-scheme: '* App - Superuser' # 244597399936966998

