    alignment: Left

  settings: 
    page-action-on-selection: None

  multiple-values: 
    type: No

  layout: 
    sequence: 170
    region: Produkt / Tarifdetails # 236815992619351134
    slot: BODY
    alignment: Left
    start-new-layout: false
    start-new-row: true
    column: Automatic
    new-column: true
    column-span: 11
    label-column-span: 4

  appearance: 
    template: Optional
    template-options: 
    - '#DEFAULT#'
    - t-Form-fieldContainer--stretchInputs
    height: 1

  validation: 
    value-required: false

  list-of-values: 
    type: SQL Query
    sql-query: |
      SELECT d, r FROM TABLE(PCK_GLASCONTAINER.LOV_PRODUKTE(
          piv_template_id     => :P20_PRODUKT,
          pin_min_bandbreite  => :P20_MIN_BANDBREITE,
          pin_max_bandbreite  => :P20_MAX_BANDBREITE
      ))
    display-extra-values: true
    display-null-value: true
    null-display-value: '- bitte auswählen -'

  advanced: 
    css-classes: 
    - customCSS
    - product
    - '&P20_CSS_NOEDIT_PRODUCT.'
    warn-on-unsaved-changes: Page Default

  source: 
    type: Null
    used: Only when current value in session state is null

  session-state: 
    storage: Per Session (Persistent)

  quick-picks: 
    show-quick-picks: false

  security: 
    session-state-protection: Unrestricted
    store-value-encrypted-in-session-state: true
    restricted-characters: All characters can be saved.

  comments: 
    comments: |
      /// Anpassungsbedarf wegen @ticket FTTH-2411
      2022-06-27: Nach Rücksprache mit Carsten Schwertfeger werden die neuen Produktnamen angezeigt, aber nicht in denselbem String auch die dazugehörige Promotion. Diese soll darüber stehen. Da der Webservice beides in einem Feld vereint ("templateId"), muss allerdings die Steuerung von Änderungen weiterhin über diesen kombinierten Parameter erfolgen.
      2022-08-09: Änderungen, die @HBOEDER an der Definition der Selectliste machen musste, ins PCK_GLASCONTAINER verlagert (weil im Produkt fortan Bindestriche anstatt Unterstriche benutzt werden).
      2023-08-17: Item-Name und -Referenzen der Klarheit halber geändert von P20_PROMOTION zu P20_PRODUKT
      -- 2023-08-22 @ticket FTTH-2411, war:
      SELECT d, r FROM TABLE(PCK_GLASCONTAINER.LOV(
          piv_name       => 'PRODUKT', 
          piv_parameter1 => :P20_MIN_BANDBREITE,
          piv_parameter2 => :P20_MAX_BANDBREITE,
          piv_parameter3 => :P20_PRODUKT
      ))

