- # ====== Region: OFFLINE-Modus ===============================
  id: 225272368173440325
  identification: 
    name: OFFLINE-Modus
    type: PL/SQL Dynamic Content [Legacy]

  source: 
    pl/sql-code: |
      DECLARE
        v_last_sync DATE;
        v_link_einstellungen VARCHAR2(1000);
      BEGIN
        :P20_WS_ERRORCODE := PCK_GLASCONTAINER.C_OFFLINEMODUS; -- der Benutzer kann hierdurch nichts abspeichern
        :P20_WS_ERRORMESSAGE := PCK_GLASCONTAINER.C_WS_MODUS_OFFLINE;
        v_last_sync := PCK_GLASCONTAINER.fd_ws_last_sync_date(piv_uuid => :P20_UUID);
        v_link_einstellungen :=
              APEX_PAGE.GET_URL(
                  p_application => :APP_ID
                 ,p_page        => 10100
                 ,p_session     => :APP_SESSION
                 ,p_items       => NULL
                 ,p_values      => NULL
                 );
        htp.p(
      'Sie haben sich für den Offline-Datenabruf entschieden (<a href="' || v_link_einstellungen 
      || '">Einstellungen &gt; Abruf von Auftragsdaten</a>). Sie sehen die Daten aus der letzten Synchronisierung '
      || CASE WHEN trunc(v_last_sync) = TRUNC(SYSDATE)
         THEN
           'von heute, ' || TO_CHAR(v_last_sync, 'HH24:MI') || ' Uhr'
         WHEN v_last_sync IS NULL THEN ''
         ELSE
           'vom ' || TO_CHAR(v_last_sync, 'DD.MM.YYYY') || ' um '
                  || TO_CHAR(v_last_sync, 'HH24:MI') || ' Uhr'
         END
      || ' &mdash; die Bearbeitung ist deaktiviert.</strong>'
      );
      END;

  layout: 
    sequence: 50
    parent-region: No Parent
    slot: BODY
    start-new-layout: false
    start-new-row: true
    column: Automatic
    new-column: true
    column-span: Automatic

  appearance: 
    template: Hero
    template-options: 
    - '#DEFAULT#'
    - margin-top-none
    - margin-bottom-none
    - margin-left-none
    - margin-right-none
    css-classes: 
    - problem
    icon: fa-cloud-ban
    render-components: Above Content

  accessibility: 
    use-landmark: true
    landmark-type: Template Default

  advanced: 
    region-display-selector: false
    exclude-title-from-translation: false

  server-side-condition: 
    type: Expression
    language: PL/SQL
    pl/sql-expression: ':P20_UUID IS NOT NULL AND :P10100_WS_MODUS = PCK_GLASCONTAINER.C_WS_MODUS_OFFLINE'

  server-cache: 
    caching: Disabled

  customization: 
    customizable: Not Customizable By End Users

  comments: 
    comments: Hinweistext an den Benutzer, dass sich die Seite im OFFLINE-Modus befindet und er dadurch nichts am Auftrag ändern kann.

