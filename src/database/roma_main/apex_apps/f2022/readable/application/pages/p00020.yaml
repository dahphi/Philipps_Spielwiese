  - # ====== Action: Button ABBRECHEN ausblenden =================
    id: 63858632307739150
    identification: 
      name: Button ABBRECHEN ausblenden
      action: Hide

    affected-elements: 
      selection-type: Button
      button: BTN_EXTERNE_AUFTRAGSNUMMER_CANCEL # 63854647128739110

    execution: 
      sequence: 70
      event: Dialog "Externe Auftragsnummer" OK # 63854941811739113
      fire-when-event-result-is: True
