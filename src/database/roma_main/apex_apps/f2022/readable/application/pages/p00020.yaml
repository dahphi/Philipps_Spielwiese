- # ====== Region: Problem beim Abrufen der Daten ==============
  id: 228641804980370297
  identification: 
    name: Problem beim Abrufen der Daten
    type: PL/SQL Dynamic Content [Legacy]

  source: 
    pl/sql-code: |
      DECLARE
        v_last_sync DATE;
      BEGIN
        v_last_sync := PCK_GLASCONTAINER.fd_ws_last_sync_date(piv_uuid => :P20_UUID);
        htp.p(
        CASE :P20_WS_ERRORCODE WHEN '-20404' THEN 'Der Auftrag kann momentan nicht abgerufen werden. Sie sehen die zuletzt synchronisierten Daten'
        ELSE 'Der Webservice, der die aktuellen Auftragsdaten liefert, ist nicht erreichbar (&P20_WS_ERRORMESSAGE.).'
              || '<br/><strong>Stattdessen sehen Sie hier die Daten aus der letzten Synchronisierung ' 
              || CASE WHEN trunc(v_last_sync) = TRUNC(SYSDATE)
                 THEN
                   'von heute, ' || TO_CHAR(v_last_sync, 'HH24:MI') || ' Uhr'
                 WHEN v_last_sync IS NULL THEN ''
                 ELSE
                   'vom ' || TO_CHAR(v_last_sync, 'DD.MM.YYYY') || ' um '
                          || TO_CHAR(v_last_sync, 'HH24:MI') || ' Uhr'
                 END
        END
      
      || ' &mdash; die Bearbeitung ist deaktiviert.</strong>'
      );
      END;

  layout: 
    sequence: 40
    parent-region: No Parent
    slot: BODY
    start-new-layout: false
    start-new-row: true
    column: Automatic
    new-column: true
    column-span: Automatic

  appearance: 
    template: Hero
    template-options: 
    - '#DEFAULT#'
    - margin-top-none
    - margin-bottom-none
    - margin-left-none
    - margin-right-none
    css-classes: 
    - problem
    icon: fa-warning
    render-components: Above Content

  accessibility: 
    use-landmark: true
    landmark-type: Template Default

  advanced: 
    region-display-selector: false
    exclude-title-from-translation: false

  server-side-condition: 
    type: Expression
    language: PL/SQL
    pl/sql-expression: |
      :P20_UUID IS NOT NULL AND 
      :P20_WS_ERRORCODE <> PCK_GLASCONTAINER.C_ORDER_IS_LOCKED AND
      :P10100_WS_MODUS <> PCK_GLASCONTAINER.C_WS_MODUS_OFFLINE

  server-cache: 
    caching: Disabled

  customization: 
    customizable: Not Customizable By End Users

  comments: 
    comments: Region wird angezeigt, wenn es ein technisches Problem mit dem Webservice gibt, jedoch nicht bei SQLCODE C_ORDER_IS_LOCKED (-20003).

