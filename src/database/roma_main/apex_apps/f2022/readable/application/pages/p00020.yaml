    name: Hinweis auf Problem bei der Ermittlung der Siebel-Auftragsdaten
    type: Static Content

  source: 
    html-code: '<div style="margin: 1em 0; padding: 1em; background-color: #FFA; font-weight: bold"><p>Es konnte kein Siebel-Auftrag mit der UUID <tt>&P20_UUID.</tt> gefunden werden.</p><p>Bitte prüfen, ob die Bearbeitung in Siebel korrekt erfolgt ist.</p></div>'

  layout: 
    sequence: 10
    parent-region: Auftrag abschließen # 335126128114263710
    slot: BODY
    start-new-layout: false
    start-new-row: true
    column: Automatic
    new-column: true
    column-span: Automatic

  appearance: 
    template: Blank with Attributes
    template-options: 
    - '#DEFAULT#'
    render-components: Above Content

  accessibility: 
    use-landmark: true
    landmark-type: Template Default

  advanced: 
    region-display-selector: false
    exclude-title-from-translation: false

  server-side-condition: 
    type: Expression
    language: SQL
    sql-expression: |
      :P20_SIEBEL_READY = 'true' AND
      :P20_SIEBEL_ORDER_NUMBER IS NULL AND
      :P20_SIEBEL_ORDER_ROWID IS NULL

  customization: 
    customizable: Not Customizable By End Users

  configuration: 
    build-option: Commented Out # 234883986660092834

  comments: 
    comments: |
      Wurde durch @ticket FTTH-4198 ersetzt (Region unter dieser).
      
      Dieser textliche Hinweis wird angezeigt, wenn der Auftrag eigentlich siebelReady ist, aber in Siebel keine entsprechenden Auftragsdaten gefunden wurden. siehe @ticket FTTH-2521

  attributes: 
    settings: 
      output-as: HTML
      expand-shortcuts: false

