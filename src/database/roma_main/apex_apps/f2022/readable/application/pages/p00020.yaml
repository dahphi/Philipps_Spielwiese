- # ====== Dynamic Action: LANDLORD: Autosuggest ===============
  id: 200877014475994727
  identification: 
    name: 'LANDLORD: Autosuggest'

  execution: 
    sequence: 350
    event-scope: Static

  when: 
    event: Page Load

  server-side-condition: 
    type: Item is NULL
    item: P20_CAN_EDIT_LANDLORD

  comments: 
    comments: Initialisiert die "Adress-Ergänzung per Webservice"

  actions: 
  - # ====== Action: Felder für Autocomplete definieren ==========
    id: 200877386328994728
    identification: 
      name: Felder für Autocomplete definieren
      action: Execute JavaScript Code

    settings: 
      code: |
        let itemPlz = document.getElementById("P20_VERMIETER_PLZ");
        let itemOrt = document.getElementById("P20_VERMIETER_ORT");
        let itemStr = document.getElementById("P20_VERMIETER_STRASSE");
        
        if(!!!itemPlz || !!!itemOrt || !!!itemStr) return;
        
        autocomplete('plz', itemPlz, itemOrt, itemStr);
        autocomplete('ort', itemOrt, itemPlz);
        autocomplete('str', itemStr, itemPlz);

    execution: 
      sequence: 10
      event: 'LANDLORD: Autosuggest' # 200877014475994727
      fire-when-event-result-is: True
      fire-on-initialization: false

    comments: 
      comments: /// Kandidat für ein JavaScript-Plugin, oder zumindest das Script als FUNCTION in den Shared Components > Shortcuts speichern

