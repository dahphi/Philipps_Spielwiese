- # ====== Process: Auftragsbezogene Kontaktdaten zuweisen =====
  id: 56534186119052107
  identification: 
    name: Auftragsbezogene Kontaktdaten zuweisen
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      IF :P20_IS_NEW_CUSTOMER = 'false' THEN -- Normalfall Bestandskunde
          IF :P20_UPDATE_CUSTOMER_IN_SIEBEL = 'false' THEN -- Kontaktdaten sind nur auftragsbezogen
            :P20_LAENDERVORWAHL_AUFTRAG := :P20_CUSTOMER_UPD_PHONE_COUNTRYCODE;
            :P20_VORWAHL_AUFTRAG := :P20_CUSTOMER_UPD_PHONE_AREACODE;
            :P20_TELEFON_AUFTRAG := :P20_CUSTOMER_UPD_PHONE_NUMBER;
          END IF;
      
          -- Telefonnummern konkatenieren, @ticket FTTH-3711:
          :P20_RUFNUMMER_AUFTRAG_DISPLAY := PCK_RUFNUMMER.FV_E164(
                                           :P20_LAENDERVORWAHL_AUFTRAG
                                        || :P20_VORWAHL_AUFTRAG
                                        || :P20_TELEFON_AUFTRAG);
      END IF;

  execution: 
    sequence: 110
    point: Before Header
    run-process: Once Per Page Visit (default)

  comments: 
    comments: |
      @ticket FTTH-3711
      Herleitung:
      
      Bei einem Neukunden (Attribut "isNewCustomer" = true) werden immer nur die Siebel-Kontaktdaten angezeigt.
      Bei einem Bestandskunden (Attribut "isNewCustomer" = false) werden nur die Siebel-Kontaktdaten angezeigt, wenn UPDATE_CUSTOMER_IN_SIEBEL = true
      Bei einem Bestandskunden (Attribut "isNewCustomer" = false) werden die Siebel-Kontaktdaten UND Kontaktdaten aus dem POB-Auftrag angezeigt, wenn UPDATE_CUSTOMER_IN_SIEBEL = false
      Sind in der V_SIEBEL_KUNDENDATEN für einen Neu- oder Bestandskunden keine Siebel-Kontaktdaten vorhanden sind, werden zusätzlich die Kontaktdaten aus dem POB-Auftrag angezeigt
      Zusammengefasst:
      
      Die Siebel-Kontaktdaten werden immer angezeigt
      Bei einem Bestandskunden (Attribut "isNewCustomer" = false) werden zusätzlich die Kontaktdaten aus dem POB-Auftrag angezeigt, wenn UPDATE_CUSTOMER_IN_SIEBEL = false
      Sind in der V_SIEBEL_KUNDENDATEN für einen Neu- oder Bestandskunden keine Siebel-Kontaktdaten vorhanden sind, werden zusätzlich die Kontaktdaten aus dem POB-Auftrag angezeigt

- # ====== Process: Siebel-Kontaktdaten laden ==================
  id: 56534279326052108
  identification: 
    name: Siebel-Kontaktdaten laden
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      DECLARE
        v_email_pob VARCHAR2(300);
      BEGIN
          v_email_pob := :P20_EMAIL; -- retten und ggf. unten wiederherstellen
          PCK_GLASCONTAINER.P_GET_SIEBEL_KONTAKTDATEN(
              -- in der Entwicklung & im Test haben wir hier oft nichts, 
              -- und dann sieht das wie ein Programmierfehler aus:
               piv_kundennummer            => :P20_KUNDENNUMMER
             , pov_ap_email                => :P20_EMAIL
             , pov_ap_mobil_laendervorwahl => :P20_LAENDERVORWAHL_SIEBEL
             , pov_ap_mobil_onkz           => :P20_VORWAHL_SIEBEL
             , pov_ap_mobil_rufnummer      => :P20_TELEFON_SIEBEL
          );
          -- falls also in Siebel keine Kontaktdaten gefunden wurden (was in PROD unwahrscheinlich ist),
          -- dann hole ersatzweise die POB-Kontaktdaten heran (@Flo)
          IF :P20_LAENDERVORWAHL_SIEBEL IS NULL AND
             :P20_VORWAHL_SIEBEL IS NULL AND   
             :P20_TELEFON_SIEBEL IS NULL THEN   -- //// hierfür ein Flag einführen?
             -- für Neukunden aus customer
             IF :P20_KUNDENSTATUS = 'N' THEN
                 :P20_LAENDERVORWAHL_SIEBEL := :P20_CUSTOMER_PHONE_COUNTRYCODE;
                 :P20_VORWAHL_SIEBEL        := :P20_CUSTOMER_PHONE_AREACODE;
                 :P20_TELEFON_SIEBEL        := :P20_CUSTOMER_PHONE_NUMBER;
             ELSE  
                 :P20_LAENDERVORWAHL_SIEBEL := :P20_CUSTOMER_UPD_PHONE_COUNTRYCODE;
                 :P20_VORWAHL_SIEBEL        := :P20_CUSTOMER_UPD_PHONE_AREACODE;
                 :P20_TELEFON_SIEBEL        := :P20_CUSTOMER_UPD_PHONE_NUMBER;
             END IF;
          END IF;
      
          IF :P20_EMAIL IS NULL THEN  
            :P20_EMAIL := COALESCE(v_email_pob, :P20_CUSTOMER_UPD_EMAIL); -- damit in der Entwicklung wenigstens irgendwas zu sehen ist
          END IF;
      
      END;
      -- Telefonnummern konkatenieren, @ticket FTTH-3711:
      :P20_RUFNUMMER_SIEBEL_DISPLAY := PCK_RUFNUMMER.FV_E164(
                                       :P20_LAENDERVORWAHL_SIEBEL
                                    || :P20_VORWAHL_SIEBEL
                                    || :P20_TELEFON_SIEBEL);

  execution: 
    sequence: 90
    point: Before Header
    run-process: Once Per Page Visit (default)

  comments: 
    comments: '@ticket FTTH-3711: In jedem Fall die Kontaktdaten aus SIEBEL anzeigen'

- # ====== Process: Wholebuy-Zusatzinformationen laden =========
  id: 75146351737343115
  identification: 
    name: Wholebuy-Zusatzinformationen laden
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      SELECT max(inf_port_ticket_id)
        INTO :P20_INFPORT_TICKET_ID
        FROM ROMAINTINF.V_WHOLEBUY_EVENT
       WHERE order_id = :P20_UUID
         AND connectivity_id = :P20_EXT_AUFTRAGSNUMMER -- = "Connectivity ID"
      ;
      -- @ticket FTTH-3880:
      :P20_STORNOKOSTEN := PCK_GLASCONTAINER.fn_stornokosten(
              piv_uuid              => :P20_UUID
            , piv_wholebuy_partner  => :P20_WHOLEBUY_PARTNER
      );
      :P20_STORNOKOSTEN_LABEL := 
          CASE :P20_STORNOKOSTEN
          WHEN '1' THEN 'Storno kostenpflichtig: ja'
          ELSE 'Storno kostenpflichtig: nein'
          END;

  execution: 
    sequence: 130
    point: Before Header
    run-process: Once Per Page Visit (default)

  server-side-condition: 
    type: Item is NOT NULL
    item: P20_WHOLEBUY_PARTNER

  comments: 
    comments: '@ticket FTTH-4446, @ticket FTTH-3934'

