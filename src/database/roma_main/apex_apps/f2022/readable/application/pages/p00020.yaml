      2023-09-07: Die Auftragsliste spricht nun wieder direkt das Item P20_UUID an.

- # ====== Process: Abgeleitete Felder berechnen ===============
  id: 231474925833046710
  identification: 
    name: Abgeleitete Felder berechnen
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      -- GEE gilt als erteilt, wenn:
      :P20_ERTEILUNG_GEE := CASE WHEN :P20_GEE_ROLLE = 'OWNER' 
                            AND :P20_ANZAHL_WE IN('ONE', 'MORE_THAN_ONE') 
                            AND :P20_WHOLEBUY_PARTNER IS NULL -- @ticket FTTH-XXX
                            THEN 'true' ELSE 'false' END;
      
      -- 2022-09-13: @///klären: Neues Feld IS_NEW_CUSTOMER widerspricht teilweise der bisherigen Lösung, da oft leer
      -- :P20_KUNDENSTATUS := CASE WHEN :P20_IS_NEW_CUSTOMER = 'true' THEN 'N' ELSE 'B' END;
      :P20_KUNDENSTATUS := CASE WHEN :P20_CUSTOMER_UPD_EMAIL IS NULL THEN 'N' ELSE 'B' END;
      :P20_KUNDENSTATUS_DISPLAY := CASE WHEN :P20_KUNDENSTATUS = 'N' THEN 'Neukunde' else 'Bestandskunde' END;
      IF :P20_KUNDENSTATUS = 'B' 
      -- @defect FTTH-4227:
      AND NVL(:P20_UPDATE_CUSTOMER_IN_SIEBEL, '-') <> 'false'
      THEN
        :P20_EMAIL := :P20_CUSTOMER_UPD_EMAIL;
      END IF;
      -- Gründe, warum dieser Auftrag NICHT bearbeitet werden darf:
      IF :P20_WS_ERRORCODE IS NOT NULL THEN
        :P20_CAN_EDIT := :P20_WS_ERRORCODE;
      ELSE
        :P20_CAN_EDIT := CASE :P20_STATUS
            WHEN PCK_GLASCONTAINER.STATUS_CANCELLED        THEN 'Auftrag ist gesperrt' 
            WHEN PCK_GLASCONTAINER.STATUS_SIEBEL_PROCESSED THEN 'Auftrag ist abgeschlossen'
        END;
      END IF;
      -- @ticket FTTH-3837:
      :P20_CAN_EDIT_PRODUCT := 
        CASE WHEN :P20_CAN_EDIT IS NOT NULL THEN :P20_CAN_EDIT
             WHEN :P20_STATUS = PCK_GLASCONTAINER.STATUS_CLEARING_LANDLORD_DATA THEN 'Eigentümerdaten fehlen'
        END;
      :P20_CAN_EDIT_LANDLORD := 
        CASE WHEN :P20_CAN_EDIT IS NOT NULL THEN :P20_CAN_EDIT
             WHEN :P20_STATUS <> PCK_GLASCONTAINER.STATUS_CLEARING_LANDLORD_DATA THEN 'Auftragsstatus nicht CLEARING_LANDLORD_DATA    '
        END;  
      
        :P20_FILTER_AUFTRAGSHISTORIE := 'R'; -- @ticket FTTH-4404: nur Relevante

  execution: 
    sequence: 60
    point: Before Header
    run-process: Once Per Page Visit (default)

  server-side-condition: 
    type: Item is NOT NULL
    item: P20_UUID

- # ====== Process: Vermarktungscluster laden ==================
  id: 233136010346500593
  identification: 
    name: Vermarktungscluster laden
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      DECLARE
        vc vermarktungscluster%rowtype;
      BEGIN
        -- Gibt es Daten zum VMC?
        BEGIN
          vc := PCK_VERMARKTUNGSCLUSTER.fr_vermarktungscluster(pin_haus_lfd_nr => :P20_HAUS_LFD_NR);
        EXCEPTION
          WHEN NO_DATA_FOUND THEN NULL;
        END;
        -- Gefundene Werte zuweisen:
        :P20_MIN_BANDBREITE := vc.mindestbandbreite;
        :P20_MAX_BANDBREITE := vc.zielbandbreite_geplant;
        :P20_VC_STATUS := vc.status;
        :P20_VC_WHOLEBUY := vc.wholebuy;
        :P20_VC_DNSTTP_LFD_NR := vc.dnsttp_lfd_nr;
        
        -- 2024-09-10: Die Technologie aus den Auftragsdaten darf nur dann überschrieben werden, 
        -- wenn der Wert im POB fehlt (das sollte ausschließlich für stornierte Aufträge zutreffen,
        -- da alle anderen mit Release 83 migriert wurden):
        IF :P20_STATUS = PCK_GLASCONTAINER.STATUS_CANCELLED 
        AND :P20_TECHNOLOGIE IS NULL THEN
          :P20_TECHNOLOGIE := PCK_GLASCONTAINER.fv_technologie(:P20_VC_DNSTTP_LFD_NR);
          :P20_TECHNOLOGIE_DISPLAY := PCK_GLASCONTAINER.fv_technologie_display(:P20_TECHNOLOGIE);
        END IF;
        
      END; 
      
      :P20_BANDBREITENINFO := PCK_GLASCONTAINER.fv_get_bandbreiteninfo(:P20_MIN_BANDBREITE, :P20_MAX_BANDBREITE);

  execution: 
    sequence: 70
    point: Before Header
    run-process: Once Per Page Visit (default)

  server-side-condition: 
    type: Item is NOT NULL
    item: P20_HAUS_LFD_NR

  comments: 
    comments: Lädt Daten zum Vermarktungscluster (Bandbreiten, Technologie), dem die P20_HAUS_LFD_NR zugeordnet ist.

