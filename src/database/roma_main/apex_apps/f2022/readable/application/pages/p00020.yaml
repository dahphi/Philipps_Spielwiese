          IF :P20_SIEBEL_READY = 'false' THEN
            :P20_TECHNOLOGIE_DISPLAY := :P20_TECHNOLOGIE_DISPLAY || ' (vsl.)'; -- "voraussichtlich"
          END IF;
          
          -- @ticket FTTH-3837:
          :P20_CSS_NOEDIT_LANDLORD :=
            CASE WHEN :P20_STATUS <> PCK_GLASCONTAINER.STATUS_CLEARING_LANDLORD_DATA
                 THEN 'noEdit' END;
      
          :P20_CSS_NOEDIT_PRODUCT :=
            CASE WHEN :P20_STATUS = PCK_GLASCONTAINER.STATUS_CLEARING_LANDLORD_DATA
                 THEN 'noEdit' END;
      EXCEPTION
          WHEN NO_DATA_FOUND THEN
              --APEX_APPLICATION.STOP_APEX_ENGINE;
              apex_util.redirect_url(p_url => apex_page.get_url(
                  p_application => :APP_ID,
                  p_page        => 10050
              ));
      END;

  execution: 
    sequence: 20
    point: Before Header
    run-process: Once Per Page Visit (default)

  server-side-condition: 
    type: Expression
    language: PL/SQL
    pl/sql-expression: ':P20_UUID IS NOT NULL'

  comments: 
    comments: Lädt die synchronisierten Daten in die Auftragsfelder des Formulars. Stellt sicher, dass bei jedem Aufrufen der Seite die aktuellen Serverdaten zur Anzeige kommen, selbst wenn unmittelbar zuvor ein REST POST stattgefunden hat.

