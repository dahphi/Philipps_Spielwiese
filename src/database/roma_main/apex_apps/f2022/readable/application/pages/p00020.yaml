- # ====== Dynamic Action: Klick auf Kopieren-Icon (Zwischenabla
  id: 56535050354052116
  identification: 
    name: Klick auf Kopieren-Icon (Zwischenablage)

  execution: 
    sequence: 360
    event-scope: Static
    type: Immediate

  when: 
    event: Click
    selection-type: jQuery Selector
    jquery-selector: button.copyItemToClipboard

  actions: 
  - # ====== Action: kopieren und Erfolgsmeldung einblenden ======
    id: 56535121292052117
    identification: 
      name: kopieren und Erfolgsmeldung einblenden
      action: Execute JavaScript Code

    settings: 
      code: |
        let $button = $(this.triggeringElement);
        let item = $button.data('item');
        copyHtmlToClipboard(apex.item(item).getValue());
        apex.message.showPageSuccess($button.data('success'));

    execution: 
      sequence: 10
      event: Klick auf Kopieren-Icon (Zwischenablage) # 56535050354052116
      fire-when-event-result-is: True
      fire-on-initialization: false

