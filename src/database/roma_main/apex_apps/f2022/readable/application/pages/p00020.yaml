- # ====== Process: Siebel-Auftragsdaten laden =================
  id: 221027560234343414
  identification: 
    name: Siebel-Auftragsdaten laden
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      PCK_GLASCONTAINER_EXT.p_get_siebel_auftragsdaten(
          piv_uuid              => :P20_UUID
        , pov_order_rowid       => :P20_SIEBEL_ORDER_ROWID
        , pov_order_number      => :P20_SIEBEL_ORDER_NUMBER
        , pov_account_id        => :P20_SIEBEL_ACCOUNT_ID
        , pov_kundennummer      => :P20_SIEBEL_KUNDENNUMMER
        , pov_unterkundennummer => :P20_SIEBEL_UNTERKUNDENNUMMER
        , pov_usermessage       => :P20_SIEBEL_USERMESSAGE
      );
      
      -- Stand 2023-07 liefert diese Siebel-View keine Ergebnisse bei bereits abgeschlossenen Aufträgen.
      -- Falls die Display-Felder leer sind, füllen wir sie ggf. mit den Daten aus der Siebel-View:
      IF :P20_SIEBEL_AUFTRAGSNUMMER IS NULL OR :P20_SIEBEL_AUFTRAG_ZEILENNUMMER IS NULL THEN
        :P20_SIEBEL_AUFTRAGSNUMMER := :P20_SIEBEL_ORDER_NUMBER;
        :P20_SIEBEL_AUFTRAG_ZEILENNUMMER := :P20_SIEBEL_ORDER_ROWID;
      END IF;
      
      -- @krakar @FTTH-4452: löschen, da kein Nutzen mehr ///// @wisand das war falsch, wird weiterhin benötigt
      :P20_SIEBEL_OFFEN :=
        CASE
           WHEN 
             :P20_CAN_EDIT IS NULL AND
             :P20_STATUS <> 'SIEBEL_PROCESSED' AND
             :P20_SIEBEL_READY = 'true'
              -- @ticket FTTH-4851: Workaround, da sich der Status nach dem Abschließen des Auftrags   
              -- oft nicht sofort serverseitig verändert:
              AND :P20_AUFTRAG_ABGESCHLOSSEN IS NULL
           THEN 1 
           END;
      
      

  execution: 
    sequence: 100
    point: Before Header
    run-process: Once Per Page Visit (default)

  server-side-condition: 
    type: Item is NULL
    item: P20_CAN_EDIT

  comments: 
    comments: |
      @ticket FTTH-2162, @ticket FTTH-4198, @AOH
      Der Prozess läuft nur, wenn der Auftrag noch editierbar ist.
      Im Unterschied dazu holt sich der Dialog "Siebel Auftrag abschließen" die beiden Felder SIEBEL_ORDER_NUMBER und SIEBEL_ORDER_ROWID aus den synchronisierten Daten der POB-Tabelle

- # ====== Process: P20_UUID aus URL-Parameter UUID einlesen ===
  id: 225269013979440291
  identification: 
    name: P20_UUID aus URL-Parameter UUID einlesen
    type: Execute Code
    execution-chain: None

  source: 
