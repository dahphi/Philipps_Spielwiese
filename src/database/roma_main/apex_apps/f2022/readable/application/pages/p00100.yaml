javascript: 
  function-and-global-variable-declaration: |
    "FN_PAGESPINNER"
    "FN_FORMAT_IBAN"
    
    function step_1_adressdaten_ok()
    {
        if(
            !!apex.item('P100_WOHNT_DORT').getValue() &&
            (apex.item('P100_WOHNDAUER').getValue() == 'RESIDENT_SIX_OR_MORE_MONTHS'
            || 
                (
                    !!apex.item('P100_VORADRESSE_PLZ').getValue() &&
                    !!apex.item('P100_VORADRESSE_ORT').getValue() &&
                    !!apex.item('P100_VORADRESSE_STRASSE').getValue() &&
                    !!apex.item('P100_VORADRESSE_HAUSNR').getValue()
                )
            )
        )
        return true;
        return false;
    }
  execute-when-page-loads: |
    $(document).ready(function () {
      $('input.prevent-copy-paste').bind('copy paste', function (e) {
         e.preventDefault();
      });
    });

