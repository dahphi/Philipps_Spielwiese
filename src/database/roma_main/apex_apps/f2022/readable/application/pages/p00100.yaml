- # ====== Region: CSS für autosuggest =========================
  id: 235652650950458225
  identification: 
    name: CSS für autosuggest
    type: Static Content

  source: 
    html-code: |
      .autocomplete {
        position: relative;
        display: inline-block;
      }
      .autocomplete-items {
        position: absolute;
        border: 1px solid #d4d4d4;
        border-bottom: none;
        border-top: none;
        z-index: 99;
        top: 100%;
        left: 0;
        right: 0;
        max-height:200px;
        overflow:auto;
      }
      .autocomplete-items div {
        padding: 5px;
        cursor: pointer;
        background-color: #fff;
        border-bottom: 1px solid #d4d4d4;
      }
      .autocomplete-items div:hover {
        background-color: #e9e9e9;
      }
      .autocomplete-active {
        background-color: DodgerBlue !important;
        color: #ffffff;
      }

  layout: 
    sequence: 10
