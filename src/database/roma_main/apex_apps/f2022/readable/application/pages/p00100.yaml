    exclude-title-from-translation: false

  header-and-footer: 
    header-text: '<h5>Ähnliche Daten in Siebel:</h5>'

  server-side-condition: 
    type: Expression
    language: PL/SQL
    pl/sql-expression: 'NVL(:P100_ANZAHL_DUBLETTEN_SIE, 0) > 0'

  customization: 
