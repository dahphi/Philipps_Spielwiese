- # ====== Region: GEE Eigentümer (Text unten) =================
  id: 233145645498505871
  identification: 
    name: GEE Eigentümer (Text unten)
    type: Static Content

  source: 
    html-code: |
      <p>
          Ich bin damit einverstanden, dass die &P100_MANDANT_DISPLAY. GmbH auf meinem Grundstück sowie an und in den darauf befindlichen Gebäuden 
          alle Vorrichtungen anbringt, die erforderlich sind, um Zugänge zu ihrem öffentlichen Telekommunikationsnetz auf dem betreffenden 
          oder einem benachbarten Grundstück und in den darauf befindlichen Gebäuden einzurichten, zu prüfen und instand zu halten. 
          Dieses Recht erstreckt sich auch auf vorinstallierte Hausverkabelungen. Die Inanspruchnahme des Grundstücks durch Vorrichtungen 
          darf nur zu einer notwendigen und zumutbaren Belastung führen. Die &P100_MANDANT_DISPLAY. GmbH verpflichtet sich, 
          unbeschadet bestehender gesetzlicher oder vertraglicher Ansprüche, mein Grundstück und die darauf befindlichen Gebäude wieder 
          ordnungsgemäß instand zu setzen, soweit das Grundstück und/oder die Gebäude durch Vorrichtungen zur Einrichtung, Instandhaltung oder Erweiterung 
          von Zugängen zu ihrem öffentlichen Telekommunikationsnetz auf dem betreffenden oder einem benachbarten Grundstück und/oder 
          in den darauf befindlichen Gebäuden infolge der Inanspruchnahme durch die &P100_MANDANT_DISPLAY. GmbH beschädigt worden sind. 
          Im Rahmen der technischen Möglichkeiten und der bestehenden Sicherheitsanforderungen wird die &P100_MANDANT_DISPLAY. GmbH 
          vorinstallierte Hausverkabelungen nutzen. Die &P100_MANDANT_DISPLAY. GmbH wird die von ihr errichteten Vorrichtungen verlegen oder &ndash; 
          soweit sie nicht das Grundstück versorgen und eine Verlegung nicht ausreicht &ndash; entfernen, wenn sie einer veränderten Nutzung 
          des Grundstücks entgegenstehen und ihr Verbleib an der bisherigen Stelle nicht mehr zumutbar ist. Die Kosten für die Entfernung oder Verlegung 
          trägt die &P100_MANDANT_DISPLAY. GmbH. Dies gilt nicht für Vorrichtungen, die ausschließlich das Grundstück versorgen, wenn nicht gleichzeitig 
          Änderungen am öffentlichen Telekommunikationsnetz erforderlich sind.
      </p>

  layout: 
    sequence: 30
    parent-region: GEE für Eigentümer # 233145356375505868
