  header-and-footer: 
    header-text: '<h5>Ähnliche Daten im Preorder-Buffer:</h5>'

  server-side-condition: 
    type: Expression
    language: PL/SQL
    pl/sql-expression: 'NVL(:P100_ANZAHL_DUBLETTEN_POB, 0) > 0'

  customization: 
