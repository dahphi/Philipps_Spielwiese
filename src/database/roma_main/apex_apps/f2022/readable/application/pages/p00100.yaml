    - t-Form-fieldContainer--stretchInputs
    - t-Form-fieldContainer--large
    height: 1

  validation: 
    value-required: false

  list-of-values: 
    type: SQL Query
    sql-query: |
      SELECT P.name AS D, P.TEMPLATE_ID AS R
        FROM FTTH_GLASCONTAINER_PRODUKTE P
       WHERE P.AKTION = :P100_AKTION
         AND P.BANDBREITE BETWEEN TO_NUMBER(:P100_VC_MIN_BANDBREITE) 
                              AND TO_NUMBER(:P100_VC_MAX_BANDBREITE)
    display-extra-values: true
    display-null-value: true
