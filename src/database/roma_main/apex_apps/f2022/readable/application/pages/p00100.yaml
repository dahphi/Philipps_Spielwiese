  id: 231390439216104502
  identification: 
    name: '[6] GEE-Felder für Autocomplete definieren'

  execution: 
    sequence: 154
    event-scope: Static

  when: 
    event: Page Load

  server-side-condition: 
    type: Item = Value
    item: P100_STEP
    value: 6

  actions: 
  - # ====== Action: function autocomplete aufrufen ==============
    id: 231390450025104503
    identification: 
      name: function autocomplete aufrufen
      action: Execute JavaScript Code

    settings: 
      code: |
        let itemPlz = document.getElementById("P100_GEE_PLZ");
        let itemOrt = document.getElementById("P100_GEE_ORT");
        let itemStr = document.getElementById("P100_GEE_STRASSE");
        
        if(!!!itemPlz || !!!itemOrt || !!!itemStr) return;
        
        autocomplete('plz', itemPlz, itemOrt, itemStr);
        autocomplete('ort', itemOrt, itemPlz);
        autocomplete('str', itemStr, itemPlz);

    execution: 
      sequence: 10
      event: '[6] GEE-Felder für Autocomplete definieren' # 231390439216104502
      fire-when-event-result-is: True
      fire-on-initialization: false

