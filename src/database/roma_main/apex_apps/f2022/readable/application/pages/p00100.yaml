- # ====== Dynamic Action: [5] ABW-Felder für Autocomplete defin
  id: 235652912907458227
  identification: 
    name: '[5] ABW-Felder für Autocomplete definieren'

  execution: 
    sequence: 63
    event-scope: Static

  when: 
    event: Page Load

  server-side-condition: 
    type: Item = Value
    item: P100_STEP
    value: 5

  actions: 
  - # ====== Action: function autocomplete aufrufen ==============
    id: 235653006949458228
    identification: 
      name: function autocomplete aufrufen
      action: Execute JavaScript Code

    settings: 
      code: |
        let itemPlz = document.getElementById("P100_VORADRESSE_PLZ");
        let itemOrt = document.getElementById("P100_VORADRESSE_ORT");
        let itemStr = document.getElementById("P100_VORADRESSE_STRASSE");
        
        if(!!!itemPlz || !!!itemOrt || !!!itemStr) return;
        
        autocomplete('plz', itemPlz, itemOrt, itemStr);
        autocomplete('ort', itemOrt, itemPlz);
        autocomplete('str', itemStr, itemPlz);

    execution: 
      sequence: 10
      event: '[5] ABW-Felder für Autocomplete definieren' # 235652912907458227
      fire-when-event-result-is: True
      fire-on-initialization: false

