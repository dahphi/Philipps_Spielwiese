- # ====== Process: [5, 6] Hidden Items ========================
  id: 230898698975083722
  identification: 
    name: '[5, 6] Hidden Items'
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      -- Bereits zugewiesen? Dann Ende
      IF :P100_KUNDENREFERENZ_NOM IS NOT NULL THEN RETURN; END IF;
      
      CASE COALESCE(:P100_NEUKUNDE_ANREDE, :P100_SIEBEL_ANREDE)
          WHEN 'MISS' THEN 
              :P100_KUNDENREFERENZ_NOM := 'die Kundin';
              :P100_KUNDENREFERENZ_GEN := 'der Kundin';
              :P100_KUNDENREFERENZ_DAT := 'der Kundin';
              :P100_KUNDENREFERENZ_AKK := 'die Kundin';
          WHEN 'MISTER' THEN
              :P100_KUNDENREFERENZ_NOM := 'der Kunde';
              :P100_KUNDENREFERENZ_GEN := 'des Kunden';
              :P100_KUNDENREFERENZ_DAT := 'dem Kunden';
              :P100_KUNDENREFERENZ_AKK := 'den Kunden';
          ELSE
              :P100_KUNDENREFERENZ_NOM := 'der Kunde/die Kundin';
              :P100_KUNDENREFERENZ_GEN := 'der Kundin/des Kunden';
              :P100_KUNDENREFERENZ_DAT := 'der Kundin/dem Kunden';
              :P100_KUNDENREFERENZ_AKK := 'den Kunden/die Kundin';
      END CASE;
      
      IF :P100_NAME IS NULL THEN :P100_NAME := COALESCE(:P100_NEUKUNDE_NACHNAME, :P100_SIEBEL_NACHNAME); END IF;
      IF :P100_MANDANT_DISPLAY IS NULL AND :P100_MANDANT IS NOT NULL THEN
         :P100_MANDANT_DISPLAY := PCK_GLASCONTAINER.fv_mandant_display(:P100_MANDANT);
      END IF;

