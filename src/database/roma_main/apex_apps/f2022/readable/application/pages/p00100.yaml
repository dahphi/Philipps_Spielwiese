- # ====== Process: Track Page =================================
  id: 68200387531631811
  identification: 
    name: Track Page
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      PCK_GLASCONTAINER.track_page(
          piv_app_id      => :APP_ID
        , piv_app_page_id => :APP_PAGE_ID
        , pin_app_session => :APP_SESSION
        , piv_request     => CASE WHEN UPPER(:REQUEST) IN ('GC', 'SIEBEL') THEN :REQUEST END -- nur diese beiden Werte verwenden, sonst Auswertung kaputt!
        , piv_scope       => :P100_STEP
        , piv_task        => :P100_TASK
        , piv_extra       => CASE WHEN :P100_KUNDENSTATUS IS NOT NULL THEN ',KUNDENSTATUS=' || :P100_KUNDENSTATUS END 
                          || CASE WHEN :P100_VKZ          IS NOT NULL THEN ',VKZ=' || :P100_VKZ END
                          || CASE WHEN :P100_STEP >= 4 THEN  
                                ',DUBLETTEN_SIE='  || :P100_ANZAHL_DUBLETTEN_SIE
                             || ',DUBLETTEN_POB='  || :P100_ANZAHL_DUBLETTEN_POB                    
                             || ',KUNDENDATEN='    || COALESCE(:P100_DUPLICATE_SRC, 'INP')
                             END 
      );

  execution: 
    sequence: 110
    point: Before Header
    run-process: Once Per Page Visit (default)

  comments: 
    comments: '@ticket FTTH-4003: Der Scope entspricht der Wizard-Unterseite (P100_STEP), damit sich später ggf. präzisere Abläufe rekonstruieren lassen, wo der User ausgestiegen ist'

