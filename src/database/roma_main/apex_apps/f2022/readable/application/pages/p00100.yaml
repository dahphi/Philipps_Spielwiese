dynamic-actions: 
- # ====== Dynamic Action: [1] ROUTER_AUSWAHL ist PREMIUM ======
  id: 213325564153127090
  identification: 
    name: '[1] ROUTER_AUSWAHL ist PREMIUM'

  execution: 
    sequence: 404
    event-scope: Static
    type: Immediate

  when: 
    event: Change
    selection-type: Item(s)
    item(s): 
    - P100_ROUTER_AUSWAHL

  client-side-condition: 
    type: Item = Value
    item: P100_ROUTER_AUSWAHL
    value: PREMIUM

  server-side-condition: 
    type: Expression
    language: PL/SQL
    pl/sql-expression: ":P100_STEP = 1 AND :P100_TECHNOLOGIE = 'FTTH'"

  comments: 
    comments: '@krakar @Ticket Ftth-4168: Eine Dynamic Action hinzugefügt. Wenn es sich um eine FTTH-Technologie handelt und wenn ein NC-Router (PREMIUM) ausgewählt wird, soll als Glasfaser-Modem das NetCologne Glasfaser-Modem ausgewählt und die Auswahl ausgeblendet'

  actions: 
  - # ====== Action: NetCologne Glasfaser-Modem wird ausgewählt ==
    id: 213325591392127091
    identification: 
      name: NetCologne Glasfaser-Modem wird ausgewählt
      action: Set Value

    settings: 
      set-type: Static Assignment
      value: NETCOLOGNE
      suppress-change-event: false

    affected-elements: 
      selection-type: Item(s)
      item(s): 
      - P100_ONT_PROVIDER

    execution: 
      sequence: 30
      event: '[1] ROUTER_AUSWAHL ist PREMIUM' # 213325564153127090
      fire-when-event-result-is: True
      fire-on-initialization: true
      stop-execution-on-error: true
      wait-for-result: true

  - # ====== Action: Auswahl des Glasfaser-Modems wird ausgeblende
    id: 213325732054127092
    identification: 
      name: Auswahl des Glasfaser-Modems wird ausgeblendet
      action: Disable

    affected-elements: 
      selection-type: Item(s)
      item(s): 
      - P100_ONT_PROVIDER

    execution: 
      sequence: 40
      event: '[1] ROUTER_AUSWAHL ist PREMIUM' # 213325564153127090
      fire-when-event-result-is: True
      fire-on-initialization: true

  - # ====== Action: Auswahl des Glasfaser-Modems wird eingeblende
    id: 213325801109127093
    identification: 
      name: Auswahl des Glasfaser-Modems wird eingeblendet
      action: Enable

    affected-elements: 
      selection-type: Item(s)
      item(s): 
      - P100_ONT_PROVIDER

    execution: 
      sequence: 10
      event: '[1] ROUTER_AUSWAHL ist PREMIUM' # 213325564153127090
      fire-when-event-result-is: False
      fire-on-initialization: true

- # ====== Dynamic Action: [1] ROUTER_AUSWAHL ist BYOD =========
  id: 219563699985616422
  identification: 
    name: '[1] ROUTER_AUSWAHL ist BYOD'

  execution: 
    sequence: 124
    event-scope: Static
    type: Immediate

  when: 
    event: Change
    selection-type: Item(s)
    item(s): 
    - P100_ROUTER_AUSWAHL

  client-side-condition: 
    type: Item = Value
    item: P100_ROUTER_AUSWAHL
    value: BYOD

  server-side-condition: 
    type: Item = Value
    item: P100_STEP
    value: 1

  comments: 
    comments: Wenn der Router dem Kunden gehört (BYOD = Bring Your Own Device), dann wird das Feld "Router-Eigentum" abgeblendet.

  actions: 
  - # ====== Action: ROUTER_EIGENTUM ausblenden ==================
    id: 219563823902616423
    identification: 
      name: ROUTER_EIGENTUM ausblenden
      action: Disable

    affected-elements: 
      selection-type: Item(s)
      item(s): 
      - P100_ROUTER_EIGENTUM

    execution: 
      sequence: 20
      event: '[1] ROUTER_AUSWAHL ist BYOD' # 219563699985616422
      fire-when-event-result-is: True
      fire-on-initialization: true

