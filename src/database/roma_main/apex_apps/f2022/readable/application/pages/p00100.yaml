buttons: 
- # ====== Button: P100_BTN_NEXT_1 =============================
  id: 219560617371616391
  identification: 
    button-name: P100_BTN_NEXT_1
    label: Weiter zum nächsten Schritt ...

  layout: 
    sequence: 130
    region: Produkt-/Tarifauswahl # 251254679668572631
    slot: COPY
    start-new-layout: false
    start-new-row: true
    column: Automatic
    new-column: true
    column-span: Automatic

  appearance: 
    button-template: Text with Icon
    hot: false
    template-options: 
    - '#DEFAULT#'
    - t-Button--large
    - t-Button--iconLeft
    css-classes: 
    - u-color-31-text
    icon: fa-chevron-circle-right

  behavior: 
    action: Submit Page
    execute-validations: true
    show-processing: true
    warn-on-unsaved-changes: Do Not Check

  advanced: 
    static-id: btnNext1

  server-side-condition: 
    type: Item is NULL
    item: P100_READY

  comments: 
    comments: |
      Bringt den Benutzer zur nächsten Formularseite.
      Wichtig: Alle Page Buttons in der Bestellstrecke benötigen eine Static ID, damit das Automatisierungsskript von Nusret funktioniert.
      
      @bugfix 2024-11-05: Seit APEX 24.1 zünden Dynamic Actions offenbar auch dann, wenn sie per "When Button ..." deklariert sind, aber zwei Buttons mit exakt derselben Static ID existieren - das war bisher zB. der Fall bei "btnNext1" für P100_BTN_NEXT_1 und P100_BTN_NEXT_1_FINAL. Daraufhin hatte ich am 2024-10-30 die Static IDs entfernt, weil die entsprechenden DAs doppelt gezündet hatten und dadurch Race Conditions verursacht haben - selbst wenn der _FINAL-Button nicht im DOM der Seite vorkam: In der Dublettensuche wurde der Kunde "manchmal" Bestandskunde und manchmal blieb er Neukunde, wenn man eine Dublette ausgewählt hatte. Nach dem Eingriff funtkionieren zwar die DAs wieder, aber Nusret fehlen die Static IDs an den Buttons für seine Testskripte.
      Lösung: Static IDs müssen unterschiedlich sein: btnNext1 und btnNext1Final

