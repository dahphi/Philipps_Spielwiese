- # ====== Dynamic Action: [4] Dubletten-Datenauswahl ==========
  id: 230896476813083700
  identification: 
    name: '[4] Dubletten-Datenauswahl'

  execution: 
    sequence: 284
    event-scope: Dynamic
    static-container-(jquery-selector): '#STEP-4'
    type: Immediate

  when: 
    event: Click
    selection-type: jQuery Selector
    jquery-selector: tbody>tr.a-GV-row>td>button.options

  server-side-condition: 
    type: Item = Value
    item: P100_STEP
    value: 4

  comments: 
    comments: Reagiert auf den Klick des Users auf einen der Buttons, mit dem entweder "keine Dublette" oder eine Dublette aus Siebel bzw. dem Preorderbuffer zur weiteren Verwendung ausgewählt werden muss

  actions: 
  - # ====== Action: Open Region =================================
    id: 230896605818083701
    identification: 
      action: Open Region

    affected-elements: 
      selection-type: Region

    execution: 
      sequence: 20
      event: '[4] Dubletten-Datenauswahl' # 230896476813083700
      fire-when-event-result-is: True
      fire-on-initialization: false

    configuration: 
      build-option: Commented Out # 234883986660092834

    comments: 
      comments: '////////// @todo klären: Was sollte mit dem Aufruf dieses Dialogs erreicht werden?'

  - # ====== Action: Auswahl markieren und in Items speichern ====
    id: 246642847765433674
    identification: 
      name: Auswahl markieren und in Items speichern
      action: Execute JavaScript Code

    settings: 
      code: |
        markerClass = 't-Button--success';
        $button = $(this.triggeringElement);
        $('.dublettensuche button.' + markerClass ).removeClass(markerClass);
        $button.addClass(markerClass);
        apex.item('P100_IS_DUPLICATE').setValue('1');
        apex.item('P100_DUPLICATE_ID').setValue($button.data('id'));
        apex.item('P100_DUPLICATE_SRC').setValue($button.data('src'));
        var kundennummer = $button.data('knr');
        apex.item('P100_DUPLICATE_KNR').setValue(kundennummer);

    execution: 
      sequence: 30
      event: '[4] Dubletten-Datenauswahl' # 230896476813083700
      fire-when-event-result-is: True
      fire-on-initialization: false

    comments: 
      comments: |
        Markiert den angeklickten Button grün und setzt die Hidden Items, die die Auswahl des Benutzers speichern:
        P100_IS_DUPLICATE  => 1 (Flag "Es wurde eine Auswahl getroffen")
        P100_DUPLICATE_ID  => Entweder die ROW_ID aus Siebel oder die UUID aus dem Preorder-Buffer
        P100_DUPLICATE_SRC => INP (Erfasste Daten), SIE (Siebel-Datensatz) oder POB (Preorder-Buffer)
        
        Kundennummer kann auch leer sein bei SRC=POB => Die Weitergabe von P100_DUPLICATE_KNR an P100_SIEBEL_KUNDENNUMMER erfolgt im PL/SQL-Prozess

  - # ====== Action: Execute Server-side Code ====================
    id: 246643144465433677
    identification: 
      action: Execute Server-side Code

    settings: 
      language: PE.PROPERTY.SOURCE_SNIPPET_LANG.LOV.PLSQL.D
      pl/sql-code: ':P100_SIEBEL_KUNDENNUMMER := :P100_DUPLICATE_KNR;'
      items-to-submit: 
      - P100_IS_DUPLICATE
      - P100_DUPLICATE_ID
      - P100_DUPLICATE_SRC
      - P100_DUPLICATE_KNR
      items-to-return: 
      - P100_IS_DUPLICATE
      - P100_DUPLICATE_ID
      - P100_DUPLICATE_SRC
      - P100_DUPLICATE_KNR
      - P100_SIEBEL_KUNDENNUMMER
      suppress-change-event: false

    execution: 
      sequence: 40
      event: '[4] Dubletten-Datenauswahl' # 230896476813083700
      fire-when-event-result-is: True
      fire-on-initialization: false
      stop-execution-on-error: true
      wait-for-result: true

    comments: 
      comments: |
        Schickt die zuvor aktualisierten Session States der Hidden Items zur Datenbank. Das HTML-Hilfs-Item P100_DUPLICATE_KNR wird an das Geschäfts-Item P100_SIEBEL_KUNDENNUMMER weitergegeben.
        /// Code funktioniert, aber in der Developer-Console erscheint aufgrund der dort genannten "Items to Submit" die Warnung: "No column exists with static ID:  P100_DUPLICATE_ID"

